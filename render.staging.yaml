databases:
  - name: bite-erp-staging-db
    databaseName: bite_erp_staging
    user: bite_erp_staging
    plan: starter

services:
  - type: web
    name: bite-erp-staging-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: staging
      - key: LOG_LEVEL
        value: info
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: bite-erp-staging-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: CORS_ORIGINS
        value: "https://bite-erp-staging-web.onrender.com"
      - key: CORS_ALLOW_CREDENTIALS
        value: "true"
      - key: BOOTSTRAP_ADMIN_ENABLED
        value: "true"
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: "admin@bite.com"
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_NOME
        value: Admin
      - key: BOOTSTRAP_ADMIN_COGNOME
        value: Bite

  - type: static_site
    name: bite-erp-staging-web
    rootDir: .
    buildCommand: ""
    publishPath: .
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
