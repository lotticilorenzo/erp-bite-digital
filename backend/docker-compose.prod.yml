# Bite ERP - Docker Compose Production
#
# Stack produzione:
# - PostgreSQL
# - FastAPI backend
# - Nginx che serve il frontend statico compilato
# - Servizio backup DB
#
# Note importanti:
# - Nessun frontend Vite dev server in produzione.
# - Il backend e' esposto solo su loopback host per healthcheck/admin locale.

services:
  db:
    image: postgres:16-alpine
    container_name: bite_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bite_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bite_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bite} -d ${POSTGRES_DB:-bite_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bite_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bite_erp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads_data:/app/private_uploads
      - uploads_data:/app/app/uploads
      - uploads_data:/app/static/uploads
      - logos_data:/app/static/logos
      - avatars_data:/app/static/avatars
    networks:
      - bite_network

  nginx:
    image: nginx:alpine
    container_name: bite_erp_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_ssl:/etc/nginx/ssl
    command: >
      sh -c "if [ ! -f /etc/nginx/ssl/nginx.crt ]; then
        echo 'Generazione certificato SSL...';
        apk add --no-cache openssl >/dev/null 2>&1 &&
        openssl req -x509 -nodes -days 3650 -newkey rsa:2048
          -keyout /etc/nginx/ssl/nginx.key
          -out /etc/nginx/ssl/nginx.crt
          -subj '/C=IT/ST=Italy/L=Milano/O=BiteDigital/CN=localhost' 2>/dev/null &&
        echo 'Certificato SSL generato.';
      fi &&
      nginx -g 'daemon off;'"
    networks:
      - bite_network

  db_backup:
    image: postgres:16-alpine
    container_name: bite_erp_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-bite_secret}
      POSTGRES_USER: ${POSTGRES_USER:-bite}
      POSTGRES_DB: ${POSTGRES_DB:-bite_erp}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
    volumes:
      - db_backups:/backups
    networks:
      - bite_network
    command: >
      sh -c "
        echo 'Backup service avviato. Primo backup tra 60 secondi.';
        sleep 60;
        while true; do
          TIMESTAMP=$$(date +%Y-%m-%d_%H-%M);
          OUTFILE=\"/backups/backup_$${TIMESTAMP}.sql\";
          echo \"[$$(date)] Avvio backup: $$OUTFILE\";
          pg_dump -h db -U $$POSTGRES_USER $$POSTGRES_DB > \"$$OUTFILE\" 2>&1;
          if [ $$? -eq 0 ]; then
            gzip \"$$OUTFILE\";
            echo \"[$$(date)] Backup completato: $${OUTFILE}.gz\";
          else
            echo \"[$$(date)] ERRORE backup - vedi output sopra\";
            rm -f \"$$OUTFILE\";
          fi;
          find /backups -name 'backup_*.sql.gz' -mtime +$$BACKUP_RETAIN_DAYS -delete;
          echo \"[$$(date)] Prossimo backup tra 24h.\";
          sleep 86400;
        done
      "

networks:
  bite_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  logos_data:
  avatars_data:
  db_backups:
  nginx_ssl:
