server {
    listen 80;
    server_name erp.bitedigitalstudio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name erp.bitedigitalstudio.com;

    ssl_certificate /etc/letsencrypt/live/erp.bitedigitalstudio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.bitedigitalstudio.com/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        add_header Access-Control-Allow-Origin "https://erp.bitedigitalstudio.com" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }
}
