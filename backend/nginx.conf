# ─────────────────────────────────────────────────────────────────────────────
# Bite ERP — Nginx Production Configuration
# HTTP  → HTTPS redirect (porta 80)
# HTTPS → serve frontend + proxy backend API + WebSocket chat (porta 443)
#
# Certificati: auto-generati self-signed al primo avvio (vedi docker-compose.yml).
# Per produzione con dominio pubblico, sostituire con Let's Encrypt:
#   certbot certonly --webroot -w /usr/share/nginx/html -d tuodominio.it
#   Aggiornare ssl_certificate / ssl_certificate_key con i path LE.
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name erp.bitedigitalstudio.com;

    # ── TLS ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/erp.bitedigitalstudio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.bitedigitalstudio.com/privkey.pem;

    # Solo TLS 1.2 e 1.3 (disabilita SSLv3, TLS 1.0/1.1)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Cipher suite moderna (OWASP recommended)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Session cache per performance
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling (solo con cert pubblici — silenzioso con self-signed)
    ssl_stapling        off;

    # ── SECURITY HEADERS (a livello nginx) ───────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── LIMITI REQUEST ────────────────────────────────────────
    client_max_body_size 10m;

    # ── FRONTEND (React SPA) ─────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache immutabile per asset con hash nel nome
        location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── BACKEND API ───────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Non esporre info server upstream
        proxy_hide_header  Server;
        proxy_hide_header  X-Powered-By;
    }

    # ── WEBSOCKET CHAT ────────────────────────────────────────
    location /api/v1/chat/ws {
        proxy_pass          http://backend:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        # Timeout lungo per connessioni WS persistenti
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── UPLOAD UTENTE: forza download per prevenire XSS via SVG/HTML ─────────
    # I file caricati dagli utenti non devono mai essere renderizzati inline.
    location /static/uploads/ {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
        expires          1h;
        add_header       Cache-Control "private, no-transform" always;
        add_header       Content-Disposition "attachment" always;
        add_header       X-Content-Type-Options "nosniff" always;
    }

    # ── AVATAR (immagini elaborate da Pillow — sicure inline) ──────────────
    location /static/avatars/ {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
        expires          7d;
        add_header       Cache-Control "public";
        add_header       X-Content-Type-Options "nosniff" always;
    }

    # ── FILE STATICI BACKEND (altri) ──────────────────────────
    location /static/ {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
        expires          7d;
        add_header       Cache-Control "public";
    }

    # ── BLOCCA ACCESSO A FILE SENSIBILI ───────────────────────
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
}
