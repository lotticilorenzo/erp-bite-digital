version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: bite_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bite
      POSTGRES_PASSWORD: bite_secret        # CAMBIA IN PRODUZIONE
      POSTGRES_DB: bite_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"                         # rimuovi in produzione
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bite -d bite_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bite_erp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://bite:bite_secret@db:5432/bite_erp
      JWT_SECRET: ${JWT_SECRET:-}
      SECRET_KEY: ${SECRET_KEY:-CAMBIA_IN_PRODUZIONE_con_openssl_rand_hex_32}
      DEBUG: "true"
      CORS_ORIGINS: "http://localhost:5174,http://127.0.0.1:5174"
      CORS_ALLOW_CREDENTIALS: "true"
      BOOTSTRAP_ADMIN_ENABLED: "true"
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@bite.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-Admin123!}
      BOOTSTRAP_ADMIN_NOME: ${BOOTSTRAP_ADMIN_NOME:-Admin}
      BOOTSTRAP_ADMIN_COGNOME: ${BOOTSTRAP_ADMIN_COGNOME:-Bite}
      FIC_API_KEY: ${FIC_API_KEY:-}
      CLICKUP_API_TOKEN: ${CLICKUP_API_TOKEN:-}
      CLICKUP_TEAM_ID: ${CLICKUP_TEAM_ID:-}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app                      # hot reload in sviluppo

  nginx:
    image: nginx:alpine
    container_name: bite_erp_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html  # frontend buildato
      - nginx_certs:/etc/letsencrypt

volumes:
  postgres_data:
  nginx_certs:
