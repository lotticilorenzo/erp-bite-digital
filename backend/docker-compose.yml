version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: bite_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bite
      POSTGRES_PASSWORD: bite_secret
      POSTGRES_DB: bite_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bite -d bite_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bite_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bite_erp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./static:/app/static
    networks:
      - bite_network

  frontend:
    image: node:20-alpine
    container_name: bite_erp_frontend
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"
    networks:
      - bite_network

  nginx:
    image: nginx:alpine
    container_name: bite_erp_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../frontend/dist:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - bite_network

networks:
  bite_network:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
