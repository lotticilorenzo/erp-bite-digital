function fmtDate(d){if(!d)return "—";return new Date(d+"T00:00:00").toLocaleDateString("it-IT",{day:"2-digit",month:"short"});}
function cloneObj(x){return JSON.parse(JSON.stringify(x));}
function isPast(d){return !!(d&&d<TODAY);}
function isToday(d){return d===TODAY;}
function isSoon(d){return !!(d&&d>TODAY&&d<=addDays(TODAY,7));}
function fmtMs(ms){
  if(!ms||ms<=0)return "00:00";
  var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  if(h>0)return h+":"+z(m%60)+":"+z(s%60);
  return z(m)+":"+z(s%60);
}
function z(n){return n<10?"0"+n:""+n;}

function getLists(data){
  var r=[];
  data.workspaces.forEach(function(ws){ws.spaces.forEach(function(sp){sp.folders.forEach(function(fo){fo.lists.forEach(function(li){r.push({list:li,folder:fo,space:sp,ws:ws});});});});});
  return r;
}
function getList(data,id){return getLists(data).filter(function(x){return x.list.id===id;})[0]||null;}
function getFolder(data,id){var r=null;data.workspaces.forEach(function(ws){ws.spaces.forEach(function(sp){sp.folders.forEach(function(fo){if(fo.id===id)r={folder:fo,space:sp,ws:ws};});});});return r;}
function getTask(data,tid){var r=null;getLists(data).forEach(function(x){x.list.tasks.forEach(function(t){if(t.id===tid)r={task:t,list:x.list,folder:x.folder};});});return r;}
function myTasks(data,uid){var r=[];getLists(data).forEach(function(x){x.list.tasks.forEach(function(t){if(t.assignees.indexOf(uid)>=0)r.push({task:t,list:x.list,folder:x.folder});});});return r;}
function setList(data,lid,fn){var n=cloneObj(data);getLists(n).forEach(function(x){if(x.list.id===lid)fn(x.list);});return n;}
function setTask(data,tid,fn){var n=cloneObj(data);getLists(n).forEach(function(x){x.list.tasks.forEach(function(t){if(t.id===tid)fn(t);});});return n;}

// ─── INLINE INPUT ─────────────────────────────────────────────────────────────
function InlineInput(p){
  // p: {t, placeholder, onConfirm, onCancel, indent}
  var [val,setVal]=useState("");
  var t=p.t;
  function confirm(){if(val.trim())p.onConfirm(val.trim());else p.onCancel();}
  return <div style={{paddingLeft:p.indent||0,paddingRight:4,marginTop:3,marginBottom:3}} onClick={function(e){e.stopPropagation();}}>
    <input autoFocus value={val} onChange={function(e){setVal(e.target.value);}
    } onKeyDown={function(e){if(e.key==="Enter")confirm();if(e.key==="Escape")p.onCancel();}}
      placeholder={p.placeholder||"Nome..."}
      style={{width:"100%",background:t.s3,border:"1.5px solid "+t.ac,borderRadius:7,color:t.tx,fontSize:12,padding:"6px 10px",outline:"none",fontFamily:t.F,fontWeight:500}}/>
    <div style={{display:"flex",gap:4,marginTop:4}}>
      <button onClick={confirm} style={{flex:1,padding:"4px 0",borderRadius:6,border:"none",background:"linear-gradient(135deg,"+t.ac+","+t.acB+")",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:t.F}}>Crea</button>
      <button onClick={p.onCancel} style={{flex:1,padding:"4px 0",borderRadius:6,border:"1px solid "+t.br,background:"transparent",color:t.tx3,fontSize:11,cursor:"pointer",fontFamily:t.F}}>Annulla</button>
    </div>
  </div>;
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function Sidebar(p){
  var data=p.data,nav=p.nav,setNav=p.setNav,setData=p.setData,t=p.t;
  var [oSp,setOSp]=useState({sp1:true,sp2:false,sp3:false});
  var [oFo,setOFo]=useState({});
  // "adding" state: null | {type:"ws"} | {type:"sp",wsId} | {type:"fo",wsId,spId} | {type:"li",wsId,spId,foId}
  var [adding,setAdding]=useState(null);

  function tSp(id){setOSp(function(x){var n=Object.assign({},x);n[id]=!n[id];return n;});}
  function tFo(id){setOFo(function(x){var n=Object.assign({},x);n[id]=!n[id];return n;});}
  function stopAdding(){setAdding(null);}

  // ── Create handlers ──
  function addWorkspace(name){
    setData(function(prev){
      var n=cloneObj(prev);

      return n;
    });
    setAdding(null);
  }
  function addSpace(wsId,name){
    setData(function(prev){
      var n=cloneObj(prev);
      n.workspaces.forEach(function(ws){if(ws.id===wsId)ws.spaces.push({id:uid(),name:name,folders:[]});});
      return n;
    });
    setAdding(null);
  }
  function addFolder(wsId,spId,name){
    var newId=uid();
    setData(function(prev){
      var n=cloneObj(prev);

      return n;
    });
    // Auto-open new folder and navigate to it
    setOFo(function(x){var n=Object.assign({},x);n[newId]=false;return n;});

    setAdding(null);

    var fc={visible:{assignees:true,dueDate:true,state:true,timeMax:true,timer:true},custom:[]};
    setData(function(prev){
      var n=cloneObj(prev);
      n.workspaces.forEach(function(ws){if(ws.id===wsId)ws.spaces.forEach(function(sp){if(sp.id===spId)sp.folders.forEach(function(fo){if(fo.id===foId)fo.lists.push({id:newId,name:name,states:states,tasks:[],fieldConfig:fc});});});});
      return n;

          <div style={{width:30,height:30,borderRadius:9,background:"linear-gradient(135deg,"+t.ac+","+t.acB+")",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 14px "+t.ac+"50"}}><Ico name="dash" size={16} color="#fff"/></div>

          <div key={ws.id}>

              <AddBtn t={t} title="Aggiungi space" onClick={function(){setAdding({type:"sp",wsId:ws.id});}}/>
            </div>

            {/* New space input */}
            {adding&&adding.type==="sp"&&adding.wsId===ws.id&&(
              <InlineInput t={t} placeholder="Nome space..." indent={8} onConfirm={function(n){addSpace(ws.id,n);}} onCancel={stopAdding}/>
            )}

            {ws.spaces.map(function(sp){return (
              <div key={sp.id}>
                {/* Space row */}
                <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",borderRadius:8,cursor:"pointer",color:t.tx2,fontSize:12,fontWeight:600,transition:"background .12s"}}

                </div>

                  <div>

                    {adding&&adding.type==="fo"&&adding.spId===sp.id&&(
                      <InlineInput t={t} placeholder="Nome cartella..." indent={16} onConfirm={function(n){addFolder(ws.id,sp.id,n);}} onCancel={stopAdding}/>
                    )}

                    {sp.folders.map(function(fo){
                      var af=nav.folderId===fo.id&&!nav.listId;
                      return (
                        <div key={fo.id} style={{paddingLeft:8}}>
                          {/* Folder row */}
                          <div style={{display:"flex",alignItems:"center",gap:6,borderRadius:8,transition:"all .12s"}}
                            onMouseEnter={function(e){if(!af)e.currentTarget.style.background=t.s2;}} onMouseLeave={function(e){if(!af)e.currentTarget.style.background="transparent";}}>

                              <div style={{transform:oFo[fo.id]?"rotate(90deg)":"rotate(0)",transition:"transform .2s",flexShrink:0}}><Ico name="cr" size={12} color={t.tx3}/></div>
                              <div style={{width:7,height:7,borderRadius:2,background:af?t.ac:t.tx3,flexShrink:0}}/>

                              <AddBtn t={t} title="Aggiungi lista" onClick={function(){setOFo(function(x){var n=Object.assign({},x);n[fo.id]=true;return n;});setAdding({type:"li",wsId:ws.id,spId:sp.id,foId:fo.id});}}/>
                            </div>
                          </div>

                          {oFo[fo.id]&&(
                            <div>
                              {/* New list input */}
                              {adding&&adding.type==="li"&&adding.foId===fo.id&&(
                                <InlineInput t={t} placeholder="Nome lista..." indent={26} onConfirm={function(n){addList(ws.id,sp.id,fo.id,n);}} onCancel={stopAdding}/>

                                return <div key={li.id} onClick={function(){setNav({view:"list",folderId:fo.id,listId:li.id});}}
                                  style={{display:"flex",alignItems:"center",gap:7,padding:"5px 8px 5px 26px",borderRadius:8,cursor:"pointer",fontSize:11.5,color:al?t.acH:t.tx2,fontWeight:al?700:400,background:al?t.acS:"transparent",borderLeft:al?"2px solid "+t.ac:"2px solid transparent",transition:"all .12s"}}
                                  onMouseEnter={function(e){if(!al)e.currentTarget.style.background=t.s2;}} onMouseLeave={function(e){if(!al)e.currentTarget.style.background="transparent";}}>
                                  <Ico name="list" size={11} color={al?t.ac:t.tx3}/>{li.name}
                                </div>;
                              })}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );})}
          </div>
        );})}

        {/* Add workspace */}
        <div style={{padding:"8px 4px 4px"}}>
          {adding&&adding.type==="ws"?(
            <InlineInput t={t} placeholder="Nome workspace..." indent={0} onConfirm={addWorkspace} onCancel={stopAdding}/>
          ):(
            <button onClick={function(){setAdding({type:"ws"});}}
              style={{width:"100%",display:"flex",alignItems:"center",gap:7,padding:"7px 8px",borderRadius:8,border:"1px dashed "+t.br,background:"transparent",color:t.tx3,fontSize:12,cursor:"pointer",fontFamily:t.F,fontWeight:500,transition:"all .15s"}}
              onMouseEnter={function(e){e.currentTarget.style.borderColor=t.ac;e.currentTarget.style.color=t.ac;e.currentTarget.style.background=t.acS;}}
              onMouseLeave={function(e){e.currentTarget.style.borderColor=t.br;e.currentTarget.style.color=t.tx3;e.currentTarget.style.background="transparent";}}>
              <Ico name="plus" size={13} color="currentColor"/> Nuovo workspace
            </button>

      {/* User */}
      {me&&<div style={{padding:"12px 16px",borderTop:"1px solid "+t.sbBr,display:"flex",alignItems:"center",gap:10}}>

        <div><div style={{fontSize:12,fontWeight:600,color:t.tx}}>{me.name}</div><div style={{fontSize:10,color:t.tx3,marginTop:1}}>Project Manager</div></div>
      </div>}
    </div>
  );

// ─── HOME ─────────────────────────────────────────────────────────────────────
function HomeView(p){
  var data=p.data,t=p.t,openTask=p.openTask;
  var me=data.team.filter(function(u){return u.id===data.userId;})[0];
  var all=myTasks(data,data.userId);
  var todT=all.filter(function(x){return isToday(x.task.due);});

// ─── FIELD SYSTEM ─────────────────────────────────────────────────────────────
var STD_FIELDS = [
  {id:"assignees", label:"Assegnati",  w:"110px"},
  {id:"dueDate",   label:"Scadenza",   w:"96px"},
  {id:"state",     label:"Stato",      w:"130px"},
  {id:"timeMax",   label:"Tempo Max",  w:"78px"},
  {id:"timer",     label:"Timer",      w:"148px"},
];
var CF_WIDTHS = {text:"120px", number:"80px", progress:"110px"};

function defaultFC(){
  return {visible:{assignees:true,dueDate:true,state:false,timeMax:true,timer:true},custom:[]};
}
function getFC(li){return li.fieldConfig||defaultFC();}

function buildGrid(fc){
  var cols=["28px","minmax(180px,1fr)"];
  STD_FIELDS.forEach(function(f){if(fc.visible[f.id])cols.push(f.w);});
  (fc.custom||[]).forEach(function(cf){cols.push(CF_WIDTHS[cf.type]||"100px");});
  cols.push("20px");
  return cols.join(" ");
}
function calcMinWidth(fc){
  var w=28+180+20+56; // dot + title_min + arrow + side padding
  STD_FIELDS.forEach(function(f){if(fc.visible[f.id])w+=parseInt(f.w)+10;});
  (fc.custom||[]).forEach(function(cf){w+=parseInt(CF_WIDTHS[cf.type]||"100")+10;});
  return w;
}
function buildHeader(fc){
  var h=["","Titolo"];
  STD_FIELDS.forEach(function(f){if(fc.visible[f.id])h.push(f.label);});
  (fc.custom||[]).forEach(function(cf){h.push(cf.name);});
  h.push("");
  return h;
}

// subtask progress
function calcProgress(task){
  var all=0,done=0;
  function walk(subs){subs.forEach(function(s){all++;if(s.stateId&&s.subtasks){var st=s.stateId;if(st)done++;walk(s.subtasks);}});}
  if(!task.subtasks||!task.subtasks.length)return null;
  task.subtasks.forEach(function(s){all++;done+=(s.stateId&&s.subtasks!==undefined)?1:0;walk(s.subtasks||[]);});
  return all===0?0:Math.round(done/all*100);
}
function calcSubProgress(task,list){
  if(!task.subtasks||!task.subtasks.length)return null;
  var all=task.subtasks.length;
  var doneState=list.states.filter(function(s){return s.name==="Completato";})[0];
  if(!doneState)return 0;
  var done=task.subtasks.filter(function(s){return s.stateId===doneState.id;}).length;
  return Math.round(done/all*100);
}

// ─── CUSTOM CELL (inline editable) ────────────────────────────────────────────
function CustomCell(p){
  var task=p.task,cf=p.cf,setData=p.setData,t=p.t;
  var [editing,setEditing]=useState(false);
  var vals=task.customValues||{};
  var val=vals[cf.id]!==undefined?vals[cf.id]:"";

  function save(v){
    setData(function(prev){return setTask(prev,task.id,function(tk){
      if(!tk.customValues)tk.customValues={};
      tk.customValues[cf.id]=v;
    });});
    setEditing(false);
  }

  if(cf.type==="progress"){
    var pct=calcSubProgress(task,p.list);
    if(pct===null)return <span style={{color:p.t.tx3,fontSize:12}}>—</span>;
    return <div style={{display:"flex",alignItems:"center",gap:6}} onClick={function(e){e.stopPropagation();}}>
      <div style={{flex:1,height:6,background:t.s3,borderRadius:4,overflow:"hidden",minWidth:50}}>
        <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,"+t.ac+","+t.acH+")",borderRadius:4,transition:"width .3s"}}/>
      </div>
      <span style={{fontSize:11,color:t.tx2,fontWeight:600,flexShrink:0}}>{pct}%</span>
    </div>;
  }

  if(editing){
    return <div onClick={function(e){e.stopPropagation();}}>
      <input autoFocus type={cf.type==="number"?"number":"text"} defaultValue={val}
        onBlur={function(e){save(e.target.value);}}
        onKeyDown={function(e){if(e.key==="Enter")save(e.target.value);if(e.key==="Escape")setEditing(false);}}
        style={{width:"100%",background:t.s3,border:"1.5px solid "+t.ac,borderRadius:6,color:t.tx,fontSize:12,padding:"4px 8px",outline:"none",fontFamily:t.F}}/></div>;
  }

  return <div onClick={function(e){e.stopPropagation();setEditing(true);}}
    style={{fontSize:12,color:val!==undefined&&val!==""?t.tx:t.tx3,cursor:"text",padding:"3px 6px",borderRadius:6,border:"1px solid transparent",transition:"border-color .14s",minHeight:24,display:"flex",alignItems:"center"}}
    onMouseEnter={function(e){e.currentTarget.style.borderColor=t.br;e.currentTarget.style.background=t.s2;}}
    onMouseLeave={function(e){e.currentTarget.style.borderColor="transparent";e.currentTarget.style.background="transparent";}}>
    {val!==undefined&&val!==""?String(val):<span style={{color:t.tx3}}>—</span>}
  </div>;
}

function TaskModal(p){
  var data=p.data,setData=p.setData,tid=p.taskId,onClose=p.onClose,t=p.t;
  var fr=getTask(data,tid);if(!fr)return null;
  var task=fr.task,li=fr.list,fo=fr.folder;
  var [title,setTitle]=useState(task.title);
  var [desc,setDesc]=useState(task.desc);
  var [time,setTime]=useState(""+task.time);
  var [start,setStart]=useState(task.start||"");
  var [due,setDue]=useState(task.due||"");
  var [assignees,setAssignees]=useState(task.assignees.slice());
  var [stateId,setStateId]=useState(task.stateId);
  var [newSub,setNewSub]=useState("");
  var [showPicker,setShowPicker]=useState(false);
  var live=(getTask(data,tid)||{task:task}).task;
  function save(){setData(function(prev){return setTask(prev,tid,function(tk){tk.title=title;tk.desc=desc;tk.time=Number(time)||0;tk.start=start||null;tk.due=due||null;tk.assignees=assignees;tk.stateId=stateId;});});onClose();}
  function addSub(){if(!newSub.trim())return;var sid=li.states[0]?li.states[0].id:"";setData(function(prev){return setTask(prev,tid,function(tk){tk.subtasks.push({id:uid(),title:newSub.trim(),stateId:sid,subtasks:[]});});});setNewSub("");}
  function togUser(u){setAssignees(function(prev){return prev.indexOf(u)>=0?prev.filter(function(x){return x!==u;}):prev.concat([u]);});}
  function delSub(sid){setData(function(prev){return setTask(prev,tid,function(tk){tk.subtasks=flSub(tk.subtasks,sid);});});}
  function flSub(subs,sid){return subs.filter(function(s){if(s.id===sid)return false;s.subtasks=flSub(s.subtasks,sid);return true;});}
  function addNest(pid,ttl){var sid=li.states[0]?li.states[0].id:"";setData(function(prev){return setTask(prev,tid,function(tk){inj(tk.subtasks,pid,ttl,sid);});});}
  function inj(subs,pid,ttl,sid){subs.forEach(function(s){if(s.id===pid){s.subtasks.push({id:uid(),title:ttl,stateId:sid,subtasks:[]});return;}inj(s.subtasks,pid,ttl,sid);});}
  function togDone(sid){var dn=li.states.filter(function(s){return s.name==="Completato";})[0];var td=li.states.filter(function(s){return s.name==="To Do";})[0]||li.states[0];setData(function(prev){return setTask(prev,tid,function(tk){sss(tk.subtasks,sid,dn,td);});});}
  function sss(subs,sid,dn,td){subs.forEach(function(s){if(s.id===sid){var c=li.states.filter(function(x){return x.id===s.stateId;})[0];var isd=c&&c.name==="Completato";s.stateId=isd?(td?td.id:s.stateId):(dn?dn.id:s.stateId);return;}sss(s.subtasks,sid,dn,td);});}

      <div style={{display:"flex",alignItems:"center",padding:"16px 22px",borderBottom:"1px solid "+t.br,background:t.s2}}>

        <div style={{marginLeft:"auto",display:"flex",gap:10,alignItems:"center"}}>
          <Pill state={curSt}/>
          <Btn v="primary" sm t={t} onClick={save}>Salva</Btn>
          <Btn v="ghost" sm t={t} onClick={onClose}><Ico name="x" size={14}/></Btn>
        </div>
      </div>
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto",padding:"22px 26px",borderRight:"1px solid "+t.br}}>
          <textarea value={title} onChange={function(e){setTitle(e.target.value);}} style={{width:"100%",background:"transparent",border:"none",outline:"none",color:t.tx,fontSize:20,fontWeight:700,fontFamily:t.FS,resize:"none",lineHeight:1.35,marginBottom:16,letterSpacing:"-.3px"}} rows={2}/>
          <MF label="Descrizione" t={t}>
            <textarea value={desc} onChange={function(e){setDesc(e.target.value);}} placeholder="Aggiungi una descrizione..." style={{width:"100%",background:t.s2,border:"1px solid "+t.br,borderRadius:10,color:t.tx,fontSize:13,fontFamily:t.F,padding:"12px 14px",outline:"none",resize:"vertical",minHeight:80,lineHeight:1.6}}/>
          </MF>
          <div style={{marginTop:20}}>
            <div style={{fontSize:11,color:t.tx3,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:12,fontFamily:t.FS}}>Sottotask</div>
            <MSubs subs={live.subtasks} list={li} onToggle={togDone} onDel={delSub} onNest={addNest} depth={0} t={t}/>

              <Btn v="outline" sm t={t} onClick={addSub}><Ico name="plus" size={12}/>Aggiungi</Btn>

            </div>
          </MF>
          <MF label="Data inizio" t={t}><input type="date" value={start} onChange={function(e){setStart(e.target.value);}} style={{width:"100%",background:t.s2,border:"1px solid "+t.br,borderRadius:9,color:t.tx,fontSize:13,padding:"9px 12px",fontFamily:t.F,outline:"none",colorScheme:t.mode}}/></MF>
          <MF label="Data scadenza" t={t}><input type="date" value={due} onChange={function(e){setDue(e.target.value);}} style={{width:"100%",background:t.s2,border:"1px solid "+t.br,borderRadius:9,color:t.tx,fontSize:13,padding:"9px 12px",fontFamily:t.F,outline:"none",colorScheme:t.mode}}/></MF>
          <MF label="Tempo Max (h)" t={t}><input type="number" value={time} onChange={function(e){setTime(e.target.value);}} placeholder="0" min={0} style={{width:"100%",background:t.s2,border:"1px solid "+t.br,borderRadius:9,color:t.tx,fontSize:13,padding:"9px 12px",fontFamily:t.F,outline:"none"}}/></MF>
        </div>
      </div>
    </div>
  </div>;
}
function MF(p){return <div style={{marginBottom:4}}><div style={{fontSize:10,fontWeight:700,color:p.t.tx3,marginBottom:7,letterSpacing:".08em",textTransform:"uppercase",fontFamily:p.t.FS}}>{p.label}</div>{p.children}</div>;}
function MSubs(p){
  var subs=p.subs,li=p.list,depth=p.depth||0,t=p.t;
  var [adding,setAdding]=useState(null),[nt,setNt]=useState("");
  if(!subs||!subs.length)return null;
  return <div style={{paddingLeft:depth>0?16:0,borderLeft:depth>0?"2px solid "+t.ac+"28":"none",marginLeft:depth>0?6:0,display:"flex",flexDirection:"column",gap:4}}>
    {subs.map(function(s){
      var state=li.states.filter(function(x){return x.id===s.stateId;})[0]||li.states[0];
      var done=state&&state.name==="Completato";
      return <div key={s.id}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:t.s2,borderRadius:9,border:"1px solid "+t.br+"44"}}>
          <div onClick={function(){p.onToggle(s.id);}} style={{width:18,height:18,borderRadius:5,border:"2px solid "+(done?t.green:t.br),background:done?"linear-gradient(135deg,"+t.green+",#059669)":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
            {done&&<Ico name="check" size={11} color="#fff"/>}
          </div>
          <span style={{flex:1,fontSize:13,color:done?t.tx3:t.tx,textDecoration:done?"line-through":"none",fontWeight:done?400:500}}>{s.title}</span>
          <Pill state={state} sm/>
          {depth<2&&<button onClick={function(){setAdding(function(a){return a===s.id?null:s.id;});}} style={{background:"none",border:"none",cursor:"pointer",padding:3,borderRadius:5,color:t.tx3}} onMouseEnter={function(e){e.currentTarget.style.color=t.ac;}} onMouseLeave={function(e){e.currentTarget.style.color=t.tx3;}}><Ico name="sub" size={12} color="currentColor"/></button>}
          <button onClick={function(){p.onDel(s.id);}} style={{background:"none",border:"none",cursor:"pointer",padding:3,borderRadius:5,color:t.tx3}} onMouseEnter={function(e){e.currentTarget.style.color=t.red;}} onMouseLeave={function(e){e.currentTarget.style.color=t.tx3;}}><Ico name="x" size={12} color="currentColor"/></button>
        </div>
        {adding===s.id&&<div style={{display:"flex",gap:6,marginTop:4,paddingLeft:20}}>
          <input autoFocus value={nt} onChange={function(e){setNt(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&nt.trim()){p.onNest(s.id,nt.trim());setNt("");setAdding(null);}if(e.key==="Escape"){setAdding(null);setNt("");}}} placeholder="Sotto-sottotask..." style={{flex:1,background:t.s3,border:"1px solid "+t.br,borderRadius:7,color:t.tx,fontSize:12,padding:"7px 10px",outline:"none",fontFamily:t.F}}/>
        </div>}
        <MSubs subs={s.subtasks} list={li} onToggle={p.onToggle} onDel={p.onDel} onNest={p.onNest} depth={depth+1} t={t}/>
      </div>;
    })}
  </div>;
}

// ─── STATES MODAL ─────────────────────────────────────────────────────────────
function StModal(p){
  var data=p.data,setData=p.setData,lid=p.listId,onClose=p.onClose,t=p.t;
  var fr=getList(data,lid);if(!fr)return null;var li=fr.list;
  var [states,setSt]=useState(li.states.slice().sort(function(a,b){return a.order-b.order;}));
  var [tplName,setTN]=useState(""),[showSave,setShowSave]=useState(false),[showApply,setShowApply]=useState(false);
  function add(){setSt(function(p){return p.concat([{id:uid(),name:"Nuovo",color:"#9d4edd",order:p.length}]);});}
  function rem(id){if(states.length<=1)return;setSt(function(p){return p.filter(function(s){return s.id!==id;});});}
  function upd(id,k,v){setSt(function(p){return p.map(function(s){if(s.id!==id)return s;var n=Object.assign({},s);n[k]=v;return n;});});}
  function mv(i,dir){setSt(function(prev){var n=prev.slice();var o=i+dir;if(o<0||o>=n.length)return prev;var tmp=n[i];n[i]=n[o];n[o]=tmp;return n.map(function(s,j){return Object.assign({},s,{order:j});});});}
  function save(){setData(function(prev){return setList(prev,lid,function(l){l.states=states.map(function(s,i){return Object.assign({},s,{order:i});});});});onClose();}
  function saveTpl(){if(!tplName.trim())return;setData(function(prev){var n=cloneObj(prev);n.stateTemplates.push({id:uid(),name:tplName.trim(),states:states.map(function(s){return Object.assign({},s,{id:uid()});})});return n;});setTN("");setShowSave(false);}
  function applyTpl(tpl){setSt(tpl.states.map(function(s,i){return Object.assign({},s,{id:uid(),order:i});}));setShowApply(false);}
  return <div onClick={function(e){if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(4,4,18,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1100}}>
    <div className="si" style={{background:t.s1,border:"1px solid "+t.br,borderRadius:18,width:480,maxHeight:"86vh",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,.5)"}}>
      <div style={{display:"flex",alignItems:"center",padding:"16px 22px",borderBottom:"1px solid "+t.br,background:t.s2,borderRadius:"18px 18px 0 0"}}>
        <h2 style={{fontFamily:t.FS,fontSize:15,fontWeight:700,color:t.tx}}>Stati · {li.name}</h2>
        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          <Btn sm v="outline" t={t} onClick={function(){setShowApply(function(o){return !o;});}}>Template</Btn>
          <Btn sm v="primary" t={t} onClick={save}>Applica</Btn>
          <Btn sm t={t} onClick={onClose}><Ico name="x" size={14}/></Btn>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"18px 22px"}}>
        {showApply&&<div className="fu" style={{background:t.s2,borderRadius:12,padding:16,marginBottom:16,border:"1px solid "+t.br}}>
          <div style={{fontSize:11,fontWeight:700,color:t.tx2,marginBottom:12,textTransform:"uppercase",letterSpacing:".07em",fontFamily:t.FS}}>Applica template</div>
          {data.stateTemplates.map(function(tpl){return <div key={tpl.id} onClick={function(){applyTpl(tpl);}} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:t.s1,borderRadius:10,cursor:"pointer",border:"1px solid "+t.br,marginBottom:8,transition:"border-color .15s"}} onMouseEnter={function(e){e.currentTarget.style.borderColor=t.ac;}} onMouseLeave={function(e){e.currentTarget.style.borderColor=t.br;}}><Ico name="tpl" size={14} color={t.ac}/><div><div style={{fontSize:13,fontWeight:600,color:t.tx}}>{tpl.name}</div><div style={{fontSize:11,color:t.tx3,marginTop:2}}>{tpl.states.map(function(s){return s.name;}).join(" → ")}</div></div></div>;})}
        </div>}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {states.map(function(s,i){return <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:t.s2,borderRadius:11,border:"1px solid "+t.br}}>
            <Ico name="drag" size={14} color={t.tx3}/>
            <input type="color" value={s.color} onChange={function(e){upd(s.id,"color",e.target.value);}} style={{width:30,height:30,borderRadius:"50%",border:"3px solid "+t.br,cursor:"pointer",background:"none",padding:0}}/>
            <input value={s.name} onChange={function(e){upd(s.id,"name",e.target.value);}} style={{flex:1,background:t.s3,border:"1px solid "+t.br,borderRadius:8,color:t.tx,fontSize:13,padding:"7px 11px",fontFamily:t.F,outline:"none",fontWeight:600}}/>
            <button onClick={function(){mv(i,-1);}} style={{background:"none",border:"none",cursor:"pointer",color:t.tx3,padding:"4px 6px",opacity:i===0?.3:1}}>↑</button>
            <button onClick={function(){mv(i,1);}} style={{background:"none",border:"none",cursor:"pointer",color:t.tx3,padding:"4px 6px",opacity:i===states.length-1?.3:1}}>↓</button>
            <button onClick={function(){rem(s.id);}} style={{background:"none",border:"none",cursor:"pointer",opacity:states.length<=1?.3:1,padding:4,borderRadius:6}} onMouseEnter={function(e){e.currentTarget.style.background=t.redS;}} onMouseLeave={function(e){e.currentTarget.style.background="transparent";}}><Ico name="trash" size={14} color={t.red}/></button>
          </div>;})}
        </div>
        <Btn v="outline" t={t} onClick={add} style={{marginTop:12,width:"100%",justifyContent:"center"}}><Ico name="plus" size={13}/>Aggiungi stato</Btn>
        <div style={{marginTop:16,borderTop:"1px solid "+t.br,paddingTop:14}}>
          {showSave?<div className="fu" style={{display:"flex",gap:8}}><input value={tplName} onChange={function(e){setTN(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")saveTpl();}} placeholder="Nome template..." style={{flex:1,background:t.s2,border:"1px solid "+t.br,borderRadius:8,color:t.tx,fontSize:13,padding:"8px 12px",fontFamily:t.F,outline:"none"}}/><Btn sm v="primary" t={t} onClick={saveTpl}>Salva</Btn><Btn sm t={t} onClick={function(){setShowSave(false);}}>Annulla</Btn></div>
          :<Btn v="ghost" sm t={t} onClick={function(){setShowSave(true);}} style={{color:t.gold}}><Ico name="tpl" size={13} color={t.gold}/>Salva come template</Btn>}
        </div>
      </div>
    </div>
  </div>;
}

// ─── ADD TASK MODAL ───────────────────────────────────────────────────────────
function AddModal(p){
  var data=p.data,setData=p.setData,lid=p.listId,defSt=p.stateId,onClose=p.onClose,t=p.t;
  var fr=getList(data,lid);if(!fr)return null;var li=fr.list;
  var [title,setTitle]=useState(""),[desc,setDesc]=useState(""),[due,setDue]=useState("");
  var [time,setTime]=useState(""),[stateId,setStateId]=useState(defSt||li.states[0].id),[assignees,setAssignees]=useState([]);
  function save(){if(!title.trim())return;setData(function(prev){return setList(prev,lid,function(l){l.tasks.push({id:uid(),title:title.trim(),desc:desc,assignees:assignees,start:TODAY,due:due||null,stateId:stateId,time:Number(time)||0,subtasks:[]});});});onClose();}
  function tog(u){setAssignees(function(p){return p.indexOf(u)>=0?p.filter(function(x){return x!==u;}):p.concat([u]);});}
  return <div onClick={function(e){if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(4,4,18,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1100}}>
    <div className="si" style={{background:t.s1,border:"1px solid "+t.br,borderRadius:18,width:480,padding:26,boxShadow:"0 24px 80px rgba(0,0,0,.6),0 0 0 1px "+t.ac+"30"}}>
      <h2 style={{fontFamily:t.FS,fontSize:17,fontWeight:800,color:t.tx,marginBottom:22,letterSpacing:"-.3px"}}>Nuova Task <span style={{color:t.ac}}>·</span> {li.name}</h2>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <input autoFocus value={title} onChange={function(e){setTitle(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")save();}} placeholder="Titolo della task..." style={{background:t.s2,border:"1px solid "+t.br,borderRadius:10,color:t.tx,fontSize:15,padding:"12px 16px",fontFamily:t.F,outline:"none",fontWeight:700,transition:"border-color .15s"}} onFocus={function(e){e.target.style.borderColor=t.ac;}} onBlur={function(e){e.target.style.borderColor=t.br;}}/>
        <textarea value={desc} onChange={function(e){setDesc(e.target.value);}} placeholder="Descrizione (opzionale)..." style={{background:t.s2,border:"1px solid "+t.br,borderRadius:10,color:t.tx,fontSize:13,padding:"11px 16px",fontFamily:t.F,outline:"none",resize:"none",height:70,lineHeight:1.6}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><div style={{fontSize:11,color:t.tx3,marginBottom:7,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Stato</div><select value={stateId} onChange={function(e){setStateId(e.target.value);}} style={{width:"100%",background:t.s2,border:"1px solid "+t.br,borderRadius:9,color:t.tx,fontSize:13,padding:"9px 12px",fontFamily:t.F,outline:"none"}}>{li.states.map(function(s){return <option key={s.id} value={s.id}>{s.name}</option>;})}</select></div>
          <div><div style={{fontSize:11,color:t.tx3,marginBottom:7,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Scadenza</div><input type="date" value={due} onChange={function(e){setDue(e.target.value);}} style={{width:"100%",background:t.s2,border:"1px solid "+t.br,borderRadius:9,color:t.tx,fontSize:13,padding:"9px 12px",fontFamily:t.F,outline:"none",colorScheme:t.mode}}/></div>
          <div><div style={{fontSize:11,color:t.tx3,marginBottom:7,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Assegnati</div><div style={{display:"flex",gap:5,flexWrap:"wrap",padding:"7px 10px",background:t.s2,border:"1px solid "+t.br,borderRadius:9,minHeight:40,alignItems:"center"}}>{data.team.map(function(u){var sel=assignees.indexOf(u.id)>=0;return <div key={u.id} onClick={function(){tog(u.id);}} style={{opacity:sel?1:.3,cursor:"pointer",transition:"all .15s",transform:sel?"scale(1.1)":"scale(1)"}}><Av uid={u.id} team={data.team} size={26} t={t}/></div>;})}</div></div>
          <div><div style={{fontSize:11,color:t.tx3,marginBottom:7,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Tempo Max (h)</div><input type="number" value={time} onChange={function(e){setTime(e.target.value);}} placeholder="0" min={0} style={{width:"100%",background:t.s2,border:"1px solid "+t.br,borderRadius:9,color:t.tx,fontSize:13,padding:"9px 12px",fontFamily:t.F,outline:"none"}}/></div>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:4}}>
          <Btn t={t} onClick={onClose}>Annulla</Btn>
          <Btn v="primary" t={t} onClick={save} style={{opacity:title.trim()?1:.5}}>Crea Task <Ico name="plus" size={14} color="#fff"/></Btn>
        </div>
      </div>
    </div>
  </div>;
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  // Theme as React state — single source of truth, no global mutation
  var [isDark,setIsDark]=useState(true);
  var t=isDark?DARK:LIGHT;

  var [data,setData]=useState(function(){
    var base = mkData();
    // Sync with logged in user if possible
    try {
      var storedUser = JSON.parse(localStorage.getItem(USER_KEY) || '{}');
      if (storedUser && storedUser.email) {
        base.userId = "u_shared";
        base.team.push({
          id: "u_shared",
          name: storedUser.nome + " " + (storedUser.cognome || ""),
          ini: (storedUser.nome?.[0] || "") + (storedUser.cognome?.[0] || ""),
          col: "#7c3aed"
        });
      }
    } catch(e) {}
    return base;
  });
  var [nav,setNav]=useState({view:"home",folderId:null,listId:null});
  var [mTask,setMTask]=useState(null),[mStates,setMStates]=useState(null),[mAdd,setMAdd]=useState(null);
  var [sbOpen,setSbOpen]=useState(true);

  // Timer
  var [elapsed,setElapsed]=useState({});
  var [active,setActive]=useState(null);
  var [startedAt,setStartedAt]=useState(null);
  var [tick,setTick]=useState(0);
  useEffect(function(){if(!active)return;var id=setInterval(function(){setTick(function(n){return n+1;});},1000);return function(){clearInterval(id);};},[active]);
  var getElapsed=useCallback(function(tid){var b=elapsed[tid]||0;if(active===tid&&startedAt)return b+(Date.now()-startedAt);return b;},[elapsed,active,startedAt,tick]);
  var startTimer=useCallback(function(tid){var now=Date.now();if(active&&active!==tid){var e=(elapsed[active]||0)+(now-startedAt);setElapsed(function(p){var n=Object.assign({},p);n[active]=e;return n;});}setActive(tid);setStartedAt(now);},[active,elapsed,startedAt]);
  var pauseTimer=useCallback(function(tid){if(active!==tid)return;var e=(elapsed[tid]||0)+(Date.now()-startedAt);setElapsed(function(p){var n=Object.assign({},p);n[tid]=e;return n;});setActive(null);setStartedAt(null);},[active,elapsed,startedAt]);
  var timer={active:active,elapsed:getElapsed,start:startTimer,pause:pauseTimer};

  function renderMain(){
    if(nav.view==="home"&&!nav.listId&&!nav.folderId)return <HomeView data={data} t={t} openTask={setMTask}/>;
    if(nav.folderId&&!nav.listId)return <DashView data={data} nav={nav} t={t} openTask={setMTask}/>;
    if(nav.listId){
      if(nav.view==="kanban")return <KanbanView data={data} setData={setData} nav={nav} t={t} openTask={setMTask} addTask={setMAdd}/>;
      if(nav.view==="cal")return <CalView data={data} nav={nav} t={t} openTask={setMTask}/>;
      return <ListView data={data} setData={setData} nav={nav} t={t} openTask={setMTask} addTask={setMAdd} timer={timer}/>;
    }
    return <HomeView data={data} t={t} openTask={setMTask}/>;
  }

  return <div style={{display:"flex",height:"100vh",background:t.bg,fontFamily:t.F,color:t.tx,overflow:"hidden"}}>
    <style>{CSS}</style>
    {sbOpen&&<Sidebar data={data} nav={nav} setNav={setNav} setData={setData} t={t}/>}
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
      <TopBar data={data} nav={nav} setNav={setNav} t={t} isDark={isDark} toggleTheme={function(){setIsDark(function(d){return !d;});}} timer={timer} sbOpen={sbOpen} setSbOpen={setSbOpen} openStates={function(){if(nav.listId)setMStates(nav.listId);}} addTask={function(sid){setMAdd({sid:sid});}}/>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{renderMain()}</div>
    </div>
    {mTask&&<TaskModal taskId={mTask} data={data} setData={setData} onClose={function(){setMTask(null);}} t={t}/>}
    {mStates&&<StModal listId={mStates} data={data} setData={setData} onClose={function(){setMStates(null);}} t={t}/>}
    {mAdd&&nav.listId&&<AddModal listId={nav.listId} stateId={mAdd.sid} data={data} setData={setData} onClose={function(){setMAdd(null);}} t={t}/>}
  </div>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
