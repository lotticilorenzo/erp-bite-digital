// SCREEN: REGOLE MATCHING
// ─────────────────────────────────────────────────────────
function RegoleScreen({state,dispatch}){
  const [modal,setModal]=React.useState(null);
  const [form,setForm]=React.useState({});
  const [saving,setSaving]=React.useState(false);
  const [applying,setApplying]=React.useState(false);
  const [applyResult,setApplyResult]=React.useState(null);

  const regole=state.regole||[];
  const fornitori=state.fornitori||[];

  const TIPI_MATCH=[
    {v:'contains',l:'Contiene'},
    {v:'startswith',l:'Inizia con'},
    {v:'regex',l:'Regex'},
  ];

  const CATEGORIE_CASSA=['Stipendi','Affitto','Utilities','Software','Advertising','Banca','Fiscale','Fornitore','Altro'];

  const openNew=()=>{
    setForm({nome:'',pattern:'',tipo_match:'contains',categoria:'',auto_riconcilia:false,priorita:0,attiva:true});
    setModal('new');
  };

  const openEdit=(r)=>{
    setForm({...r});
    setModal('edit');
  };

  const save=async e=>{
    e.preventDefault();
    setSaving(true);
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    const payload={
      nome:form.nome,
      pattern:form.pattern,
      tipo_match:form.tipo_match||'contains',
      categoria:form.categoria||null,
      fornitore_id:form.fornitore_id||null,
      auto_riconcilia:form.auto_riconcilia===true||form.auto_riconcilia==='true',
      priorita:parseInt(form.priorita)||0,
      attiva:form.attiva!==false,
    };
    try{
      const url=modal==='edit'?`/api/v1/regole-riconciliazione/${form.id}`:'/api/v1/regole-riconciliazione';
      const method=modal==='edit'?'PATCH':'POST';
      const res=await fetch(url,{method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(payload)});
      if(res.ok){
        const data=await res.json();
        if(modal==='edit') dispatch({type:'UPDATE',entity:'regole',item:data});
        else dispatch({type:'ADD',entity:'regole',item:data});
        setModal(null);
      }else{const err=await res.json().catch(()=>({}));alert('Errore: '+JSON.stringify(err));}
    }catch(e){console.error(e);}
    setSaving(false);
  };

  const deleteRegola=async(id)=>{
    if(!window.confirm('Eliminare questa regola?')) return;
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    const res=await fetch(`/api/v1/regole-riconciliazione/${id}`,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});
    if(res.ok) dispatch({type:'DELETE',entity:'regole',id});
  };

  const toggleAttiva=async(r)=>{
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    const res=await fetch(`/api/v1/regole-riconciliazione/${r.id}`,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({attiva:!r.attiva})});
    if(res.ok) dispatch({type:'UPDATE',entity:'regole',item:{...r,attiva:!r.attiva}});
  };

  const applicaRegole=async()=>{
    setApplying(true);
    setApplyResult(null);
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    try{
      const res=await fetch('/api/v1/regole-riconciliazione/applica',{method:'POST',headers:{'Authorization':'Bearer '+token}});
      if(res.ok){
        const data=await res.json();
        setApplyResult(data);
      }
    }catch(e){console.error(e);}
    setApplying(false);
  };

  const regoleAttive=regole.filter(r=>r.attiva);
  const regoleInattive=regole.filter(r=>!r.attiva);
  const totMatch=regole.reduce((s,r)=>s+(r.contatore_match||0),0);

  return <div style={{padding:'28px 32px',minHeight:'100vh',background:'var(--g1)'}}>
    <div style={{marginBottom:24,display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
      <div>
        <h1 style={{fontSize:26,fontWeight:800,color:'var(--white)',margin:0}}>Regole Matching</h1>
        <p style={{color:'var(--g4)',fontSize:13,margin:'4px 0 0'}}>{regole.length} regole · {regoleAttive.length} attive · {totMatch} match totali</p>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={applicaRegole} disabled={applying||regoleAttive.length===0} style={{padding:'8px 16px',borderRadius:8,border:'none',background:applying?'var(--g3)':'linear-gradient(135deg,var(--purple),var(--violet))',color:'white',fontSize:12,fontWeight:600,cursor:applying?'not-allowed':'pointer'}}>
          {applying?'⟳ Applicando...':'▶ Applica regole ora'}
        </button>
        <button onClick={openNew} style={{padding:'8px 16px',borderRadius:8,border:'none',background:'linear-gradient(135deg,var(--purple),var(--violet))',color:'white',fontSize:12,fontWeight:600,cursor:'pointer'}}>+ Nuova regola</button>
      </div>
    </div>

    {applyResult&&<div style={{background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.3)',borderRadius:10,padding:'12px 16px',marginBottom:16,display:'flex',gap:16,alignItems:'center'}}>
      <span style={{fontSize:20}}>✓</span>
      <div>
        <div style={{fontWeight:700,color:'var(--green)',fontSize:13}}>Regole applicate con successo</div>
        <div style={{fontSize:12,color:'var(--g4)',marginTop:2}}>Movimenti processati: <b style={{color:'var(--g6)'}}>{applyResult.movimenti_processati}</b> · Match trovati: <b style={{color:'var(--green)'}}>{applyResult.match_trovati}</b></div>
      </div>
      <button onClick={()=>setApplyResult(null)} style={{marginLeft:'auto',background:'none',border:'none',color:'var(--g4)',cursor:'pointer',fontSize:16}}>×</button>
    </div>}

    {/* KPI */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
      <KPI label='Regole totali' value={regole.length}/>
      <KPI label='Attive' value={regoleAttive.length} color='var(--green)'/>
      <KPI label='Auto-riconcilia' value={regole.filter(r=>r.auto_riconcilia&&r.attiva).length} color='var(--violet)'/>
      <KPI label='Match totali' value={totMatch} color='var(--amber)'/>
    </div>

    {/* TABELLA REGOLE */}
    <Card>
      <CH title='Regole configurate' meta={`${regole.length} regole`} action={
        <button onClick={openNew} style={{padding:'5px 10px',borderRadius:6,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g5)',fontSize:11,cursor:'pointer'}}>+ Nuova</button>
      }/>
      {regole.length===0?<Empty msg='Nessuna regola configurata. Crea la prima regola per automatizzare la riconciliazione.'/>:
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
        <thead><tr>
          <Th c='Nome'/>
          <Th c='Pattern'/>
          <Th c='Tipo match'/>
          <Th c='Categoria'/>
          <Th c='Auto-riconcilia'/>
          <Th c='Priorità'/>
          <Th c='Match'/>
          <Th c='Stato'/>
          <Th c=''/>
        </tr></thead>
        <tbody>
          {[...regole].sort((a,b)=>(b.priorita||0)-(a.priorita||0)).map(r=><TR key={r.id} style={{opacity:r.attiva?1:.5}}>
            <Td><span style={{fontWeight:700,color:'var(--white)'}}>{r.nome}</span></Td>
            <Td><code style={{fontFamily:'var(--fm)',fontSize:11,background:'var(--g3)',padding:'2px 6px',borderRadius:4,color:'var(--amber)'}}>{r.pattern}</code></Td>
            <Td><span style={{fontSize:11,color:'var(--g4)'}}>{TIPI_MATCH.find(t=>t.v===r.tipo_match)?.l||r.tipo_match}</span></Td>
            <Td>{r.categoria?<Badge s={r.categoria}/>:<span style={{color:'var(--g4)',fontSize:11}}>—</span>}</Td>
            <Td><span style={{fontSize:11,color:r.auto_riconcilia?'var(--green)':'var(--g4)'}}>{r.auto_riconcilia?'✓ Sì':'— No'}</span></Td>
            <Td mono style={{color:'var(--violet)'}}>{r.priorita||0}</Td>
            <Td mono style={{color:'var(--amber)',fontWeight:700}}>{r.contatore_match||0}</Td>
            <Td>
              <button onClick={()=>toggleAttiva(r)} style={{padding:'3px 8px',borderRadius:5,border:'1px solid var(--g3)',background:'var(--g2)',color:r.attiva?'var(--green)':'var(--g4)',fontSize:11,cursor:'pointer'}}>
                {r.attiva?'● Attiva':'○ Inattiva'}
              </button>
            </Td>
            <Td style={{display:'flex',gap:4}}>
              <Btn v='ghost' onClick={()=>openEdit(r)} s={{padding:'4px 8px',fontSize:11}}>✎</Btn>
              <Btn v='danger' onClick={()=>deleteRegola(r.id)} s={{padding:'4px 8px',fontSize:11}}>✕</Btn>
            </Td>
          </TR>)}
        </tbody>
      </table>}
    </Card>

    {/* GUIDA RAPIDA */}
    <Card style={{marginTop:16}}>
      <CH title='Guida pattern' meta='Esempi di configurazione'/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12,padding:'4px 0'}}>
        {[
          {pattern:'meta platforms',tipo:'contains',desc:'Commissioni Meta/Facebook Ads'},
          {pattern:'google',tipo:'contains',desc:'Google Ads, Google Workspace'},
          {pattern:'canva',tipo:'contains',desc:'Abbonamento Canva'},
          {pattern:'stipendio|accredito',tipo:'regex',desc:'Pagamenti stipendi (regex)'},
          {pattern:'com.banca',tipo:'startswith',desc:'Commissioni bancarie'},
          {pattern:'adobe',tipo:'contains',desc:'Adobe Creative Cloud'},
        ].map((ex,i)=><div key={i} style={{background:'var(--g2)',borderRadius:8,padding:'10px 12px',border:'1px solid var(--g3)'}}>
          <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:4}}>
            <code style={{fontFamily:'var(--fm)',fontSize:11,background:'var(--g3)',padding:'2px 6px',borderRadius:4,color:'var(--amber)'}}>{ex.pattern}</code>
            <span style={{fontSize:10,color:'var(--g4)',fontFamily:'var(--fm)'}}>{ex.tipo}</span>
          </div>
          <div style={{fontSize:11,color:'var(--g5)'}}>{ex.desc}</div>
        </div>)}
      </div>
    </Card>

    {/* MODAL */}
    {modal&&<Modal title={modal==='new'?'Nuova regola':'Modifica regola'} onClose={()=>setModal(null)}>
      <form onSubmit={save}>
        <FRow label='Nome regola'><input required value={form.nome||''} onChange={e=>setForm({...form,nome:e.target.value})} placeholder='es. Meta Ads'/></FRow>
        <FGrid>
          <FRow label='Pattern da cercare'><input required value={form.pattern||''} onChange={e=>setForm({...form,pattern:e.target.value})} placeholder='es. meta platforms'/></FRow>
          <FRow label='Tipo match'>
            <select value={form.tipo_match||'contains'} onChange={e=>setForm({...form,tipo_match:e.target.value})}>
              {TIPI_MATCH.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
            </select>
          </FRow>
        </FGrid>
        <FGrid>
          <FRow label='Categoria da assegnare'>
            <select value={form.categoria||''} onChange={e=>setForm({...form,categoria:e.target.value})}>
              <option value=''>— Nessuna —</option>
              {CATEGORIE_CASSA.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </FRow>
          <FRow label='Fornitore da associare'>
            <select value={form.fornitore_id||''} onChange={e=>setForm({...form,fornitore_id:e.target.value||null})}>
              <option value=''>— Nessuno —</option>
              {fornitori.map(f=><option key={f.id} value={f.id}>{f.ragione_sociale}</option>)}
            </select>
          </FRow>
        </FGrid>
        <FGrid>
          <FRow label='Priorità (più alto = prima)'>
            <input type='number' min='0' max='100' value={form.priorita||0} onChange={e=>setForm({...form,priorita:parseInt(e.target.value)||0})}/>
          </FRow>
          <FRow label='Auto-riconcilia automaticamente'>
            <select value={form.auto_riconcilia?'true':'false'} onChange={e=>setForm({...form,auto_riconcilia:e.target.value==='true'})}>
              <option value='false'>No — solo categorizza</option>
              <option value='true'>Sì — riconcilia automaticamente</option>
            </select>
          </FRow>
        </FGrid>
        <FActions onCancel={()=>setModal(null)} submitLabel={saving?'Salvataggio...':'Salva regola'} disabled={saving}/>
      </form>
    </Modal>}
  </div>;
}


function App(){
  const [state,dispatch]=useReducer(reducer,INIT);
  const [page,setPage]=useState('dashboard');
  const [drillCliente,setDrillCliente]=useState(null);
  const [drillProgetto,setDrillProgetto]=useState(null);
  const [drillCommessa,setDrillCommessa]=useState(null);
  const [showAlertSettings,setShowAlertSettings]=useState(false);
  const [chiusuraCommessaId,setChiusuraCommessaId]=useState(null);
  const [showConnectModal,setShowConnectModal]=useState(false);
  const [apiBaseUrl,setApiBaseUrl]=useState(localStorage.getItem(API_BASE_KEY)||API_BASE_DEFAULT);
  const [authToken,setAuthToken]=useState(localStorage.getItem(TOKEN_KEY)||'');
  const [authUser,setAuthUser]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(USER_KEY)||'null');}
    catch{return null;}
  });
  const isAdmin=authUser?.ruolo==='ADMIN';
  const [apiError,setApiError]=useState('');
  const [syncingCore,setSyncingCore]=useState(false);
  const [loginLoading,setLoginLoading]=useState(false);

  const updateAuthUser=user=>{
    setAuthUser(user||null);
    localStorage.setItem(USER_KEY,JSON.stringify(user||null));
  };

  const apiFetch=async(path,{method='GET',body,tokenOverride}={})=>{
    const token=tokenOverride!==undefined?tokenOverride:authToken;
    const base=(apiBaseUrl||API_BASE_DEFAULT).replace(/\/$/,'');
    const headers={'Content-Type':'application/json'};
    if(token) headers.Authorization=`Bearer ${token}`;
    const res=await fetch(`${base}${path}`,{
      method,
      headers,
      body:body?JSON.stringify(body):undefined,
    });
    if(!res.ok){
      if(res.status===401&&tokenOverride===undefined){
        setAuthToken('');setAuthUser(null);
        localStorage.removeItem('bite_erp_token');localStorage.removeItem('bite_erp_user');
        throw new Error('Sessione scaduta');
      }
      let msg=`HTTP ${res.status}`;
      try{
        const err=await res.json();
        msg=err.detail||err.message||msg;
      }catch{}
      throw new Error(msg);
    }
    if(res.status===204) return null;
    return await res.json();
  };

  const syncCoreData=async(tokenOverride,userOverride)=>{
    const tk=tokenOverride!==undefined?tokenOverride:authToken;
    if(!tk) return;
    try{
      setSyncingCore(true);
      setApiError('');
      const userRole=((userOverride?.ruolo||authUser?.ruolo)||'').toUpperCase();
      const canReadManagement=userRole==='ADMIN'||userRole==='PM';
      const requests=[
        {key:'me',run:()=>apiFetch('/auth/me',{tokenOverride:tk})},
        {key:'timesheet',run:()=>apiFetch('/timesheet',{tokenOverride:tk})},
      ];
      if(canReadManagement){
        requests.push(
          {key:'clienti',run:()=>apiFetch('/clienti',{tokenOverride:tk})},
          {key:'progetti',run:()=>apiFetch('/progetti',{tokenOverride:tk})},
          {key:'commesse',run:()=>apiFetch('/commesse',{tokenOverride:tk})},
          {key:'users',run:()=>apiFetch('/users',{tokenOverride:tk})},
          {key:'fatture_attive',run:()=>apiFetch('/fatture-attive',{tokenOverride:tk})},
          {key:'fatture_passive',run:()=>apiFetch('/fatture-passive',{tokenOverride:tk})},
          {key:'risorse',run:()=>apiFetch('/risorse',{tokenOverride:tk})},
          {key:'fornitori',run:()=>apiFetch('/fornitori',{tokenOverride:tk})},
          {key:'movimenti_cassa',run:()=>apiFetch('/movimenti-cassa',{tokenOverride:tk})},
          {key:'costi_fissi',run:()=>apiFetch('/costi-fissi',{tokenOverride:tk})},
          {key:'regole',run:()=>apiFetch('/regole-riconciliazione',{tokenOverride:tk})},
        );
      }

      const settled=await Promise.allSettled(requests.map(r=>r.run()));
      const data={};
      const errors=[];
      settled.forEach((res,idx)=>{
        const key=requests[idx].key;
        if(res.status==='fulfilled'){
          data[key]=res.value;
        }else{
          errors.push(`${key}: ${res.reason?.message||'errore'}`);
        }
      });

      if(data.me) updateAuthUser(data.me);

      if(data.clienti){
        const clientiSorted=[...(data.clienti||[])].sort((a,b)=>(a.ragione_sociale||'').localeCompare(b.ragione_sociale||''));
        dispatch({
          type:'SET_ENTITY',
          entity:'clienti',
          items:clientiSorted.map(c=>normalizeClienteFromApiWithState(c,state.clienti)),
        });
      }
      if(data.progetti){
        dispatch({
          type:'SET_ENTITY',
          entity:'progetti',
          items:(data.progetti||[]).map(p=>normalizeProgettoFromApi(p,state.progetti.find(x=>x.id===p.id))),
        });
      }
      let commesseSynced=state.commesse;
      if(data.commesse){
        commesseSynced=(data.commesse||[]).map(normalizeCommessaFromApi);
        dispatch({type:'SET_ENTITY',entity:'commesse',items:commesseSynced});
      }
      if(data.users){
        dispatch({type:'SET_ENTITY',entity:'users',items:(data.users||[]).map(normalizeUserFromApi)});
      }else if(data.me){
        dispatch({type:'SET_ENTITY',entity:'users',items:[normalizeUserFromApi(data.me)]});
      }
      if(data.timesheet){
        const commesseMap=Object.fromEntries((commesseSynced||state.commesse).map(cm=>[cm.id,cm]));
        dispatch({
          type:'SET_ENTITY',
          entity:'timesheet',
          items:(data.timesheet||[]).map(t=>normalizeTimesheetFromApi(t,{commesseMap,existingTimesheet:state.timesheet})),
        });
      }
      if(data.fatture_attive){
        dispatch({type:'SET_ENTITY',entity:'fatture_attive',items:(data.fatture_attive||[]).map(f=>({
          id:f.id, fic_id:f.fic_id, cliente_id:f.cliente_id,
          numero:f.numero, data_emissione:f.data_emissione, data_scadenza:f.data_scadenza,
          importo:parseFloat(f.importo_totale)||0, importo_pagato:parseFloat(f.importo_pagato)||0,
          importo_residuo:parseFloat(f.importo_residuo)||0, stato:f.stato_pagamento==='paid'?'INCASSATA':f.stato_pagamento==='partial'?'PARZIALE':'ATTESA', data_ultimo_incasso:f.data_ultimo_incasso||null,
          valuta:f.valuta||'EUR',
        }))});
      }
      if(data.risorse){
        dispatch({type:'SET_ENTITY',entity:'risorse',items:data.risorse});
      }
      if(data.fatture_passive){
        const fornitoriMap=Object.fromEntries((data.fornitori||state.fornitori||[]).map(f=>[f.id,f]));
        dispatch({type:'SET_ENTITY',entity:'fatture_passive',items:(data.fatture_passive||[]).map(f=>{
          const forn=fornitoriMap[f.fornitore_id];
          const statoRaw=f.stato_pagamento;
          const stato=statoRaw==='paid'?'PAGATA':statoRaw==='partial'?'PARZIALE':'ATTESA';
          const catRaw=(f.categoria||'').toLowerCase();
          const cat=catRaw==='expense'||catRaw===''?'ALTRO':catRaw.toUpperCase();
          const existing=state.fatture_passive.find(x=>x.id===f.id);
          return {
            id:f.id, fic_id:f.fic_id, fornitore_id:f.fornitore_id,
            fornitore:forn?.ragione_sociale||f.fornitore||existing?.fornitore||'—',
            numero:f.numero, data_emissione:f.data_emissione, data_scadenza:f.data_scadenza,
            importo:parseFloat(f.importo_totale)||0, importo_pagato:parseFloat(f.importo_pagato)||0,
            importo_residuo:parseFloat(f.importo_residuo)||0,
            importo_netto:parseFloat(f.importo_netto)||0, importo_iva:parseFloat(f.importo_iva)||0,
            stato, categoria:cat, valuta:f.valuta||'EUR',
            ricorrente:existing?.ricorrente||false,
            note:existing?.note||f.note||'',
            metodo_pagamento:f.metodo_pagamento||null,
            data_ultimo_pagamento:f.data_ultimo_pagamento||null,
          };
        })});
      }
      if(data.fornitori){
        dispatch({type:'SET_ENTITY',entity:'fornitori',items:(data.fornitori||[]).map(f=>({
          id:f.id, fic_id:f.fic_id, ragione_sociale:f.ragione_sociale,
          piva:f.piva, email:f.email, telefono:f.telefono, attivo:f.attivo,
        }))});
      }
      if(data.movimenti_cassa){
        dispatch({type:'SET_ENTITY',entity:'movimenti_cassa',items:((data.movimenti_cassa?.movimenti_cassa)||data.movimenti_cassa||[]).map(m=>({
          id:m.id,
          data_valuta:m.data_valuta,
          data_contabile:m.data_contabile,
          descrizione:m.descrizione,
          categoria:m.categoria,
          importo:parseFloat(m.importo)||0,
          tipo:m.tipo,
          fattura_attiva_id:m.fattura_attiva_id||null,
          fattura_passiva_id:m.fattura_passiva_id||null,
          riconciliato:m.riconciliato||false,
          note:m.note||null,
        }))});
      }
      if(data.regole){
        dispatch({type:'SET_ENTITY',entity:'regole',items:((data.regole?.regole)||data.regole||[])});
      }
      if(data.costi_fissi){
        dispatch({type:'SET_ENTITY',entity:'costi_fissi',items:((data.costi_fissi?.costi_fissi)||data.costi_fissi||[]).map(c=>({
          id:c.id,
          descrizione:c.descrizione,
          importo:parseFloat(c.importo)||0,
          categoria:c.categoria||'ALTRO',
          periodicita:c.periodicita||'mensile',
          attivo:c.attivo!==false,
          data_inizio:c.data_inizio||null,
          data_fine:c.data_fine||null,
          note:c.note||null,
        }))});
      }
      if(!canReadManagement){
        dispatch({type:'SET_ENTITY',entity:'clienti',items:[]});
        dispatch({type:'SET_ENTITY',entity:'progetti',items:[]});
        dispatch({type:'SET_ENTITY',entity:'commesse',items:[]});
      }

      if(errors.length>0){
        setApiError(`Sync API parziale: ${errors.join(' · ')}`);
      }
    }catch(err){
      setApiError(`Sync API fallita: ${err.message||'errore sconosciuto'}`);
    }finally{
      setSyncingCore(false);
    }
  };

  const handleLogin=async({email,password})=>{
    try{
      setLoginLoading(true);
      setApiError('');
      const data=await apiFetch('/auth/login',{method:'POST',body:{email,password},tokenOverride:''});
      if(!data?.access_token) throw new Error('Token non ricevuto');
      setAuthToken(data.access_token);
      updateAuthUser(data.user||null);
      localStorage.setItem(TOKEN_KEY,data.access_token);
      setShowConnectModal(false);
      await syncCoreData(data.access_token,data.user);
    }catch(err){
      setApiError(`Login API fallito: ${err.message||'errore sconosciuto'}`);
      throw err;
    }finally{
      setLoginLoading(false);
    }
  };

  const logout=()=>{
    setAuthToken('');
    updateAuthUser(null);
    setApiError('');
    localStorage.removeItem(TOKEN_KEY);
  };

  useEffect(()=>{
    localStorage.setItem(API_BASE_KEY,apiBaseUrl||API_BASE_DEFAULT);
  },[apiBaseUrl]);

  useEffect(()=>{
    if(!authToken) return;
    syncCoreData(authToken,authUser);
  },[authToken,apiBaseUrl,authUser?.ruolo]);

  const commesseApi={
    enabled:!!authToken,
    createCommessa:async payload=>{
      const data=await apiFetch('/commesse',{method:'POST',body:payload});
      return normalizeCommessaFromApi(data);
    },
    updateCommessa:async(id,payload)=>{
      const data=await apiFetch(`/commesse/${id}`,{method:'PATCH',body:payload});
      return normalizeCommessaFromApi(data);
    },
  };

  const clientiApi={
    enabled:!!authToken,
    listClienti:async()=>await apiFetch('/clienti'),
    deleteCliente:async id=>{
      await apiFetch(`/clienti/${id}`,{method:'DELETE'});
    },
    createCliente:async payload=>{
      const data=await apiFetch('/clienti',{method:'POST',body:payload});
      return normalizeClienteFromApiWithState(data,state.clienti);
    },
    updateCliente:async(id,payload)=>{
      const data=await apiFetch(`/clienti/${id}`,{method:'PATCH',body:payload});
      return normalizeClienteFromApiWithState(data,state.clienti);
    },
  };

  const progettiApi={
    enabled:!!authToken,
    listProgetti:async()=>await apiFetch('/progetti'),
    createProgetto:async(payload,{local}={})=>{
      const data=await apiFetch('/progetti',{method:'POST',body:payload});
      return normalizeProgettoFromApi(data,local);
    },
    updateProgetto:async(id,payload,{local}={})=>{
      const data=await apiFetch(`/progetti/${id}`,{method:'PATCH',body:payload});
      return normalizeProgettoFromApi(data,local||state.progetti.find(p=>p.id===id));
    },
    listServizi:async(progettoId)=>await apiFetch(`/progetti/${progettoId}/servizi`),
    createServizio:async(progettoId,payload)=>await apiFetch(`/progetti/${progettoId}/servizi`,{method:'POST',body:payload}),
    updateServizio:async(progettoId,servizioId,payload)=>await apiFetch(`/progetti/${progettoId}/servizi/${servizioId}`,{method:'PATCH',body:payload}),
    deleteServizio:async(progettoId,servizioId)=>await apiFetch(`/progetti/${progettoId}/servizi/${servizioId}`,{method:'DELETE'}),
  };

  const usersApi={
    enabled:!!authToken,
    listUsers:async()=>await apiFetch('/users'),
    createUser:async payload=>{
      const data=await apiFetch('/users',{method:'POST',body:payload});
      return normalizeUserFromApi(data);
    },
    updateUser:async(id,payload)=>{
      const data=await apiFetch(`/users/${id}`,{method:'PATCH',body:payload});
      return normalizeUserFromApi(data);
    },
  };

  const timesheetApi={
    enabled:!!authToken,
    listTimesheet:async()=>await apiFetch('/timesheet'),
    createTimesheet:async(payload,localMeta={})=>{
      const data=await apiFetch('/timesheet',{method:'POST',body:payload});
      const commesseMap=Object.fromEntries(state.commesse.map(cm=>[cm.id,cm]));
      const normalized=normalizeTimesheetFromApi(data,{commesseMap,existingTimesheet:state.timesheet});
      return {...normalized,...localMeta};
    },
    approveTimesheet:async(id,targetStatus)=>{
      const azione=targetStatus==='APPROVATO'?'APPROVA':'RIFIUTA';
      const list=await apiFetch('/timesheet/approva',{method:'POST',body:{ids:[id],azione}});
      const commesseMap=Object.fromEntries(state.commesse.map(cm=>[cm.id,cm]));
      return (list||[]).map(item=>normalizeTimesheetFromApi(item,{commesseMap,existingTimesheet:state.timesheet}));
    },
    bulkApprova:async(ids,azione)=>{
      const commesseMap=Object.fromEntries(state.commesse.map(cm=>[cm.id,cm]));
      const list=await apiFetch('/timesheet/approva',{method:'POST',body:{ids,azione}});
      return (list||[]).map(item=>normalizeTimesheetFromApi(item,{commesseMap,existingTimesheet:state.timesheet}));
    },
    bulkElimina:async(ids)=>{
      return await apiFetch('/timesheet/bulk',{method:'DELETE',body:{ids}});
    },
    bulkCambiaMese:async(ids,mese_competenza)=>{
      return await apiFetch('/timesheet/bulk-mese',{method:'PATCH',body:{ids,mese_competenza}});
    },
  };

  const pending=state.timesheet.filter(t=>t.stato==='PENDING').length;
  const fatScadute=state.fatture_attive.filter(f=>f.stato==='SCADUTA').length;
  const alerts=state.commesse.filter(cm=>{
    const progettoMap=Object.fromEntries(state.progetti.map(p=>[p.id,p]));
    const f=cm.progetti_ids.reduce((s,pid)=>{const p=progettoMap[pid];if(!p)return s;const dc=(cm.delivery_per_progetto||{})[pid]||0;return s+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0);
    const mo=cm.costo_manodopera||0;
    return f>0&&Math.round((f-mo)/f*100)<30;
  }).length;

  const visibleNav=useMemo(()=>NAV.filter(item=>{
    if(item.id==='profilo'&&!authToken) return false;
    if(item.id==='team'&&!isAdmin) return false;
    return true;
  }),[authToken,isAdmin]);
  const sections=[...new Set(visibleNav.map(n=>n.section))];

  const renderPage=()=>{
    switch(page){
      case 'dashboard':        return <DashboardScreen state={state} setPage={setPage} setDrillCliente={setDrillCliente} setDrillCommessa={setDrillCommessa}/>;
      case 'report':           return <ReportMensileScreen state={state} setPage={setPage}/>;
      case 'profilo':          return <ProfiloScreen authUser={authUser} api={usersApi} onAuthUserUpdate={updateAuthUser}/>;
      case 'clienti':          return <ClientiScreen state={state} dispatch={dispatch} setPage={setPage} setDrillCliente={setDrillCliente} api={clientiApi}/>
      case 'fornitori':         return <FornitoriScreen state={state} dispatch={dispatch}/>;
      case 'cliente_detail':   return <ClienteDetailScreen state={state} dispatch={dispatch} clienteId={drillCliente} setPage={setPage} setDrillProgetto={setDrillProgetto}/>;
      case 'progetti':         return <ProgettiScreen state={state} dispatch={dispatch} setPage={setPage} setDrillProgetto={setDrillProgetto} api={progettiApi}/>;
      case 'progetto_detail':  return <ProgettoDetailScreen state={state} progettoId={drillProgetto} setPage={setPage}/>;
      case 'commesse':         return <CommesseScreen state={state} dispatch={dispatch} setPage={setPage} setDrillCommessa={setDrillCommessa} onChiudi={id=>{setChiusuraCommessaId(id);}} api={commesseApi}/>;
      case 'commessa_detail':  return <CommessaDetailScreen state={state} commessaId={drillCommessa} setPage={setPage} onChiudi={id=>{setChiusuraCommessaId(id);}}/>;
      case 'timesheet':        return <TimesheetScreen state={state} dispatch={dispatch} api={timesheetApi} authUser={authUser}/>;
      case 'marginalita':      return <MarginalitaScreen state={state}/>;
      case 'finanziaria':      return <FinanziariaScreen state={state} dispatch={dispatch}/>;
      case 'cassa':            return <CassaScreen state={state} dispatch={dispatch}/>;
      case 'regole':           return <RegoleScreen state={state} dispatch={dispatch}/>;
      case 'team':             return <TeamScreen state={state} dispatch={dispatch} api={usersApi} isAdmin={isAdmin}/>;
      case 'risorse':         return <RisorseScreen state={state} dispatch={dispatch}/>;
      default: return null;
    }
  };

  const profileName=authUser?`${authUser.nome||''} ${authUser.cognome||''}`.trim():'Alessandro';
  const profileRole=authUser?.ruolo||'ADMIN';
  const profileInitial=(profileName||'A')[0].toUpperCase();

  if(!authToken) return <BackendConnectModal apiBaseUrl={apiBaseUrl} onApiBaseUrlChange={setApiBaseUrl} onClose={()=>{}} onLogin={handleLogin} loading={loginLoading} error={apiError}/>;
  return <div style={{display:'flex',minHeight:'100vh'}}>
    {showConnectModal&&<BackendConnectModal
      apiBaseUrl={apiBaseUrl}
      onApiBaseUrlChange={setApiBaseUrl}
      onClose={()=>setShowConnectModal(false)}
      onLogin={handleLogin}
      loading={loginLoading}
      error={apiError}
    />}
    {showAlertSettings&&<AlertSettingsModal state={state} dispatch={dispatch} onClose={()=>setShowAlertSettings(false)}/>}
    {chiusuraCommessaId&&<ChiusuraCommessaModal state={state} dispatch={dispatch} commessaId={chiusuraCommessaId} onClose={()=>setChiusuraCommessaId(null)} api={commesseApi}/>}
    <aside style={{width:216,minHeight:'100vh',background:'var(--g1)',borderRight:'1px solid var(--g2)',display:'flex',flexDirection:'column',position:'fixed',left:0,top:0,zIndex:100}}>
      <div style={{padding:'18px 16px 14px',borderBottom:'1px solid var(--g2)',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:32,height:32,background:'linear-gradient(135deg,var(--purple),var(--violet))',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:'white',flexShrink:0}}>B</div>
        <div><div style={{fontSize:14,fontWeight:700}}>Bite <span style={{color:'var(--violet)'}}>ERP</span></div><div style={{fontFamily:'var(--fm)',fontSize:9,color:'var(--g4)'}}>v3 · {authToken?'api':'demo'}</div></div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'8px 8px 0'}}>
        {sections.map(sec=>(
          <div key={sec}>
            <div style={{fontFamily:'var(--fm)',fontSize:9,color:'var(--g4)',letterSpacing:'.1em',textTransform:'uppercase',padding:'10px 10px 5px'}}>{sec}</div>
            {visibleNav.filter(n=>n.section===sec).map(item=>{
              const active=item.id===page||(item.id==='clienti'&&page==='cliente_detail')||(item.id==='progetti'&&page==='progetto_detail')||(item.id==='commesse'&&page==='commessa_detail');
              const badge=item.id==='timesheet'?pending:item.id==='finanziaria'?fatScadute:item.id==='marginalita'?alerts:0;
              return <div key={item.id} onClick={()=>setPage(item.id)}
                style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:8,cursor:'pointer',fontSize:12.5,fontWeight:500,marginBottom:2,transition:'all .12s',background:active?'var(--vdim)':'transparent',color:active?'var(--violet)':'var(--g5)',border:active?'1px solid rgba(176,96,224,.2)':'1px solid transparent'}}>
                <span style={{fontSize:13,opacity:.8}}>{item.icon}</span>
                <span style={{flex:1}}>{item.label}</span>
                {badge>0&&<span style={{background:item.id==='finanziaria'?'var(--red)':'var(--amber)',color:'#000',fontFamily:'var(--fm)',fontSize:9,padding:'1px 5px',borderRadius:10,fontWeight:700}}>{badge}</span>}
              </div>;
            })}
          </div>
        ))}
      </div>
      <div style={{padding:'8px 8px',borderTop:'1px solid var(--g2)'}}>
        <div onClick={()=>setShowConnectModal(true)} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:8,cursor:'pointer',color:'var(--g5)',fontSize:12,fontWeight:500,marginBottom:4,transition:'all .12s'}}>
          <span style={{fontSize:13}}>🔌</span><span>{authToken?'Riconnetti API':'Connetti API'}</span>
        </div>
        {authToken&&<div onClick={logout} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:8,cursor:'pointer',color:'var(--g5)',fontSize:12,fontWeight:500,marginBottom:4,transition:'all .12s'}}>
          <span style={{fontSize:13}}>⎋</span><span>Disconnetti API</span>
        </div>}
        <div onClick={()=>setShowAlertSettings(true)} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:8,cursor:'pointer',color:'var(--g5)',fontSize:12,fontWeight:500,marginBottom:4,transition:'all .12s'}}>
          <span style={{fontSize:13}}>⚙</span><span>Configura alert</span>
        </div>
        {syncingCore&&<div style={{fontFamily:'var(--fm)',fontSize:9,color:'var(--amber)',padding:'2px 10px 6px'}}>Sincronizzazione API...</div>}
        {apiError&&<div style={{fontFamily:'var(--fm)',fontSize:9,color:'var(--red)',padding:'2px 10px 6px'}}>{apiError}</div>}
        <div onClick={()=>authToken&&setPage('profilo')} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:8,background:'var(--vdim)',border:'1px solid rgba(176,96,224,.15)',cursor:authToken?'pointer':'default'}}>
          <div style={{width:26,height:26,borderRadius:'50%',background:'linear-gradient(135deg,var(--purple),var(--violet))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'white',flexShrink:0}}>{profileInitial}</div>
          <div><div style={{fontSize:12,fontWeight:600}}>{profileName}</div><div style={{fontFamily:'var(--fm)',fontSize:9,color:'var(--violet)'}}>{profileRole} · {authToken?'api':'demo'}</div></div>
        </div>
      </div>
    </aside>
    <main style={{marginLeft:216,flex:1,minHeight:'100vh'}}>{renderPage()}</main>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
