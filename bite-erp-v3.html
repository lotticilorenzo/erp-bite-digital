    </div>;
  }

  const openNew=()=>{setForm({nome:'',cognome:'',email:'',password:'',ruolo:'DIPENDENTE',costo_orario:30,attivo:true});setModal('new');};
  const openEdit=u=>{setForm({...u});setModal(u);};
  const closeModal=()=>{setModal(null);setForm({});setServizi([]);};

  const save=async e=>{
    e.preventDefault();
    const item={...form,costo_orario:parseFloat(form.costo_orario)||0};
    if(api?.enabled){
      try{
        setSaving(true);
        let saved;
        if(modal==='new'){
          if(!item.password||item.password.length<8){
            throw new Error('Password minima 8 caratteri');
          }
          saved=await api.createUser({
            nome:item.nome,
            cognome:item.cognome,
            email:item.email,
            password:item.password,
            ruolo:item.ruolo,
            costo_orario:item.costo_orario||0,
          });
        }else{
          const payload={
            nome:item.nome,
            cognome:item.cognome,
            ruolo:item.ruolo,
            costo_orario:item.costo_orario||0,
            attivo:item.attivo!==false,
          };
          if(item.password) payload.password=item.password;
          saved=await api.updateUser(modal.id,payload);
        }
        dispatch({type:'UPSERT',entity:'users',item:saved});
        closeModal();
      }catch(errApi){
        alert(`Errore salvataggio utente: ${errApi.message||'operazione non riuscita'}`);
      }finally{
        setSaving(false);
      }
      return;
    }
    if(modal==='new') dispatch({type:'ADD',entity:'users',item:{...item,id:uid()}});
    else dispatch({type:'UPDATE',entity:'users',item:{...modal,...item}});
    closeModal();
  };
  const del=async id=>{
    if(api?.enabled){
      try{
        const saved=await api.updateUser(id,{attivo:false});
        dispatch({type:'UPSERT',entity:'users',item:saved});
      }catch(errApi){
        alert(`Errore disattivazione utente: ${errApi.message||'operazione non riuscita'}`);
      }finally{
        setConfirm(null);
      }
      return;
    }
    dispatch({type:'DELETE',entity:'users',id});setConfirm(null);
  };

  const orePerUser=useMemo(()=>{
    const map={};
    state.timesheet.filter(t=>t.stato==='APPROVATO').forEach(t=>{map[t.user_id]=(map[t.user_id]||0)+t.durata_minuti;});
    return map;
  },[state.timesheet]);

  return <div className='fu'>
    {confirm&&<Confirm msg={`Disattivare "${confirm.nome} ${confirm.cognome}"?`} onConfirm={()=>del(confirm.id)} onClose={()=>setConfirm(null)}/>}
    {modal&&<Modal title={modal==='new'?'Nuovo utente':'Modifica utente'} onClose={closeModal}>
      <form onSubmit={save}>
        <FGrid><FRow label='Nome'><input required value={form.nome||''} onChange={e=>setForm({...form,nome:e.target.value})}/></FRow><FRow label='Cognome'><input required value={form.cognome||''} onChange={e=>setForm({...form,cognome:e.target.value})}/></FRow></FGrid>
        <FRow label='Email'><input type='email' required value={form.email||''} onChange={e=>setForm({...form,email:e.target.value})}/></FRow>
        <FRow label={modal==='new'?'Password':'Nuova password (opzionale)'}>
          <input type='password' value={form.password||''} onChange={e=>setForm({...form,password:e.target.value})} required={modal==='new'} minLength={8}/>
        </FRow>
        <FGrid>
          <FRow label='Ruolo'><select value={form.ruolo||'DIPENDENTE'} onChange={e=>setForm({...form,ruolo:e.target.value})}>{['ADMIN','PM','DIPENDENTE','FREELANCER'].map(r=><option key={r} value={r}>{r}</option>)}</select></FRow>
          <FRow label='€/ora'><input type='number' min='0' step='0.5' value={form.costo_orario||0} onChange={e=>setForm({...form,costo_orario:e.target.value})}/></FRow>
        </FGrid>
        <FRow label='Stato'><select value={form.attivo?'true':'false'} onChange={e=>setForm({...form,attivo:e.target.value==='true'})}><option value='true'>Attivo</option><option value='false'>Inattivo</option></select></FRow>
        <FActions onCancel={closeModal} submitLabel={saving?'Salvataggio...':'Salva'}/>
      </form>
    </Modal>}
    <Topbar title='Utenti'><Btn v='primary' onClick={openNew}>+ Nuovo utente</Btn></Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Risorse attive' value={state.users.filter(u=>u.attivo).length} delay={.05}/>
        <KPI label='Dipendenti' value={state.users.filter(u=>u.ruolo==='DIPENDENTE').length} delay={.08}/>
        <KPI label='Freelancer' value={state.users.filter(u=>u.ruolo==='FREELANCER').length} delay={.11}/>
        <KPI label='Costo orario medio' value={`€ ${state.users.length>0?(state.users.reduce((s,u)=>s+(u.costo_orario||0),0)/state.users.length).toFixed(0):0}`} delay={.14}/>
      </div>
      <Card>
        <CH title='Anagrafica utenti' action={<Btn v='primary' onClick={openNew} s={{fontSize:11,padding:'5px 10px'}}>+ Nuovo</Btn>}/>
        {state.users.length===0?<Empty msg='Nessuna risorsa'/>:
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='Risorsa'/><Th c='Email'/><Th c='Ruolo'/><Th c='€/ora'/><Th c='Ore (approv.)'/><Th c='Stato'/><Th c=''/></tr></thead>
          <tbody>
            {state.users.map(u=><TR key={u.id} onClick={()=>openEdit(u)}>
              <Td><div style={{display:'flex',alignItems:'center',gap:10}}><Av u={u} size={28}/><div style={{fontWeight:700}}>{u.nome} {u.cognome}</div></div></Td>
              <Td mono muted>{u.email}</Td>
              <Td><Badge s={u.ruolo}/></Td>
              <Td mono>€ {u.costo_orario}</Td>
              <Td mono>{fmtMin(orePerUser[u.id]||0)}</Td>
              <Td><Badge s={u.attivo?'ATTIVO':'INATTIVO'}/></Td>
              <Td><div onClick={e=>e.stopPropagation()} style={{display:'flex',gap:6}}>
                <Btn v='ghost' onClick={()=>openEdit(u)} s={{padding:'4px 8px',fontSize:11}}>Modifica</Btn>
                {u.attivo&&<Btn v='danger' onClick={()=>setConfirm(u)} s={{padding:'4px 8px',fontSize:11}}>Disattiva</Btn>}
              </div></Td>
            </TR>)}
          </tbody>
        </table>}
      </Card>
    </div>
  </div>;
}

// ─────────────────────────────────────────────────────────
// SCREEN: PROGETTO DETAIL (dashboard per categoria)
// ─────────────────────────────────────────────────────────
function ProgettoDetailScreen({state,progettoId,setPage}) {
  const p = state.progetti.find(x=>x.id===progettoId);
  const clienteMap=useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);
  const userMap=useMemo(()=>Object.fromEntries(state.users.map(u=>[u.id,u])),[state.users]);
  if(!p) return <div style={{padding:32,color:'var(--g4)'}}>Progetto non trovato</div>;

  const cl=clienteMap[p.cliente_id];
  // Commesse di questo progetto (storico)
  const commesse=state.commesse.filter(cm=>cm.progetti_ids.includes(p.id)).sort((a,b)=>b.mese_competenza.localeCompare(a.mese_competenza));
  // Timesheet del progetto
  const ts=state.timesheet.filter(t=>t.progetto_id===p.id);
  const oreAppr=ts.filter(t=>t.stato==='APPROVATO').reduce((s,t)=>s+t.durata_minuti,0);
  // KPI comuni
  const totFatt=commesse.reduce((s,cm)=>{const dc=(cm.delivery_per_progetto||{})[p.id]||0;return s+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0);
  const totMO=commesse.reduce((s,cm)=>s+(cm.costo_manodopera||0),0);
  const margTot=totFatt>0?Math.round((totFatt-totMO)/totFatt*100):0;
  const soglia=p.soglia_margine||30;

  // BarChart inline helper
  const BarChart=({data,keyA,keyB,labelA,labelB,colorA,colorB,height=100})=>{
    const max=Math.max(...data.map(d=>Math.max(d[keyA]||0,d[keyB]||0)),1);
    return <div style={{display:'flex',gap:6,alignItems:'flex-end',height:height+24}}>
      {data.map((d,i)=>{
        const ha=Math.round(((d[keyA]||0)/max)*height);
        const hb=Math.round(((d[keyB]||0)/max)*height);
        return <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          <div style={{width:'100%',display:'flex',gap:2,alignItems:'flex-end',height:height}}>
            {keyA&&<div style={{flex:1,height:ha,background:colorA||'var(--violet)',borderRadius:'3px 3px 0 0',minHeight:2,transition:'height .4s'}}/>}
            {keyB&&<div style={{flex:1,height:hb,background:colorB||'var(--g3)',borderRadius:'3px 3px 0 0',minHeight:2,transition:'height .4s'}}/>}
          </div>
          <span style={{fontFamily:'var(--fm)',fontSize:9,color:'var(--g4)',whiteSpace:'nowrap'}}>{meseFmt(d.mese).split(' ')[0]}</span>
        </div>;
      })}
    </div>;
  };

  // LineChart inline
  const LineChart=({data,valueKey,color,height=80})=>{
    const vals=data.map(d=>d[valueKey]||0);
    const max=Math.max(...vals,1), min=Math.min(...vals,0);
    const range=max-min||1;
    const pts=vals.map((v,i)=>{
      const x=(i/(vals.length-1||1))*100;
      const y=100-((v-min)/range)*100;
      return `${x},${y}`;
    }).join(' ');
    return <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{width:'100%',height,display:'block'}}>
      <polyline points={pts} fill="none" stroke={color||'var(--violet)'} strokeWidth="2.5" vectorEffect="non-scaling-stroke" strokeLinejoin="round" strokeLinecap="round"/>
      {vals.map((v,i)=>{
        const x=(i/(vals.length-1||1))*100;
        const y=100-((v-min)/range)*100;
        return <circle key={i} cx={x} cy={y} r="3" fill={color||'var(--violet)'} vectorEffect="non-scaling-stroke"/>;
      })}
    </svg>;
  };

  const catColor={'SOCIAL':'var(--violet)','WEB':'#60a5fa','MARKETING':'var(--amber)'};
  const cc=catColor[p.categoria]||'var(--violet)';

  return <div className='fu'>
    <Topbar title={p.nome} sub={`${cl?.codice} · ${cl?.ragione_sociale} · ${p.categoria}`}>
      <Btn v='ghost' onClick={()=>setPage('progetti')}>← Progetti</Btn>
      <Badge s={p.categoria}/>
      <Badge s={p.stato}/>
    </Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Fatturato totale' value={fmtEuro(totFatt)} delay={.04}/>
        <KPI label='Margine complessivo' value={`${margTot}%`} color={margTot>=soglia?'var(--green)':margTot>=(soglia-10)?'var(--amber)':'var(--red)'} delay={.07}/>
        <KPI label='Ore lavorate' value={fmtMin(oreAppr)} delay={.10}/>
        <KPI label='Commesse storico' value={commesse.length} delay={.13}/>
      </div>

      {/* ── SOCIAL ── */}
      {p.categoria==='SOCIAL'&&<>
        {/* Trend delivery + fatturabile */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          <Card>
            <CH title='Trend delivery' meta='Attesa vs consuntiva · 6 mesi'/>
            <div style={{padding:'16px 18px'}}>
              {commesse.length===0?<Empty msg='Nessun dato storico'/>:<>
                <BarChart
                  data={[...commesse].reverse().slice(0,6).map(cm=>({mese:cm.mese_competenza,attesa:p.delivery_attesa,cons:(cm.delivery_per_progetto||{})[p.id]||0}))}
                  keyA='attesa' keyB='cons' labelA='Attesa' labelB='Consuntiva'
                  colorA='var(--g3)' colorB='var(--violet)' height={90}
                />
                <div style={{display:'flex',gap:16,marginTop:10,fontFamily:'var(--fm)',fontSize:11}}>
                  <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:2,background:'var(--g3)',display:'inline-block'}}/>Attesa ({p.delivery_attesa})</span>
                  <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:2,background:'var(--violet)',display:'inline-block'}}/>Consuntiva</span>
                </div>
              </>}
            </div>
          </Card>
          <Card>
            <CH title='Trend fatturabile' meta='Andamento mensile'/>
            <div style={{padding:'16px 18px'}}>
              {commesse.length<2?<Empty msg='Almeno 2 mesi per il trend'/>:<>
                <LineChart
                  data={[...commesse].reverse().slice(0,6).map(cm=>{const dc=(cm.delivery_per_progetto||{})[p.id]||0;return {mese:cm.mese_competenza,valore:fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc)};})}
                  valueKey='valore' color='var(--violet)' height={90}
                />
                <div style={{display:'flex',justifyContent:'space-between',marginTop:10}}>
                  {[...commesse].reverse().slice(0,6).map((cm,i)=>{
                    const dc=(cm.delivery_per_progetto||{})[p.id]||0;
                    const v=fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);
                    return <span key={i} style={{fontFamily:'var(--fm)',fontSize:9,color:'var(--g4)',textAlign:'center'}}>
                      {meseFmt(cm.mese_competenza).split(' ')[0]}<br/><b style={{color:'var(--violet)',fontSize:10}}>{Math.round(v)}</b>
                    </span>;
                  })}
                </div>
              </>}
            </div>
          </Card>
        </div>
        {/* Margine e alert soglia */}
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:16}}>
          <Card>
            <CH title='Margine mensile' meta={`Soglia configurata: ${soglia}%`}/>
            <div style={{padding:'16px 18px'}}>
              {commesse.length===0?<Empty msg='Nessun dato'/>:
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
                <thead><tr><Th c='Mese'/><Th c='Delivery'/><Th c='Fatturabile'/><Th c='Costo M.O.'/><Th c='Margine'/><Th c='Stato'/></tr></thead>
                <tbody>
                  {commesse.slice(0,6).map(cm=>{
                    const dc=(cm.delivery_per_progetto||{})[p.id]||0;
                    const f=fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);
                    const mo=cm.costo_manodopera||0; const mp=f>0?Math.round((f-mo)/f*100):0;
                    const ok=mp>=soglia;
                    return <TR key={cm.id}>
                      <Td>{meseFmt(cm.mese_competenza)}</Td>
                      <Td><Pips total={p.delivery_attesa} done={dc}/></Td>
                      <Td mono>{fmtEuro(f)}</Td>
                      <Td mono>{fmtEuro(mo)}</Td>
                      <Td><div style={{display:'flex',alignItems:'center',gap:6}}><MBar pct={mp}/>{!ok&&<span style={{color:'var(--red)',fontSize:11}}>⚠</span>}</div></Td>
                      <Td><Badge s={cm.stato}/></Td>
                    </TR>;
                  })}
                </tbody>
              </table>}
            </div>
          </Card>
          <Card>
            <CH title='Performance contenuti' meta='Mese corrente'/>
            <div style={{padding:'16px 18px'}}>
              {commesse[0]&&<>
                <div style={{marginBottom:16}}>
                  <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',marginBottom:6}}>DELIVERY MESE CORRENTE</div>
                  <div style={{fontSize:28,fontWeight:800,letterSpacing:-1}}>
                    {(commesse[0].delivery_per_progetto||{})[p.id]||0}
                    <span style={{fontSize:14,fontWeight:500,color:'var(--g4)',marginLeft:4}}>/ {p.delivery_attesa}</span>
                  </div>
                  <MBar pct={Math.round(((commesse[0].delivery_per_progetto||{})[p.id]||0)/p.delivery_attesa*100)} size={6}/>
                </div>
                <div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Prezzo per contenuto</div>
                <div style={{fontSize:16,fontWeight:700,color:'var(--violet)'}}>{fmtEuro(p.delivery_attesa>0?p.importo_variabile/p.delivery_attesa:0)}</div>
                {(commesse[0].delivery_per_progetto||{})[p.id]>p.delivery_attesa&&
                  <div style={{marginTop:10,background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.2)',borderRadius:6,padding:'8px 10px',fontFamily:'var(--fm)',fontSize:11,color:'var(--amber)'}}>
                    ⬆ Over delivery +{((commesse[0].delivery_per_progetto||{})[p.id]||0)-p.delivery_attesa} contenuti — fatturato extra {fmtEuro((((commesse[0].delivery_per_progetto||{})[p.id]||0)-p.delivery_attesa)*(p.importo_variabile/p.delivery_attesa))}
                  </div>}
              </>}
            </div>
          </Card>
        </div>
      </>}

      {/* ── WEB ── */}
      {p.categoria==='WEB'&&<>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          <Card>
            <CH title='Avanzamento milestone' meta={`${(p.milestone||[]).filter(m=>m.stato==='DONE').length}/${(p.milestone||[]).length} completate`}/>
            <div style={{padding:'16px 18px'}}>
              {(p.milestone||[]).length===0?<Empty msg='Nessuna milestone definita'/>:<>
                {/* Progress bar globale */}
                <div style={{marginBottom:18}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Avanzamento progetto</span>
                    <span style={{fontFamily:'var(--fm)',fontSize:12,fontWeight:700,color:'#60a5fa'}}>{Math.round((p.milestone||[]).filter(m=>m.stato==='DONE').length/(p.milestone||[]).length*100)}%</span>
                  </div>
                  <MBar pct={Math.round((p.milestone||[]).filter(m=>m.stato==='DONE').length/(p.milestone||[]).length*100)} size={8}/>
                </div>
                {(p.milestone||[]).map((m,i)=>{
                  const icons={DONE:'✓',IN_PROGRESS:'⋯',TODO:'○'};
                  const cols={DONE:'var(--green)',IN_PROGRESS:'var(--amber)',TODO:'var(--g4)'};
                  return <div key={m.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                    <div style={{width:28,height:28,borderRadius:'50%',border:`2px solid ${cols[m.stato]}`,display:'flex',alignItems:'center',justifyContent:'center',color:cols[m.stato],fontSize:12,flexShrink:0}}>{icons[m.stato]}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{m.nome}</div>
                      <Badge s={m.stato}/>
                    </div>
                    <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>#{i+1}</span>
                  </div>;
                })}
              </>}
            </div>
          </Card>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <Card>
              <CH title='Budget e costi' meta='Progetto one-off'/>
              <div style={{padding:'16px 18px'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
                  <div><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>VALORE CONTRATTO</div><div style={{fontSize:22,fontWeight:800,color:'#60a5fa'}}>{fmtEuro(p.importo_fisso)}</div></div>
                  <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>COSTO M.O. TOT.</div><div style={{fontSize:22,fontWeight:800}}>{fmtEuro(totMO)}</div></div>
                </div>
                <Divider m={12}/>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Margine stimato</span>
                  <span style={{fontSize:18,fontWeight:800,color:margTot>=soglia?'var(--green)':'var(--red)'}}>{margTot}%</span>
                </div>
                <MBar pct={margTot} size={6}/>
              </div>
            </Card>
            <Card>
              <CH title='Task ClickUp' meta='Stato attuale'/>
              {CLICKUP_TASKS.filter(t=>t.project_id===p.id).map(t=><div key={t.id} style={{display:'flex',gap:10,padding:'10px 18px',borderBottom:'1px solid rgba(255,255,255,.04)',alignItems:'center'}}>
                <div style={{width:6,alignSelf:'stretch',borderRadius:3,background:t.status==='complete'?'var(--green)':t.status==='in progress'?'var(--amber)':'var(--g3)',flexShrink:0}}/>
                <div style={{flex:1,fontSize:12,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                <Badge s={t.status}/>
              </div>)}
            </Card>
          </div>
        </div>
      </>}

      {/* ── MARKETING ── */}
      {p.categoria==='MARKETING'&&<>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          <Card>
            <CH title='Budget campagne' meta='Gestione spesa media'/>
            <div style={{padding:'18px 18px'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:18}}>
                <div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.15)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--amber)',marginBottom:4}}>BUDGET MENSILE</div>
                  <div style={{fontSize:20,fontWeight:800,color:'var(--amber)'}}>{fmtEuro(p.budget_campagna)}</div>
                </div>
                <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.15)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--red)',marginBottom:4}}>SPESO (MESE)</div>
                  <div style={{fontSize:20,fontWeight:800,color:'var(--red)'}}>{fmtEuro(p.speso_campagna||0)}</div>
                </div>
              </div>
              <div style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Utilizzo budget</span>
                  <span style={{fontFamily:'var(--fm)',fontSize:12,fontWeight:700,color:'var(--amber)'}}>{p.budget_campagna>0?Math.round((p.speso_campagna||0)/p.budget_campagna*100):0}%</span>
                </div>

                  <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>COSTO M.O.</div><div style={{fontSize:20,fontWeight:800}}>{fmtEuro(commesse[0]?.costo_manodopera||0)}</div></div>

                  <span style={{fontSize:18,fontWeight:800,color:margTot>=soglia?'var(--green)':'var(--red)'}}>{margTot}%</span>

                <div style={{width:6,alignSelf:'stretch',borderRadius:3,background:t.status==='complete'?'var(--green)':t.status==='in progress'?'var(--amber)':'var(--g3)',flexShrink:0}}/>

                <Badge s={t.status}/>

        </div>
        {/* Trend storico retainer */}
        {commesse.length>=2&&<Card>
          <CH title='Storico retainer' meta={`${commesse.length} mesi`}/>
          <div style={{padding:'16px 18px'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
              <thead><tr><Th c='Mese'/><Th c='Retainer'/><Th c='Costo M.O.'/><Th c='Margine'/><Th c='Stato'/></tr></thead>
              <tbody>
                {commesse.slice(0,6).map(cm=>{
                  const f=p.importo_fisso; const mo=cm.costo_manodopera||0; const mp=f>0?Math.round((f-mo)/f*100):0;
                  return <TR key={cm.id}>
                    <Td>{meseFmt(cm.mese_competenza)}</Td>
                    <Td mono>{fmtEuro(f)}</Td>

                    <Td><Badge s={cm.stato}/></Td>

      {/* Timesheet comune a tutte le categorie */}
      {ts.length>0&&<Card s={{marginTop:16}}>
        <CH title='Timesheet progetto' meta={`${ts.length} registrazioni`}/>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>

                <Td>{task?.name||'—'}</Td>

                <Td><Badge s={t.stato}/></Td>
              </TR>;
            })}

        </table>
      </Card>}
    </div>
  </div>;
}

// SCREEN: MARGINALITÀ
// ─────────────────────────────────────────────────────────
function MarginalitaScreen({state}) {
  const [filterMese,setFilterMese]=useState('');
  const progettoMap=useMemo(()=>Object.fromEntries(state.progetti.map(p=>[p.id,p])),[state.progetti]);
  const clienteMap=useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);

  const mesiDisponibili=useMemo(()=>{const s=new Set(state.commesse.map(c=>c.mese_competenza));return [...s].sort().reverse();},[state.commesse]);

  const filteredComm=filterMese?state.commesse.filter(c=>c.mese_competenza===filterMese):state.commesse;

  const byCliente=useMemo(()=>{
    const map={};
    filteredComm.forEach(cm=>{
      const cl=clienteMap[cm.cliente_id]; if(!cl) return;
      if(!map[cl.id]) map[cl.id]={id:cl.id,codice:cl.codice,nome:cl.ragione_sociale,fatturato:0,costi:0,n:0,perCategoria:{}};
      cm.progetti_ids.forEach(pid=>{
        const p=progettoMap[pid]; if(!p) return;
        const dc=(cm.delivery_per_progetto||{})[pid]||0;
        const f=fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);
        map[cl.id].fatturato+=f;
        map[cl.id].costi+=cm.costo_manodopera||0;
        map[cl.id].n++;
        if(!map[cl.id].perCategoria[p.categoria]) map[cl.id].perCategoria[p.categoria]=0;
        map[cl.id].perCategoria[p.categoria]+=f;
      });
    });
    return Object.values(map).map(r=>({...r,margine:r.fatturato>0?Math.round((r.fatturato-r.costi)/r.fatturato*100):0})).sort((a,b)=>b.margine-a.margine);
  },[filteredComm,progettoMap,clienteMap]);

  const perCategoria=useMemo(()=>{
    const map={SOCIAL:{fatturato:0,costi:0,n:0},WEB:{fatturato:0,costi:0,n:0},MARKETING:{fatturato:0,costi:0,n:0}};
    filteredComm.forEach(cm=>{
      cm.progetti_ids.forEach(pid=>{
        const p=progettoMap[pid]; if(!p||!map[p.categoria]) return;
        const dc=(cm.delivery_per_progetto||{})[pid]||0;
        map[p.categoria].fatturato+=fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);
        map[p.categoria].costi+=cm.costo_manodopera||0;
        map[p.categoria].n++;
      });
    });
    return map;
  },[filteredComm,progettoMap]);

  const totFatt=byCliente.reduce((s,r)=>s+r.fatturato,0);
  const totCosti=byCliente.reduce((s,r)=>s+r.costi,0);
  const margMedio=totFatt>0?Math.round((totFatt-totCosti)/totFatt*100):0;

  const catColor={SOCIAL:'var(--violet)',WEB:'#60a5fa',MARKETING:'var(--amber)'};
  const maxFatt=Math.max(...byCliente.map(r=>r.fatturato),1);

  return <div className='fu'>
    <Topbar title='Marginalità' sub={filterMese?meseFmt(filterMese):'Tutti i mesi'}>
      <select value={filterMese} onChange={e=>setFilterMese(e.target.value)} style={{width:160,height:34,padding:'0 10px'}}>
        <option value=''>Tutti i mesi</option>
        {mesiDisponibili.map(m=><option key={m} value={m}>{meseFmt(m)}</option>)}
      </select>
    </Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Fatturato totale' value={fmtEuro(totFatt)} delay={.04}/>
        <KPI label='Margine medio ponderato' value={`${margMedio}%`} color={margMedio>=40?'var(--green)':margMedio>=25?'var(--amber)':'var(--red)'} delay={.07}/>
        <KPI label='Clienti sopra soglia' value={byCliente.filter(r=>r.margine>=30).length} delay={.10}/>
        <KPI label='Clienti sotto soglia' value={byCliente.filter(r=>r.margine<30).length} warn={byCliente.filter(r=>r.margine<30).length>0} delay={.13}/>
      </div>

      {/* Per categoria */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:22}}>
        {Object.entries(perCategoria).map(([cat,d])=>{
          const mp=d.fatturato>0?Math.round((d.fatturato-d.costi)/d.fatturato*100):0;
          return <Card key={cat}>
            <div style={{padding:'16px 18px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <Badge s={cat}/>
                <span style={{fontFamily:'var(--fm)',fontSize:18,fontWeight:800,color:catColor[cat]}}>{mp}%</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)',marginBottom:8}}>
                <span>{fmtEuro(d.fatturato)}</span><span>{d.n} commesse</span>
              </div>
              <MBar pct={mp} size={5}/>
            </div>
          </Card>;
        })}
      </div>

      {/* Dettaglio per cliente con barre visuali */}
      <Card>
        <CH title='Ranking clienti per margine' meta={`${byCliente.length} clienti`}/>
        {byCliente.length===0?<Empty msg='Nessun dato disponibile'/>:
        <div style={{padding:'8px 0'}}>
          {byCliente.map((r,i)=>{
            const barW=Math.round(r.fatturato/maxFatt*100);
            const margColor=r.margine>=40?'var(--green)':r.margine>=25?'var(--amber)':'var(--red)';
            return <div key={r.id} style={{padding:'12px 18px',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)',width:20,flexShrink:0}}>#{i+1}</span>
                <span style={{fontFamily:'var(--fm)',fontWeight:700,color:'var(--violet)',letterSpacing:1,fontSize:12,width:36,flexShrink:0}}>{r.codice}</span>
                <span style={{fontWeight:700,flex:1}}>{r.nome}</span>
                <div style={{display:'flex',gap:6}}>
                  {Object.entries(r.perCategoria).map(([cat])=><Badge key={cat} s={cat}/>)}
                </div>
                <span style={{fontFamily:'var(--fm)',fontSize:14,fontWeight:800,color:margColor,width:48,textAlign:'right'}}>{r.margine}%</span>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <div style={{flex:1,height:6,background:'var(--g2)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${barW}%`,background:`linear-gradient(90deg,var(--purple),var(--violet))`,borderRadius:3,transition:'width .5s'}}/>
                </div>
                <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)',width:90,textAlign:'right'}}>{fmtEuro(r.fatturato)}</span>
                <span style={{fontFamily:'var(--fm)',fontSize:11,color:margColor,width:70,textAlign:'right'}}>M: {fmtEuro(r.fatturato-r.costi)}</span>
              </div>
            </div>;
          })}
        </div>}
      </Card>
    </div>
  </div>;
}

// SCREEN: FLUSSO CHIUSURA COMMESSA
// ─────────────────────────────────────────────────────────
function ChiusuraCommessaModal({state,dispatch,commessaId,onClose,api}) {
  const [step,setStep]=useState(1); // 1=riepilogo, 2=fattura, 3=done
  const [formFatt,setFormFatt]=useState({});
  const [saving,setSaving]=useState(false);

  const cm=state.commesse.find(c=>c.id===commessaId);
  const progettoMap=useMemo(()=>Object.fromEntries(state.progetti.map(p=>[p.id,p])),[state.progetti]);
  const clienteMap=useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);

  if(!cm) return null;
  const cl=clienteMap[cm.cliente_id];
  const rigaData = pid => {
    const p=progettoMap[pid]||{};
    const snap=(cm.snapshot_per_progetto||{})[pid]||{};
    const dc=(cm.delivery_per_progetto||{})[pid] ?? snap.delivery_consuntiva ?? 0;
    return {
      p,
      dc,
      importo_fisso:snap.importo_fisso ?? p.importo_fisso ?? 0,
      importo_variabile:snap.importo_variabile ?? p.importo_variabile ?? 0,
      delivery_attesa:snap.delivery_attesa ?? p.delivery_attesa ?? 0,
    };
  };
  const totFatt=cm.progetti_ids.reduce((s,pid)=>{const r=rigaData(pid);return s+fatt(r.importo_fisso,r.importo_variabile,r.delivery_attesa,r.dc);},0);
  const mo=cm.costo_manodopera||0;
  const mp=totFatt>0?Math.round((totFatt-mo)/totFatt*100):0;

  const nextNumFatt=state.fatture_attive.length+1;
  const scadenzaDefault=()=>{
    const d=new Date(); d.setDate(d.getDate()+30);
    return d.toISOString().slice(0,10);
  };

  const initFatt=()=>setFormFatt({
    cliente_id:cm.cliente_id,
    numero:`FT-${new Date().getFullYear()}-${String(nextNumFatt).padStart(3,'0')}`,
    data_emissione:nowDate(),
    data_scadenza:scadenzaDefault(),
    importo:totFatt.toFixed(2),
    stato:'ATTESA',
    note:`Commessa ${meseFmt(cm.mese_competenza)} — ${cm.progetti_ids.map(pid=>progettoMap[pid]?.nome||'').join(', ')}`,
  });

  const conferma=async ()=>{
    if(step===1){initFatt();setStep(2);return;}
    if(step===2){
      try{
        setSaving(true);
        dispatch({type:'ADD',entity:'fatture_attive',item:{...formFatt,id:uid(),importo:parseFloat(formFatt.importo)||0}});
        if(api?.enabled){
          const updated=await api.updateCommessa(cm.id,{stato:'FATTURATA'});
          dispatch({type:'UPSERT',entity:'commesse',item:updated});
        }else{
          dispatch({type:'UPDATE',entity:'commesse',item:{...cm,stato:'FATTURATA'}});
        }
        setStep(3);
      }catch(err){
        alert(`Errore chiusura commessa: ${err.message||'operazione non riuscita'}`);
      }finally{
        setSaving(false);
      }
    }
  };

  return <Modal title='Chiusura commessa' onClose={onClose} width={520}>
    {/* Step indicator */}
    <div style={{display:'flex',gap:0,marginBottom:20}}>
      {['Riepilogo','Fattura','Completato'].map((s,i)=>{
        const active=step===i+1, done=step>i+1;
        return <div key={i} style={{flex:1,display:'flex',alignItems:'center',gap:0}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',flex:1}}>
            <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,background:done?'var(--green)':active?'linear-gradient(135deg,var(--purple),var(--violet))':'var(--g2)',color:done||active?'white':'var(--g4)',marginBottom:4,transition:'all .2s'}}>{done?'✓':i+1}</div>
            <span style={{fontFamily:'var(--fm)',fontSize:10,color:active?'var(--violet)':done?'var(--green)':'var(--g4)'}}>{s}</span>
          </div>
          {i<2&&<div style={{height:2,width:20,background:done?'var(--green)':'var(--g3)',flexShrink:0,alignSelf:'flex-start',marginTop:13}}/>}
        </div>;
      })}
    </div>

    {step===1&&<>
      <div style={{background:'var(--g2)',borderRadius:10,padding:'16px',marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
          <div><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>CLIENTE</div><div style={{fontSize:14,fontWeight:700}}>{cl?.ragione_sociale}</div></div>
          <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>MESE</div><div style={{fontSize:14,fontWeight:700}}>{meseFmt(cm.mese_competenza)}</div></div>
        </div>
        <Divider m={12}/>
        {cm.progetti_ids.map(pid=>{
          const {p,dc,importo_fisso,importo_variabile,delivery_attesa}=rigaData(pid); if(!p.id) return null;
          const pf=fatt(importo_fisso,importo_variabile,delivery_attesa,dc);
          return <div key={pid} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,.05)'}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}><Badge s={p.categoria}/><span style={{fontSize:12,fontWeight:600}}>{p.nome}</span>{delivery_attesa>0&&<span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>({dc}/{delivery_attesa} cont.)</span>}</div>
            <span style={{fontFamily:'var(--fm)',fontWeight:700,color:'var(--violet)'}}>{fmtEuro(pf)}</span>
          </div>;
        })}
        <Divider m={12}/>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontFamily:'var(--fm)',fontSize:12,color:'var(--g4)'}}>Totale fatturabile</span>
          <span style={{fontFamily:'var(--fm)',fontSize:16,fontWeight:800,color:'var(--violet)'}}>{fmtEuro(totFatt)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontFamily:'var(--fm)',fontSize:12,color:'var(--g4)'}}>Costo manodopera</span>
          <span style={{fontFamily:'var(--fm)',fontSize:14,fontWeight:600}}>−{fmtEuro(mo)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:8,borderTop:'1px solid rgba(255,255,255,.08)'}}>
          <span style={{fontFamily:'var(--fm)',fontSize:12,color:'var(--g4)'}}>Margine</span>
          <span style={{fontSize:18,fontWeight:800,color:mp>=30?'var(--green)':'var(--red)'}}>{mp}%</span>
        </div>
      </div>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
        <Btn onClick={onClose}>Annulla</Btn>
        <Btn v='primary' onClick={conferma}>Procedi → Genera fattura</Btn>
      </div>
    </>}

    {step===2&&<>
      <p style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)',marginBottom:16}}>Verifica i dati della fattura prima di confermare. Verrà creata automaticamente in sezione Finanziaria.</p>
      <FRow label='Numero fattura'><input value={formFatt.numero||''} onChange={e=>setFormFatt({...formFatt,numero:e.target.value})}/></FRow>
      <FGrid>
        <FRow label='Data emissione'><input type='date' value={formFatt.data_emissione||''} onChange={e=>setFormFatt({...formFatt,data_emissione:e.target.value})}/></FRow>
        <FRow label='Data scadenza'><input type='date' value={formFatt.data_scadenza||''} onChange={e=>setFormFatt({...formFatt,data_scadenza:e.target.value})}/></FRow>
      </FGrid>
      <FRow label='Importo (€)' hint='Pre-calcolato dalla commessa'>
        <input type='number' step='0.01' value={formFatt.importo||''} onChange={e=>setFormFatt({...formFatt,importo:e.target.value})}
          style={{fontWeight:700,fontSize:16,color:'var(--violet)'}}/>
      </FRow>
      <FRow label='Note fattura'><textarea value={formFatt.note||''} onChange={e=>setFormFatt({...formFatt,note:e.target.value})} style={{minHeight:60}}/></FRow>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:16}}>
        <Btn onClick={()=>setStep(1)}>← Indietro</Btn>
        <Btn v='primary' onClick={conferma}>{saving?'Salvataggio...':'✓ Conferma e chiudi commessa'}</Btn>
      </div>
    </>}

    {step===3&&<>
      <div style={{textAlign:'center',padding:'20px 0'}}>
        <div style={{width:56,height:56,borderRadius:'50%',background:'rgba(34,197,94,.15)',border:'2px solid var(--green)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,margin:'0 auto 16px'}}>✓</div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>Commessa chiusa con successo</div>
        <div style={{fontFamily:'var(--fm)',fontSize:12,color:'var(--g4)',marginBottom:20}}>Fattura {formFatt.numero} creata · Stato commessa aggiornato a FATTURATA</div>
        <Btn v='primary' onClick={onClose}>Chiudi</Btn>
      </div>
    </>}
  </Modal>;
}

// SCREEN: ALERT CONFIGURABILI (pannello settings)
// ─────────────────────────────────────────────────────────
function AlertSettingsModal({state,dispatch,onClose}) {
  const [sogliaMargine,setSogliaMargine]=useState(30);
  const [giorniFatture,setGiorniFatture]=useState(7);
  const [saved,setSaved]=useState(false);

  const save=()=>{setSaved(true);setTimeout(()=>{setSaved(false);},2000);};

  const fattureInScadenza=state.fatture_attive.filter(f=>{
    if(f.stato!=='ATTESA') return false;
    const gg=diffDays(nowDate(),f.data_scadenza);
    return gg>=0&&gg<=giorniFatture;
  });
  const commesseSottoSoglia=state.commesse.filter(cm=>{
    const progettoMap=Object.fromEntries(state.progetti.map(p=>[p.id,p]));
    const f=cm.progetti_ids.reduce((s,pid)=>{const p=progettoMap[pid];if(!p)return s;const dc=(cm.delivery_per_progetto||{})[pid]||0;return s+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0);
    const mo=cm.costo_manodopera||0;
    return f>0&&Math.round((f-mo)/f*100)<sogliaMargine;
  });

  return <Modal title='Configurazione Alert' onClose={onClose} width={480}>
    <div style={{marginBottom:20}}>
      <FRow label='Soglia margine minimo (%)' hint='Alert quando il margine scende sotto questa soglia'>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <input type='range' min='10' max='60' value={sogliaMargine} onChange={e=>setSogliaMargine(parseInt(e.target.value))} style={{flex:1,background:'transparent',border:'none',padding:0}}/>
          <span style={{fontFamily:'var(--fm)',fontSize:16,fontWeight:800,color:'var(--violet)',width:40,textAlign:'right'}}>{sogliaMargine}%</span>
        </div>
      </FRow>
      <FRow label='Alert fatture in scadenza (giorni)' hint='Notifica anticipata per fatture in scadenza'>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <input type='range' min='1' max='30' value={giorniFatture} onChange={e=>setGiorniFatture(parseInt(e.target.value))} style={{flex:1,background:'transparent',border:'none',padding:0}}/>
          <span style={{fontFamily:'var(--fm)',fontSize:16,fontWeight:800,color:'var(--violet)',width:40,textAlign:'right'}}>{giorniFatture}gg</span>
        </div>
      </FRow>
    </div>

    <Divider/>
    <div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)',marginBottom:12,letterSpacing:'.06em',textTransform:'uppercase'}}>Anteprima alert con impostazioni correnti</div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
      <div style={{background:commesseSottoSoglia.length>0?'rgba(239,68,68,.08)':'rgba(34,197,94,.08)',border:`1px solid ${commesseSottoSoglia.length>0?'rgba(239,68,68,.2)':'rgba(34,197,94,.2)'}`,borderRadius:8,padding:'12px 14px'}}>
        <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',marginBottom:4}}>COMMESSE SOTTO {sogliaMargine}%</div>
        <div style={{fontSize:22,fontWeight:800,color:commesseSottoSoglia.length>0?'var(--red)':'var(--green)'}}>{commesseSottoSoglia.length}</div>
      </div>
      <div style={{background:fattureInScadenza.length>0?'rgba(245,158,11,.08)':'rgba(34,197,94,.08)',border:`1px solid ${fattureInScadenza.length>0?'rgba(245,158,11,.2)':'rgba(34,197,94,.2)'}`,borderRadius:8,padding:'12px 14px'}}>
        <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',marginBottom:4}}>FATTURE IN SCADENZA</div>
        <div style={{fontSize:22,fontWeight:800,color:fattureInScadenza.length>0?'var(--amber)':'var(--green)'}}>{fattureInScadenza.length}</div>
      </div>
    </div>

    <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
      <Btn onClick={onClose}>Annulla</Btn>
      <Btn v='primary' onClick={save}>{saved?'✓ Salvato!':'Salva impostazioni'}</Btn>
    </div>
  </Modal>;
}

function ReportMensileScreen({state,setPage}) {
  const [mese,setMese]=useState(currMese());
  const progettoMap=useMemo(()=>Object.fromEntries(state.progetti.map(p=>[p.id,p])),[state.progetti]);
  const clienteMap=useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);

  const commesseMese=state.commesse.filter(c=>c.mese_competenza===mese);
  const mesiDisponibili=useMemo(()=>{const s=new Set(state.commesse.map(c=>c.mese_competenza));s.add(currMese());return [...s].sort().reverse();},[state.commesse]);

  const totFatt=commesseMese.reduce((s,cm)=>s+cm.progetti_ids.reduce((ps,pid)=>{const p=progettoMap[pid];if(!p)return ps;const dc=(cm.delivery_per_progetto||{})[pid]||0;return ps+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0),0);
  const totMO=commesseMese.reduce((s,cm)=>s+(cm.costo_manodopera||0),0);
  const costoFissi=state.costi_fissi.filter(c=>c.mese===mese).reduce((s,c)=>s+c.importo,0);
  const margLordo=totFatt-totMO;
  const margNetto=margLordo-costoFissi;
  const margPctLordo=totFatt>0?Math.round(margLordo/totFatt*100):0;
  const margPctNetto=totFatt>0?Math.round(margNetto/totFatt*100):0;

  const print=()=>window.print();

  return <div className='fu'>
    <style>{`@media print{aside,button,.no-print{display:none!important}main{margin-left:0!important}.print-page{padding:24px!important}}`}</style>
    <Topbar title='Report mensile' sub={meseFmt(mese)} className='no-print'>
      <select value={mese} onChange={e=>setMese(e.target.value)} style={{width:160,height:34,padding:'0 10px'}}>
        {mesiDisponibili.map(m=><option key={m} value={m}>{meseFmt(m)}</option>)}
      </select>
      <Btn v='ghost' onClick={()=>setPage('dashboard')}>← Dashboard</Btn>
      <Btn v='primary' onClick={print}>⎙ Stampa / PDF</Btn>
    </Topbar>
    <div className='print-page' style={{padding:'28px 32px',maxWidth:900,margin:'0 auto'}}>
      {/* Header report */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:28,paddingBottom:20,borderBottom:'2px solid var(--g2)'}}>
        <div>
          <div style={{fontSize:24,fontWeight:800,letterSpacing:-.5}}>Report mensile</div>
          <div style={{fontSize:15,color:'var(--violet)',fontWeight:600,marginTop:2}}>{meseFmt(mese)}</div>
          <div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)',marginTop:4}}>Generato il {fmtDate(nowDate())} · Bite Digital Studio</div>
        </div>
        <div style={{width:44,height:44,background:'linear-gradient(135deg,var(--purple),var(--violet))',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:800,color:'white'}}>B</div>
      </div>

      {/* KPI box */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}}>
        {[
          {label:'Fatturato',value:fmtEuro(totFatt),color:'var(--white)'},
          {label:'Margine lordo',value:`${margPctLordo}%`,sub:fmtEuro(margLordo),color:margPctLordo>=40?'var(--green)':margPctLordo>=25?'var(--amber)':'var(--red)'},
          {label:'Costi struttura',value:fmtEuro(costoFissi),color:'var(--g5)'},
          {label:'Margine netto',value:`${margPctNetto}%`,sub:fmtEuro(margNetto),color:margPctNetto>=20?'var(--green)':margPctNetto>=10?'var(--amber)':'var(--red)'},
        ].map((k,i)=><div key={i} style={{background:'var(--g1)',border:'1px solid var(--g2)',borderRadius:8,padding:'14px 16px'}}>
          <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',marginBottom:6}}>{k.label}</div>
          <div style={{fontSize:20,fontWeight:800,color:k.color,letterSpacing:-.5}}>{k.value}</div>
          {k.sub&&<div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)',marginTop:3}}>{k.sub}</div>}
        </div>)}
      </div>

      {/* Dettaglio per cliente */}
      <div style={{marginBottom:24}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:12,paddingBottom:8,borderBottom:'1px solid var(--g2)'}}>Dettaglio clienti</div>
        {commesseMese.length===0?<Empty msg={`Nessuna commessa per ${meseFmt(mese)}`}/>:
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='Cliente'/><Th c='Progetti'/><Th c='Fatturabile'/><Th c='Costo M.O.'/><Th c='Margine €'/><Th c='Margine %'/><Th c='Stato'/></tr></thead>
          <tbody>
            {commesseMese.map(cm=>{
              const cl=clienteMap[cm.cliente_id];
              const f=cm.progetti_ids.reduce((ps,pid)=>{const p=progettoMap[pid];if(!p)return ps;const dc=(cm.delivery_per_progetto||{})[pid]||0;return ps+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0);
              const mo=cm.costo_manodopera||0; const mp=f>0?Math.round((f-mo)/f*100):0;
              return <TR key={cm.id}>
                <Td><div style={{fontWeight:700}}>{cl?.ragione_sociale}</div><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--violet)'}}>{cl?.codice}</div></Td>
                <Td><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{cm.progetti_ids.map(pid=>{const p=progettoMap[pid];return p?<Badge key={pid} s={p.categoria}/>:null;})}</div></Td>
                <Td mono>{fmtEuro(f)}</Td>
                <Td mono>{fmtEuro(mo)}</Td>
                <Td mono style={{color:f-mo>=0?'var(--green)':'var(--red)'}}>{fmtEuro(f-mo)}</Td>
                <Td><MBar pct={mp}/></Td>
                <Td><Badge s={cm.stato}/></Td>
              </TR>;
            })}
          </tbody>
          <tfoot>
            <tr style={{background:'var(--g2)'}}>
              <td colSpan={2} style={{padding:'10px 14px',fontWeight:700,fontSize:13}}>Totale</td>
              <Td mono><b>{fmtEuro(totFatt)}</b></Td>
              <Td mono><b>{fmtEuro(totMO)}</b></Td>
              <Td mono style={{color:margLordo>=0?'var(--green)':'var(--red)'}}><b>{fmtEuro(margLordo)}</b></Td>
              <Td><div style={{fontFamily:'var(--fm)',fontSize:13,fontWeight:800,color:margPctLordo>=30?'var(--green)':'var(--red)'}}>{margPctLordo}%</div></Td>
              <Td/>
            </tr>
          </tfoot>
        </table>}
      </div>

      {/* Costi struttura */}
      <div>
        <div style={{fontSize:14,fontWeight:700,marginBottom:12,paddingBottom:8,borderBottom:'1px solid var(--g2)'}}>Costi struttura</div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='Voce'/><Th c='Categoria'/><Th c='Importo'/><Th c='Tipo'/></tr></thead>
          <tbody>
            {state.costi_fissi.filter(c=>c.mese===mese).map(c=><TR key={c.id}>
              <Td>{c.descrizione}</Td>
              <Td><Badge s={c.categoria}/></Td>
              <Td mono style={{color:'var(--red)'}}>−{fmtEuro(c.importo)}</Td>
              <Td muted>{c.ricorrente?'↻ ricorrente':'una tantum'}</Td>
            </TR>)}
          </tbody>
          <tfoot>
            <tr style={{background:'var(--g2)'}}>
              <td colSpan={2} style={{padding:'10px 14px',fontWeight:700}}>Totale costi</td>
              <Td mono style={{color:'var(--red)'}}><b>−{fmtEuro(costoFissi)}</b></Td>
              <Td/>
            </tr>
          </tfoot>
        </table>
      </div>

      <div style={{marginTop:28,paddingTop:16,borderTop:'1px solid var(--g2)',display:'flex',justifyContent:'space-between',fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>
        <span>Bite Digital Studio · ERP v3 · Demo</span>
        <span>Report generato automaticamente · {fmtDate(nowDate())}</span>
      </div>
    </div>
  </div>;
}

function CassaScreen({state,dispatch}){
  const oggi = new Date();
  const [dal,setDal]=useState(`${oggi.getFullYear()}-01-01`);
  const [al,setAl]=useState(oggi.toISOString().substring(0,10));
  const [tipoFiltro,setTipoFiltro]=useState('TUTTI');
  const [ricFiltro,setRicFiltro]=useState('TUTTI');
  const [searchText,setSearchText]=useState('');
  const [modalMov,setModalMov]=useState(null);
  const [ricTipo,setRicTipo]=useState('ENTRATA');
  const [ricSearch,setRicSearch]=useState('');
  const [ricSoggetto,setRicSoggetto]=useState('');
  const [saving,setSaving]=useState(false);
  const [selected,setSelected]=useState(new Set());
  const [bulkSaving,setBulkSaving]=useState(false);
  const [movImputazioni,setMovImputazioni]=useState([]);
  const [movImpLoading,setMovImpLoading]=useState(false);
  const [showImpModal,setShowImpModal]=useState(false);
  const [impMovTarget,setImpMovTarget]=useState(null);

  const movimenti = state.movimenti_cassa||[];

  const filtered = movimenti.filter(m=>{
    if(dal && m.data_valuta < dal) return false;
    if(al && m.data_valuta > al) return false;
    if(tipoFiltro!=='TUTTI' && m.tipo!==tipoFiltro) return false;
    if(ricFiltro==='SI' && !m.riconciliato) return false;
    if(ricFiltro==='NO' && m.riconciliato) return false;
    if(searchText && !m.descrizione?.toLowerCase().includes(searchText.toLowerCase()) && !m.categoria?.toLowerCase().includes(searchText.toLowerCase())) return false;
    return true;
  });

  const toggleSelect = (id) => setSelected(prev => {
    const n = new Set(prev);
    n.has(id) ? n.delete(id) : n.add(id);
    return n;
  });
  const toggleAll = () => {
    const nonRic = filtered.filter(m=>!m.riconciliato).map(m=>m.id);
    if(selected.size === nonRic.length) setSelected(new Set());
    else setSelected(new Set(nonRic));
  };
  const bulkRiconcilia = async() => {
    if(selected.size===0) return;
    if(!window.confirm(`Riconciliare ${selected.size} movimenti selezionati senza associarli a fatture?`)) return;
    setBulkSaving(true);
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    let ok=0;
    for(const id of selected){
      const res=await fetch(`/api/v1/movimenti-cassa/${id}/riconcilia`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({riconciliato:true})});
      if(res.ok){ dispatch({type:'UPDATE',entity:'movimenti_cassa',item:{...movimenti.find(m=>m.id===id),riconciliato:true}}); ok++; }
    }
    setSelected(new Set());
    setBulkSaving(false);
    alert(`✓ ${ok} movimenti riconciliati`);
  };
  const bulkCategoria = async(categoria) => {
    if(selected.size===0) return;
    setBulkSaving(true);
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    let ok=0;
    for(const id of selected){
      const res=await fetch(`/api/v1/movimenti-cassa/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({categoria})});
      if(res.ok){ dispatch({type:'UPDATE',entity:'movimenti_cassa',item:{...movimenti.find(m=>m.id===id),categoria}}); ok++; }
    }
    setSelected(new Set());
    setBulkSaving(false);
  };

  const totEntrate = filtered.filter(m=>m.tipo==='ENTRATA').reduce((s,m)=>s+m.importo,0);
  const totUscite = filtered.filter(m=>m.tipo==='USCITA').reduce((s,m)=>s+Math.abs(m.importo),0);
  const saldo = totEntrate - totUscite;
  const daRiconciliare = movimenti.filter(m=>!m.riconciliato).length;

  const openRiconcilia = (m) => {
    setModalMov(m);
    setRicTipo(m.tipo==='ENTRATA'?'ATTIVA':'PASSIVA');
    setRicSearch('');
    setRicSoggetto('');
  };

  const openImputazioneMovimento = async(m) => {
    setImpMovTarget(m);
    setMovImputazioni([]);
    setMovImpLoading(true);
    setShowImpModal(true);
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    try{
      const res=await fetch(`/api/v1/movimenti-cassa/${m.id}/imputazioni`,{headers:{'Authorization':'Bearer '+token}});
      if(res.ok){
        const data=await res.json();
        setMovImputazioni(data.imputazioni||data||[]);
      }
    }catch(e){}
    setMovImpLoading(false);
  };

  const saveImputazioneMovimento = async() => {
    if(!impMovTarget) return;
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    // Se riconciliato con fattura — usa ereditarietà automatica
    if(impMovTarget.fattura_passiva_id){
      const res=await fetch(`/api/v1/movimenti-cassa/${impMovTarget.id}/imputazioni`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({imputazioni:[]})});
      if(res.ok){ alert('✓ Imputazioni ereditate dalla fattura passiva associata'); setShowImpModal(false); }
      return;
    }
    const impValide=movImputazioni.filter(i=>i.tipo==='STRUTTURA'||(i.tipo==='CLIENTE'&&i.cliente_id)||(i.tipo==='PROGETTO'&&i.progetto_id));
    const res=await fetch(`/api/v1/movimenti-cassa/${impMovTarget.id}/imputazioni`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({imputazioni:impValide})});
    if(res.ok){ setShowImpModal(false); }
    else alert('Errore salvataggio imputazioni');
  };

  // Riconciliati per movimento
  const fattureAttivaRic = new Set(movimenti.filter(m=>m.fattura_attiva_id).map(m=>m.fattura_attiva_id));
  const fatturePassivaRic = new Set(movimenti.filter(m=>m.fattura_passiva_id).map(m=>m.fattura_passiva_id));

  // Fatture attive non riconciliate filtrate per cliente
  const faDisponibili = (state.fatture_attive||[]).filter(fa=>{
    if(fattureAttivaRic.has(fa.id)) return false;
    if(ricSoggetto && fa.cliente_id!==ricSoggetto) return false;
    if(ricSearch && !fa.numero?.toString().includes(ricSearch) && !(state.clienti||[]).find(c=>c.id===fa.cliente_id)?.ragione_sociale?.toLowerCase().includes(ricSearch.toLowerCase())) return false;
    return true;
  });

  // Fatture passive non riconciliate filtrate per fornitore
  const fpDisponibili = (state.fatture_passive||[]).filter(fp=>{
    if(fatturePassivaRic.has(fp.id)) return false;
    if(ricSoggetto && fp.fornitore!==ricSoggetto) return false;
    if(ricSearch && !fp.numero?.includes(ricSearch) && !fp.fornitore?.toLowerCase().includes(ricSearch.toLowerCase())) return false;
    return true;
  });

  const clientiConFatture = [...new Set((state.fatture_attive||[]).filter(fa=>!fattureAttivaRic.has(fa.id)).map(fa=>fa.cliente_id))].map(id=>(state.clienti||[]).find(c=>c.id===id)).filter(Boolean);
  const fornitoriConFatture = [...new Set((state.fatture_passive||[]).filter(fp=>!fatturePassivaRic.has(fp.id)).map(fp=>fp.fornitore))].filter(Boolean).sort();

  const eseguiRiconcilia = async(fattura, tipo) => {
    if(!modalMov) return;
    setSaving(true);
    try{
      const token = localStorage.getItem('BITE_ERP_TOKEN')||'';
      const body = tipo==='ATTIVA'
        ? {fattura_attiva_id: fattura.id, riconciliato: true}
        : {fattura_passiva_id: fattura.id, riconciliato: true};
      const res = await fetch(`/api/v1/movimenti-cassa/${modalMov.id}`, {
        method:'PATCH',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body: JSON.stringify(body)
      });
      if(res.ok){
        dispatch({type:'UPDATE',entity:'movimenti_cassa',item:{...modalMov,...body}});
        // Se fattura passiva — eredita imputazioni automaticamente
        if(tipo==='PASSIVA'){
          await fetch(`/api/v1/movimenti-cassa/${modalMov.id}/imputazioni`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({imputazioni:[]})});
        }
        setModalMov(null);
      } else {
        alert('Errore durante la riconciliazione');
      }
    } catch(e){ console.error(e); }
    finally{ setSaving(false); }
  };

  const annullaRiconciliazione = async(m) => {
    if(!window.confirm('Annullare la riconciliazione di questo movimento?')) return;
    const token = localStorage.getItem('BITE_ERP_TOKEN')||'';
    const body = {fattura_attiva_id:null, fattura_passiva_id:null, riconciliato:false};
    const res = await fetch(`/api/v1/movimenti-cassa/${m.id}`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify(body)
    });
    if(res.ok) dispatch({type:'UPDATE',entity:'movimenti_cassa',item:{...m,...body}});
    else alert('Errore annullamento');
  };

  const inpStyle = {padding:'6px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g6)',fontSize:12};

  return <div className="fu">
    {modalMov&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setModalMov(null)}>
      <div style={{background:'var(--g1)',borderRadius:14,padding:28,minWidth:560,maxWidth:720,maxHeight:'80vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--g6)',marginBottom:4}}>{modalMov.descrizione}</div>
          <div style={{display:'flex',gap:16}}>
            <span style={{fontFamily:'var(--fm)',fontSize:12,color:modalMov.tipo==='ENTRATA'?'var(--green)':'var(--red)',fontWeight:700}}>

                    <div style={{display:'flex',alignItems:'center',gap:8}}>

// SCREEN: RISORSE UMANE (HR)
// ─────────────────────────────────────────────────────────
function RisorseScreen({state,dispatch}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const [filterAttivo,setFilterAttivo]=useState('TUTTI');

  const risorse=state.risorse||[];
  const token=()=>localStorage.getItem('BITE_ERP_TOKEN')||'';

  const TIPI=[
    {v:'FONDATORE',l:'Co-founder'},
    {v:'APPRENDISTATO',l:'Apprendistato'},
    {v:'TEMPO_DETERMINATO',l:'Tempo determinato'},
    {v:'DIPENDENTE',l:'Dipendente'},
    {v:'PRESTAZIONE_OCCASIONALE',l:'Prest. occasionale'},
    {v:'FREELANCER',l:'Freelancer'},
  ];

  const filtered=risorse.filter(r=>filterAttivo==='TUTTI'||String(r.attivo)===(filterAttivo==='ATTIVI'?'true':'false'));

  const costoOrarioEffettivo=r=>parseFloat(r.costo_orario_override||r.costo_orario_calcolato||0);
  const costoMensile=r=>{
    if(r.tipo_contratto==='FREELANCER'||r.tipo_contratto==='PRESTAZIONE_OCCASIONALE')
      return parseFloat(r.compenso_fisso_mensile||0);
    if(r.tipo_contratto==='FONDATORE')
      return 0; // compenso variabile — non contabilizzato nel costo fisso mensile
    const co=costoOrarioEffettivo(r);
    const oreSettimana=parseFloat(r.ore_settimanali||40);
    return co*oreSettimana*4.33;
  };
  const costoAnno=r=>costoMensile(r)*12;

  const openNew=()=>{setForm({tipo_contratto:'DIPENDENTE',ore_settimanali:40,contributi_percentuale:30,tfr_percentuale:6.91,attivo:true});setModal('new');};
  const openEdit=r=>{setForm({...r,_editId:r.id});setModal('edit');};
  const closeModal=()=>{setModal(null);setForm({});setServizi([]);};

  const save=async()=>{
    setSaving(true);
    const payload={...form};
    delete payload._editId;
    // converti numerici
    ['ore_settimanali','ral','compenso_fisso_mensile','compenso_obiettivo','contributi_percentuale','tfr_percentuale','costo_orario_override'].forEach(k=>{
      if(payload[k]!==undefined&&payload[k]!=='') payload[k]=parseFloat(payload[k]);
      else delete payload[k];
    });
    try{
      const url=modal==='edit'?`/api/v1/risorse/${form._editId}`:'/api/v1/risorse';
      const method=modal==='edit'?'PATCH':'POST';
      const res=await fetch(url,{method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token()},body:JSON.stringify(payload)});
      if(res.ok){
        const saved=await res.json();
        if(modal==='edit') dispatch({type:'UPDATE',entity:'risorse',item:saved});
        else dispatch({type:'ADD',entity:'risorse',item:saved});
        closeModal();
      }else{const e=await res.json().catch(()=>({}));alert('Errore: '+(e.detail||JSON.stringify(e)));}
    }catch(e){alert('Errore di rete: '+e.message);}
    setSaving(false);
  };

  const del=async id=>{
    if(!window.confirm('Eliminare questa risorsa?')) return;
    const res=await fetch(`/api/v1/risorse/${id}`,{method:'DELETE',headers:{'Authorization':'Bearer '+token()}});
    if(res.ok||res.status===204) dispatch({type:'DELETE',entity:'risorse',id});
    else alert('Errore eliminazione');
  };

  const tipoLabel=v=>TIPI.find(t=>t.v===v)?.l||v;
  const tipoColor=v=>({
    FONDATORE:'var(--violet)',APPRENDISTATO:'var(--blue)',TEMPO_DETERMINATO:'var(--green)',
    DIPENDENTE:'var(--green)',PRESTAZIONE_OCCASIONALE:'var(--amber)',FREELANCER:'var(--amber)'
  }[v]||'var(--g4)');

  // KPI
  const attivi=risorse.filter(r=>r.attivo);
  const totCostoMensile=attivi.reduce((s,r)=>s+costoMensile(r),0);
  const totCostoAnno=attivi.reduce((s,r)=>s+costoAnno(r),0);
  const totObiettivo=attivi.reduce((s,r)=>s+(parseFloat(r.compenso_obiettivo||r.ral||r.compenso_fisso_mensile*12||0)),0);

  const mostraCompensoBase=f=>{
    const t=f.tipo_contratto;
    if(t==='FREELANCER'||t==='PRESTAZIONE_OCCASIONALE') return 'compenso_fisso_mensile';
    return 'ral';
  };

  return <div className='fu'>
    {modal&&<Modal title={modal==='new'?'Nuova risorsa':'Modifica risorsa'} onClose={closeModal} width={560}>
      <div style={{display:'flex',flexDirection:'column',gap:0}}>
        <FGrid>
          <FRow label='Nome'><input required value={form.nome||''} onChange={e=>setForm({...form,nome:e.target.value})}/></FRow>
          <FRow label='Cognome'><input required value={form.cognome||''} onChange={e=>setForm({...form,cognome:e.target.value})}/></FRow>
        </FGrid>
        <FRow label='Ruolo'><input value={form.ruolo||''} onChange={e=>setForm({...form,ruolo:e.target.value})} placeholder='es. Art Director, Copywriter...'/></FRow>
        <FGrid>
          <FRow label='Tipo contratto'>
            <select value={form.tipo_contratto||'DIPENDENTE'} onChange={e=>setForm({...form,tipo_contratto:e.target.value,contributi_percentuale:e.target.value==='APPRENDISTATO'?10:e.target.value==='FONDATORE'?0:30})}>
              {TIPI.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
            </select>
          </FRow>
          <FRow label='Ore/settimana'><input type='number' min='1' max='60' step='0.5' value={form.ore_settimanali||40} onChange={e=>setForm({...form,ore_settimanali:e.target.value})}/></FRow>
        </FGrid>
        <FGrid>
          <FRow label='Data inizio'><input type='date' value={form.data_inizio||''} onChange={e=>setForm({...form,data_inizio:e.target.value})}/></FRow>
          <FRow label='Data fine'><input type='date' value={form.data_fine||''} onChange={e=>setForm({...form,data_fine:e.target.value})}/></FRow>
        </FGrid>

        {/* Compenso base */}
        {(form.tipo_contratto==='FREELANCER'||form.tipo_contratto==='PRESTAZIONE_OCCASIONALE')?
          <FRow label='Compenso mensile (€)'><input type='number' min='0' step='0.01' value={form.compenso_fisso_mensile||''} onChange={e=>setForm({...form,compenso_fisso_mensile:e.target.value})} placeholder='es. 500'/></FRow>:
          <FRow label='RAL (€)'><input type='number' min='0' step='100' value={form.ral||''} onChange={e=>setForm({...form,ral:e.target.value})} placeholder='es. 22000'/></FRow>
        }

        <FRow label='Compenso obiettivo (€/anno)'>
          <input type='number' min='0' step='100' value={form.compenso_obiettivo||''} onChange={e=>setForm({...form,compenso_obiettivo:e.target.value})} placeholder='es. 30000 — compenso target a regime'/>
        </FRow>

        {/* Parametri costo */}
        {form.tipo_contratto!=='FREELANCER'&&form.tipo_contratto!=='PRESTAZIONE_OCCASIONALE'&&<FGrid>
          <FRow label='Contributi azienda (%)'>
            <input type='number' min='0' max='50' step='0.1' value={form.contributi_percentuale||30} onChange={e=>setForm({...form,contributi_percentuale:e.target.value})}/>
            <span style={{fontSize:10,color:'var(--g4)',marginTop:3,display:'block'}}>
              {form.tipo_contratto==='APPRENDISTATO'?'Apprendistato: ~10%':'Standard: ~30%'}
            </span>
          </FRow>
          <FRow label='TFR (%)'>
            <input type='number' min='0' max='10' step='0.01' value={form.tfr_percentuale||6.91} onChange={e=>setForm({...form,tfr_percentuale:e.target.value})}/>
          </FRow>
        </FGrid>}

        <FRow label='Override costo orario (€/h)'>
          <input type='number' min='0' step='0.01' value={form.costo_orario_override||''} onChange={e=>setForm({...form,costo_orario_override:e.target.value})} placeholder='Lascia vuoto per calcolo automatico'/>
        </FRow>
        <FRow label='Note'><textarea value={form.note||''} onChange={e=>setForm({...form,note:e.target.value})} rows={2}/></FRow>
        <FRow label='Attivo'>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
            <input type='checkbox' checked={!!form.attivo} onChange={e=>setForm({...form,attivo:e.target.checked})}/>
            <span>Risorsa attiva</span>
          </label>
        </FRow>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
          <Btn v='ghost' onClick={closeModal} type='button'>Annulla</Btn>
          <Btn v='primary' onClick={save} disabled={saving}>{saving?'Salvo...':'Salva'}</Btn>
        </div>
      </div>
    </Modal>}

    <Topbar title='Risorse umane'>
      <Btn v='primary' onClick={openNew}>+ Nuova risorsa</Btn>
    </Topbar>

    {/* KPI */}
    <div style={{display:'flex',gap:16,marginBottom:20,flexWrap:'wrap'}}>
      <KPI label='Risorse attive' value={attivi.length}/>
      <KPI label='Costo mensile stimato' value={fmtEuro(totCostoMensile)} color='var(--red)'/>
      <KPI label='Costo annuo stimato' value={fmtEuro(totCostoAnno)} color='var(--red)'/>
      <KPI label='Compenso obiettivo annuo' value={fmtEuro(totObiettivo)} color='var(--amber)'/>
    </div>

    {/* Filtri */}
    <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center'}}>
      {['TUTTI','ATTIVI','INATTIVI'].map(f=>
        <button key={f} onClick={()=>setFilterAttivo(f)} style={{padding:'4px 12px',borderRadius:6,border:'1px solid var(--g3)',background:filterAttivo===f?'var(--purple)':'var(--g2)',color:filterAttivo===f?'white':'var(--g5)',fontSize:11,cursor:'pointer'}}>{f}</button>
      )}
    </div>

    <Card>
      <CH title='Team' meta={`${filtered.length} risorse`}/>
      {filtered.length===0?<Empty msg='Nessuna risorsa'/>:
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
        <thead><tr>
          <Th c='Nominativo'/><Th c='Ruolo'/><Th c='Contratto'/><Th c='Inizio'/><Th c='RAL / Compenso'/><Th c='Obiettivo'/><Th c='Costo/h'/><Th c='Costo mese'/><Th c='Stato'/><Th c='Azioni'/>
        </tr></thead>
        <tbody>
          {filtered.map(r=>{
            const co=costoOrarioEffettivo(r);
            const cm=costoMensile(r);
            const isOverride=!!r.costo_orario_override;
            return <TR key={r.id}>
              <Td><div style={{fontWeight:700}}>{r.cognome} {r.nome}</div></Td>
              <Td muted>{r.ruolo||'—'}</Td>
              <Td><span style={{fontFamily:'var(--fm)',fontSize:11,color:tipoColor(r.tipo_contratto)}}>{tipoLabel(r.tipo_contratto)}</span></Td>
              <Td mono muted>{fmtDate(r.data_inizio)}</Td>
              <Td mono style={{color:'var(--g5)'}}>
                {r.tipo_contratto==='FREELANCER'||r.tipo_contratto==='PRESTAZIONE_OCCASIONALE'
                  ?<span>{fmtEuro(r.compenso_fisso_mensile||0)}<span style={{color:'var(--g4)',fontSize:10}}>/mese</span></span>
                  :<span>{fmtEuro(r.ral||0)}<span style={{color:'var(--g4)',fontSize:10}}>/anno</span></span>
                }
              </Td>
              <Td mono style={{color:'var(--amber)'}}>
                {r.compenso_obiettivo?<span>{fmtEuro(r.compenso_obiettivo)}<span style={{color:'var(--g4)',fontSize:10}}>/anno</span></span>:'—'}
              </Td>
              <Td mono style={{color:co>0?'var(--violet)':'var(--g4)',fontWeight:600}}>
                {co>0?<span>{fmtEuro(co)}/h{isOverride&&<span style={{fontSize:9,color:'var(--amber)',marginLeft:3}}>▲</span>}</span>:'—'}
              </Td>
              <Td mono style={{color:'var(--red)',fontWeight:600}}>{cm>0?fmtEuro(cm):'—'}</Td>
              <Td><span style={{fontSize:11,color:r.attivo?'var(--green)':'var(--g4)'}}>{r.attivo?'● Attivo':'○ Inattivo'}</span></Td>
              <Td style={{display:'flex',gap:4}}>
                <Btn v='ghost' onClick={()=>openEdit(r)} s={{padding:'4px 8px',fontSize:11}}>✎ Modifica</Btn>
                <Btn v='danger' onClick={()=>del(r.id)} s={{padding:'4px 8px',fontSize:11}}>✕</Btn>
              </Td>
            </TR>;
          })}
        </tbody>
      </table>}
    </Card>
  </div>;
}
