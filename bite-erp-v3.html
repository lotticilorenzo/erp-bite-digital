// SCREEN: COMMESSA DETAIL
// ─────────────────────────────────────────────────────────
function CommessaDetailScreen({state,commessaId,setPage,onChiudi}) {
  const cm=state.commesse.find(c=>c.id===commessaId);
  const progettoMap=useMemo(()=>Object.fromEntries(state.progetti.map(p=>[p.id,p])),[state.progetti]);
  const clienteMap =useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);
  const userMap    =useMemo(()=>Object.fromEntries(state.users.map(u=>[u.id,u])),[state.users]);
  if(!cm) return <div style={{padding:32,color:'var(--g4)'}}>Commessa non trovata</div>;

  const cl=clienteMap[cm.cliente_id];
  const rigaData = pid => {
    const p=progettoMap[pid]||{};
    const snap=(cm.snapshot_per_progetto||{})[pid]||{};
    const dc=(cm.delivery_per_progetto||{})[pid] ?? snap.delivery_consuntiva ?? 0;
    return {
      p,
      dc,
      importo_fisso:snap.importo_fisso ?? p.importo_fisso ?? 0,
      importo_variabile:snap.importo_variabile ?? p.importo_variabile ?? 0,
      delivery_attesa:snap.delivery_attesa ?? p.delivery_attesa ?? 0,
    };
  };
  const totFatt=cm.progetti_ids.reduce((s,pid)=>{const r=rigaData(pid);return s+fatt(r.importo_fisso,r.importo_variabile,r.delivery_attesa,r.dc);},0);
  const mo=cm.costo_manodopera||0;
  const mp=totFatt>0?Math.round((totFatt-mo)/totFatt*100):0;

  // timesheet della commessa
  const tsComm=state.timesheet.filter(t=>cm.progetti_ids.includes(t.progetto_id)&&t.mese_competenza===cm.mese_competenza);
  const oreAppr=tsComm.filter(t=>t.stato==='APPROVATO').reduce((s,t)=>s+t.durata_minuti,0);

  // task ClickUp associati ai progetti della commessa
  const tasks=CLICKUP_TASKS.filter(t=>cm.progetti_ids.includes(t.project_id));
  const taskDone=tasks.filter(t=>t.status==='complete').length;

  return <div className='fu'>
    <Topbar title={cl?.ragione_sociale||'Commessa'} sub={`Commessa ${meseFmt(cm.mese_competenza)} · ${cm.progetti_ids.length} progetti`}>
      <Btn v='ghost' onClick={()=>setPage('commesse')}>← Commesse</Btn>
      {(cm.stato==='APERTA'||cm.stato==='PRONTA_CHIUSURA')&&onChiudi&&<Btn v='primary' onClick={()=>onChiudi(cm.id)}>✓ Chiudi commessa</Btn>}
      <Badge s={cm.stato}/>
    </Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Fatturabile totale' value={fmtEuro(totFatt)} delay={.05}/>
        <KPI label='Costo manodopera' value={fmtEuro(mo)} delay={.08}/>
        <KPI label='Margine' value={`${mp}%`} color={mp>=50?'var(--violet)':mp>=30?'var(--amber)':'var(--red)'} delay={.11}/>
        <KPI label='Ore approvate' value={fmtMin(oreAppr)} delay={.14}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        {/* DETTAGLIO PER PROGETTO */}
        <Card>
          <CH title='Dettaglio per progetto'/>
          {cm.progetti_ids.map(pid=>{
            const {p,dc,importo_fisso,importo_variabile,delivery_attesa}=rigaData(pid); if(!p.id) return null;
            const pFatt=fatt(importo_fisso,importo_variabile,delivery_attesa,dc);
            const cl2=clienteMap[p.cliente_id];
            return <div key={pid} style={{padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div style={{display:'flex',gap:8,alignItems:'center'}}><Badge s={p.categoria}/><span style={{fontWeight:700}}>{p.nome}</span></div>
                <span style={{fontFamily:'var(--fm)',fontWeight:700,color:'var(--violet)'}}>{fmtEuro(pFatt)}</span>
              </div>
              {delivery_attesa>0&&<div style={{marginBottom:6}}><Pips total={delivery_attesa} done={dc}/>{dc>delivery_attesa&&<span style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--amber)',marginLeft:8}}>⬆ over delivery</span>}</div>}
              {p.categoria==='WEB'&&p.milestone?.length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                {p.milestone.map(m=><span key={m.id} style={{display:'inline-flex',alignItems:'center',gap:4,fontFamily:'var(--fm)',fontSize:10,padding:'2px 7px',borderRadius:20,...(BADGE_MAP[m.stato]||['var(--g2)','var(--g5)']).reduce((o,v,i)=>({...o,[i===0?'background':'color']:v}),{})}}>
                  {m.stato==='DONE'?'✓':m.stato==='IN_PROGRESS'?'⋯':'○'} {m.nome}
                </span>)}
              </div>}
              {p.categoria==='MARKETING'&&<div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--amber)'}}>Budget campagna: {fmtEuro(p.budget_campagna)}/mese</div>}
            </div>;
          })}
        </Card>

        {/* TASK CLICKUP */}
        <Card>
          <CH title='Task ClickUp' meta={`${taskDone}/${tasks.length} completate`}/>
          {tasks.length===0?<Empty msg='Nessun task associato'/>:
          tasks.map(t=>{
            const p=progettoMap[t.project_id];
            return <div key={t.id} style={{display:'flex',gap:10,padding:'11px 18px',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
              <div style={{width:6,borderRadius:3,flexShrink:0,background:t.status==='complete'?'var(--green)':t.status==='in progress'?'var(--amber)':'var(--g3)'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>{p?.nome||'—'}</div>
              </div>
              <Badge s={t.status}/>
            </div>;
          })}
        </Card>
      </div>

      {/* TIMESHEET COMMESSA */}
      {tsComm.length>0&&<Card>
        <CH title='Timesheet' meta={`${tsComm.length} registrazioni · ${fmtMin(oreAppr)} approvate`}/>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='Risorsa'/><Th c='Progetto'/><Th c='Task'/><Th c='Data'/><Th c='Durata'/><Th c='Stato'/></tr></thead>
          <tbody>
            {tsComm.map(t=>{
              const u=userMap[t.user_id]; const p=progettoMap[t.progetto_id];
              const _brandNote=t.note?t.note.replace('[CSV]','').split('|')[0].trim():null;
              const _brandNome=p?.nome||_brandNote||'—';
              const task=CLICKUP_TASKS.find(x=>x.id===t.clickup_task_id);
              const brandNote=t.note?t.note.replace('[CSV]','').split('|')[0].trim():null;
              const brandNome=p?.nome||brandNote||'—';
              return <TR key={t.id}>
                <Td>{u?<div style={{display:'flex',alignItems:'center',gap:6}}><Av u={u} size={20}/><span style={{fontWeight:600}}>{u.nome}</span></div>:'—'}</Td>
                <Td muted>{brandNome}</Td>
                <Td>{task?.name||'—'}</Td>
                <Td mono muted>{t.data_attivita}</Td>
                <Td mono>{fmtMin(t.durata_minuti)}</Td>
                <Td><Badge s={t.stato}/></Td>
              </TR>;
            })}
          </tbody>
        </table>
      </Card>}
    </div>
  </div>;
}

// ─────────────────────────────────────────────────────────
// SCREEN: TIMESHEET (con task ClickUp simulati)
// ─────────────────────────────────────────────────────────
function TimesheetScreen({state,dispatch,api,authUser}) {
  const [filterStato,setFilterStato]=useState('TUTTI');
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [taskFil,setTaskFil]=useState('');
  const [saving,setSaving]=useState(false);
  const [processing,setProcessing]=useState(null);

  const userMap    =useMemo(()=>Object.fromEntries(state.users.map(u=>[u.id,u])),[state.users]);
  const progettoMap=useMemo(()=>Object.fromEntries(state.progetti.map(p=>[p.id,p])),[state.progetti]);
  const clienteMap =useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);

  const progettiDisp=useMemo(()=>state.progetti.filter(p=>p.stato==='ATTIVO'),[state.progetti]);
  const tasksDisp=useMemo(()=>{
    if(!form.progetto_id) return CLICKUP_TASKS;
    return CLICKUP_TASKS.filter(t=>t.project_id===form.progetto_id);
  },[form.progetto_id]);
  const tasksFil=useMemo(()=>tasksDisp.filter(t=>!taskFil||t.name.toLowerCase().includes(taskFil.toLowerCase())),[tasksDisp,taskFil]);

  const openNew=()=>{setForm({user_id:authUser?.id||state.users[0]?.id||'',progetto_id:'',clickup_task_id:'',data_attivita:nowDate(),mese_competenza:currMese(),durata_ore:1,durata_min:0,note:''});setTaskFil('');setModal(true);};
  const closeModal=()=>{setModal(false);setForm({});setTaskFil('');};

  const save=async e=>{
    e.preventDefault();
    const durata_minuti=(parseInt(form.durata_ore)||0)*60+(parseInt(form.durata_min)||0);
    if(durata_minuti<=0) return;
    if(api?.enabled){
      try{
        setSaving(true);
        const commessa=state.commesse.find(cm=>cm.mese_competenza===form.mese_competenza && (cm.progetti_ids||[]).includes(form.progetto_id));
        if(!commessa){
          throw new Error('Nessuna commessa trovata per progetto/mese selezionati');
        }
        const task=CLICKUP_TASKS.find(t=>t.id===form.clickup_task_id);
        const saved=await api.createTimesheet({
          commessa_id:commessa.id,
          data_attivita:form.data_attivita,
          mese_competenza:monthToApi(form.mese_competenza),
          durata_minuti,
          servizio:task?.name||'',
          note:form.note||'',
        },{
          progetto_id:form.progetto_id,
          clickup_task_id:form.clickup_task_id,
          servizio:task?.name||'',
        });
        dispatch({type:'UPSERT',entity:'timesheet',item:saved});
        closeModal();
      }catch(errApi){
        alert(`Errore registrazione ore: ${errApi.message||'operazione non riuscita'}`);
      }finally{
        setSaving(false);
      }
      return;
    }
    dispatch({type:'ADD',entity:'timesheet',item:{id:uid(),user_id:form.user_id,progetto_id:form.progetto_id,clickup_task_id:form.clickup_task_id,data_attivita:form.data_attivita,mese_competenza:form.mese_competenza,durata_minuti,stato:'PENDING',note:form.note||''}});
    closeModal();
  };

  const approva=async(id,stato)=>{
    if(api?.enabled){
      try{
        setProcessing(id);
        const savedList=await api.approveTimesheet(id,stato);
        (savedList||[]).forEach(item=>dispatch({type:'UPSERT',entity:'timesheet',item}));
      }catch(errApi){
        alert(`Errore approvazione timesheet: ${errApi.message||'operazione non riuscita'}`);
      }finally{
        setProcessing(null);
      }
      return;
    }
    const t=state.timesheet.find(x=>x.id===id);
    if(t) dispatch({type:'UPDATE',entity:'timesheet',item:{...t,stato}});
  };

  const fil=state.timesheet.filter(t=>filterStato==='TUTTI'||t.stato===filterStato);
  const pending=state.timesheet.filter(t=>t.stato==='PENDING').length;
  const oreAppr=state.timesheet.filter(t=>t.stato==='APPROVATO').reduce((s,t)=>s+t.durata_minuti,0);
  const canApprove=(authUser?.ruolo==='ADMIN'||authUser?.ruolo==='PM');

  const selectedTask=CLICKUP_TASKS.find(t=>t.id===form.clickup_task_id);

  return <div className='fu'>
    {modal&&<Modal title='Registra ore' onClose={closeModal} width={520}>
      <form onSubmit={save}>
        <FRow label='Risorsa'>
          {api?.enabled
            ? <input value={`${authUser?.nome||''} ${authUser?.cognome||''} (${authUser?.ruolo||'USER'})`.trim()} readOnly/>
            : <select value={form.user_id||''} onChange={e=>setForm({...form,user_id:e.target.value})} required>
                {state.users.filter(u=>u.attivo).map(u=><option key={u.id} value={u.id}>{u.nome} {u.cognome} ({u.ruolo})</option>)}
              </select>
          }
        </FRow>

        <FRow label='Progetto ClickUp'>
          <select value={form.progetto_id||''} onChange={e=>setForm({...form,progetto_id:e.target.value,clickup_task_id:''})} required>
            <option value=''>Seleziona lista ClickUp…</option>
            {progettiDisp.map(p=>{const cl=clienteMap[p.cliente_id];return <option key={p.id} value={p.id}>{cl?.codice} / {p.nome}</option>;})}
          </select>
        </FRow>

        {form.progetto_id&&<FRow label='Task ClickUp' hint='Cerca per nome del task'>
          <input value={taskFil} onChange={e=>setTaskFil(e.target.value)} placeholder='Cerca task…' style={{marginBottom:6}}/>
          {form.clickup_task_id&&selectedTask&&<div style={{background:'var(--vdim)',border:'1px solid rgba(176,96,224,.2)',borderRadius:8,padding:'8px 12px',marginBottom:8,display:'flex',gap:8,alignItems:'center'}}>
            <Badge s={selectedTask.status}/>
            <span style={{fontSize:12,fontWeight:600}}>{selectedTask.name}</span>
            <button type='button' onClick={()=>setForm({...form,clickup_task_id:''})} style={{background:'none',border:'none',color:'var(--g4)',marginLeft:'auto',fontSize:14}}>×</button>
          </div>}
          <div style={{maxHeight:160,overflowY:'auto',border:'1px solid var(--g3)',borderRadius:8}}>
            {tasksFil.length===0?<div style={{padding:'12px 14px',fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Nessun task trovato</div>:
            tasksFil.map(t=><div key={t.id} onClick={()=>{setForm(f=>({...f,clickup_task_id:t.id}));setTaskFil('');}}
              style={{display:'flex',gap:10,padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid rgba(255,255,255,.04)',background:form.clickup_task_id===t.id?'var(--vdim)':'transparent',transition:'background .1s'}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.04)'}
              onMouseLeave={e=>e.currentTarget.style.background=form.clickup_task_id===t.id?'var(--vdim)':'transparent'}>
              <Badge s={t.status}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>{t.list}</div>
              </div>
            </div>)}
          </div>
        </FRow>}

        <FGrid>
          <FRow label='Data attività'><input type='date' value={form.data_attivita||nowDate()} onChange={e=>setForm({...form,data_attivita:e.target.value})} required/></FRow>
          <FRow label='Mese competenza'><input type='month' value={form.mese_competenza||currMese()} onChange={e=>setForm({...form,mese_competenza:e.target.value})} required/></FRow>
        </FGrid>
        <FRow label='Durata'>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input type='number' min='0' max='23' value={form.durata_ore||0} onChange={e=>setForm({...form,durata_ore:e.target.value})} style={{width:80}}/><span style={{color:'var(--g5)',flexShrink:0}}>ore</span>
            <input type='number' min='0' max='59' step='15' value={form.durata_min||0} onChange={e=>setForm({...form,durata_min:e.target.value})} style={{width:80}}/><span style={{color:'var(--g5)',flexShrink:0}}>min</span>
          </div>
        </FRow>
        <FRow label='Note'><textarea value={form.note||''} onChange={e=>setForm({...form,note:e.target.value})}/></FRow>
        <FActions onCancel={closeModal} submitLabel={saving?'Salvataggio...':'Registra'}/>
      </form>
    </Modal>}

    <Topbar title='Timesheet'>
      <div style={{display:'flex',gap:4}}>
        {['TUTTI','PENDING','APPROVATO','RIFIUTATO'].map(s=>(
          <button key={s} onClick={()=>setFilterStato(s)} style={{padding:'5px 9px',borderRadius:20,fontSize:10,fontFamily:'var(--fm)',fontWeight:500,cursor:'pointer',border:filterStato===s?'none':'1px solid var(--g3)',background:filterStato===s?'linear-gradient(135deg,var(--purple),var(--violet))':'var(--g2)',color:filterStato===s?'white':'var(--g5)'}}>{s}</button>
        ))}
      </div>
      <Btn v='primary' onClick={openNew}>+ Registra ore</Btn>
    </Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Ore approvate' value={fmtMin(oreAppr)} delay={.05}/>
        <KPI label='Da approvare' value={pending} delay={.08} warn={pending>0} color={pending>0?'var(--amber)':undefined}/>
        <KPI label='Registrazioni totali' value={state.timesheet.length} delay={.11}/>
        <KPI label='Rifiutate' value={state.timesheet.filter(t=>t.stato==='RIFIUTATO').length} delay={.14}/>
      </div>
      <Card>
        <CH title='Registrazioni ore' meta={`${fil.length} voci`} action={<Btn v='primary' onClick={openNew} s={{fontSize:11,padding:'5px 10px'}}>+ Registra</Btn>}/>
        {fil.length===0?<Empty msg='Nessuna registrazione'/>:
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='Risorsa'/><Th c='Task ClickUp'/><Th c='Progetto'/><Th c='Data'/><Th c='Durata'/><Th c='Stato'/><Th c='Azioni'/></tr></thead>
          <tbody>
            {fil.map(t=>{
              const u=userMap[t.user_id]; const p=progettoMap[t.progetto_id];
              const _brandNote=t.note?t.note.replace('[CSV]','').split('|')[0].trim():null;
              const _brandNome=p?.nome||_brandNote||'—';
              const cl=clienteMap[p?.cliente_id];
              const task=CLICKUP_TASKS.find(x=>x.id===t.clickup_task_id);
              return <TR key={t.id}>
                <Td>{u?<div style={{display:'flex',alignItems:'center',gap:8}}><Av u={u} size={24}/><span style={{fontWeight:600}}>{u.nome} {u.cognome}</span></div>:'—'}</Td>
                <Td><div style={{maxWidth:220}}>
                  {task?<><div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{task.name}</div><Badge s={task.status}/></>:<span style={{color:'var(--g5)',fontFamily:'var(--fm)',fontSize:11}}>—</span>}
                </div></Td>
                <Td muted>{p?`${cl?.codice||''} / ${p.nome}`:_brandNome}</Td>
                <Td mono muted>{t.data_attivita}</Td>
                <Td mono>{fmtMin(t.durata_minuti)}</Td>
                <Td><Badge s={t.stato}/></Td>
                <Td>{t.stato==='PENDING'&&canApprove&&<div style={{display:'flex',gap:6}}>
                  <Btn v='success' onClick={()=>approva(t.id,'APPROVATO')} disabled={processing===t.id} s={{padding:'4px 8px',fontSize:11}}>✓</Btn>
                  <Btn v='danger' onClick={()=>approva(t.id,'RIFIUTATO')} disabled={processing===t.id} s={{padding:'4px 8px',fontSize:11}}>✕</Btn>
                </div>}</Td>
              </TR>;
            })}
          </tbody>
        </table>}
      </Card>
    </div>
  </div>;
}

  const todayStr=nowDate();
  const fattureAttiveEffettive=state.fatture_attive.map(f=>{
    if(f.stato!=='INCASSATA'&&f.data_scadenza&&f.data_scadenza<todayStr)
      return {...f,stato:'SCADUTA'};
    return f;
  });
  // Totali filtrati (rispettano filtroStato, filtroDal, filtroAl)
  const fattureFiltrate=fattureAttiveEffettive.filter(fa=>{
    if(filtroStato!=='TUTTI'&&fa.stato!==filtroStato)return false;
    if(filtroDal&&fa.data_emissione&&fa.data_emissione<filtroDal)return false;
    if(filtroAl&&fa.data_emissione&&fa.data_emissione>filtroAl)return false;
    return true;
  });
  const totAttese=fattureFiltrate.filter(f=>f.stato==='ATTESA').reduce((s,f)=>s+f.importo,0);
  const totScadute=fattureFiltrate.filter(f=>f.stato==='SCADUTA').reduce((s,f)=>s+f.importo,0);
  const totIncassate=fattureFiltrate.filter(f=>f.stato==='INCASSATA').reduce((s,f)=>s+f.importo,0);
  // FATTURE PASSIVE
  const totPassiveAttese=state.fatture_passive.filter(f=>f.stato==='ATTESA').reduce((s,f)=>s+f.importo,0);
  const totPagate=state.fatture_passive.filter(f=>f.stato==='PAGATA').reduce((s,f)=>s+f.importo,0);
  // COSTI FISSI
  const mese=currMese();
  const costiMese=state.costi_fissi.filter(c=>c.mese===mese);
  const totCostiFissi=costiMese.reduce((s,c)=>s+c.importo,0);

  // CASH FLOW (6 mesi)
  // Stato filtri cash flow
  const oggi=new Date();
  const [cfDal,setCfDal]=useState(`${oggi.getFullYear()-1}-01`);
  const [cfAl,setCfAl]=useState(`${oggi.getFullYear()}-${String(oggi.getMonth()+4).padStart(2,'0').replace(/^(1[3-9])/,m=>String(parseInt(m)-12).padStart(2,'0'))}`);

  const cashflow=useMemo(()=>{
    const mesi=[];
    const [sy,sm]=cfDal.split('-').map(Number);
    const [ey,em]=cfAl.split('-').map(Number);
    let cy=sy,cm=sm;
    const now=new Date();
    const meseCorrenteKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

    while(cy<ey||(cy===ey&&cm<=em)){
      const mKey=`${cy}-${String(cm).padStart(2,'0')}`;
      const meseDate=new Date(cy,cm-1,1);
      const isFuture=meseDate>new Date(now.getFullYear(),now.getMonth(),1);
      const isCurrent=mKey===meseCorrenteKey;
      const isPast=!isFuture&&!isCurrent;

      // ── ENTRATE ──────────────────────────────────────────
      // Consuntivo (passato + corrente): movimenti cassa reali
      const entrateReali=(isPast||isCurrent)
        ?(state.movimenti_cassa||[])
          .filter(m=>m.tipo==='ENTRATA'&&m.data_valuta?.substring(0,7)===mKey)
          .reduce((s,m)=>s+Math.abs(m.importo||0),0)
        :0;

      // Previsionale (futuro + corrente non ancora incassato): fatture attive non incassate per data_scadenza
      const entratePrev=(isFuture||isCurrent)
        ?state.fatture_attive
          .filter(f=>f.stato!=='INCASSATA'&&f.data_scadenza?.substring(0,7)===mKey)
          .reduce((s,f)=>s+(f.importo_residuo||f.importo||0),0)
        :0;

      // ── USCITE ───────────────────────────────────────────
      // Consuntivo (passato + corrente): movimenti cassa reali
      const usciteReali=(isPast||isCurrent)
        ?(state.movimenti_cassa||[])
          .filter(m=>m.tipo==='USCITA'&&m.data_valuta?.substring(0,7)===mKey)
          .reduce((s,m)=>s+Math.abs(m.importo||0),0)
        :0;

      // Previsionale (futuro + corrente non ancora pagato): fatture passive non pagate per data_emissione
      const uscitePrev=(isFuture||isCurrent)
        ?state.fatture_passive
          .filter(f=>f.stato!=='PAGATA'&&f.data_emissione?.substring(0,7)===mKey)
          .reduce((s,f)=>s+(f.importo||0),0)
        :0;

      const entrate=entrateReali+entratePrev;
      const uscite=usciteReali+uscitePrev;

      mesi.push({
        mese:mKey,
        entrate,entrateReali,entratePrev,
        uscite,usciteReali,uscitePrev,
        netto:entrate-uscite,
        isFuture,isCurrent,isPast
      });
      cm++;if(cm>12){cm=1;cy++;}
    }
    return mesi;
  },[state.fatture_attive,state.fatture_passive,state.movimenti_cassa,cfDal,cfAl]);

  const maxCF=Math.max(...cashflow.map(m=>Math.max(m.entrate,m.uscite)),1);

  const openFattAttiva=()=>setForm({cliente_id:state.clienti[0]?.id||'',numero:'FT-2025-00'+uid().slice(0,3),data_emissione:nowDate(),data_scadenza:addDays(nowDate(),30),importo:0,stato:'ATTESA',note:''})||setModal('fatt_attiva');
  const openFattPassiva=()=>setForm({fornitore:'',categoria:'SOFTWARE',data_emissione:nowDate(),data_scadenza:addDays(nowDate(),30),importo:0,stato:'ATTESA',ricorrente:false,note:''})||setModal('fatt_passiva');
  const [imputazioni,setImputazioni]=React.useState([]);
  const [imputazioniLoading,setImputazioniLoading]=React.useState(false);

  const openEditFattPassiva=async(fp)=>{
    setForm({...fp,_editId:fp.id});
    setModal('edit_fatt_passiva');
    setImputazioni([]);
    setImputazioniLoading(true);
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    try{
      const res=await fetch(`/api/v1/fatture-passive/${fp.id}/imputazioni`,{headers:{'Authorization':'Bearer '+token}});
      if(res.ok) setImputazioni(await res.json());
    }catch(e){}
    setImputazioniLoading(false);
  };
  const saveEditFattPassiva=async e=>{
    e.preventDefault();
    // Validazione numero duplicato
    if(form.numero&&state.fatture_passive.some(f=>f.numero===form.numero&&f.id!==form._editId)){
      alert('Numero fattura già utilizzato. Scegli un numero diverso.');
      return;
    }
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    const payload={
      ricorrente:form.ricorrente||false,
      periodicita:form.ricorrente?(form.periodicita||'mensile'):null,
      categoria:form.categoria||null,
      commessa_id:form.commessa_id||null,
      note:form.note||null,
      numero:form.numero||null,
    };
    try{
      const res=await fetch('/api/v1/fatture-passive/'+form._editId,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(payload)});
      if(res.ok){
        // Salva imputazioni
        const impValide=imputazioni.filter(i=>i.tipo==='STRUTTURA'||(i.tipo==='CLIENTE'&&i.cliente_id)||(i.tipo==='PROGETTO'&&i.progetto_id));
        await fetch(`/api/v1/fatture-passive/${form._editId}/imputazioni`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({imputazioni:impValide})});
        const totPerc=impValide.reduce((s,i)=>s+(parseFloat(i.percentuale)||0),0);
        const stato_imputazione=impValide.length===0?'NON_IMPUTATA':Math.abs(totPerc-100)<0.1?'COMPLETA':'PARZIALE';
        dispatch({type:'UPDATE',entity:'fatture_passive',item:{...form,...payload,id:form._editId,stato_imputazione,imputazioni:impValide}});
        closeModal();
      }else{const err=await res.json().catch(()=>({}));alert('Errore: '+JSON.stringify(err));}
    }catch(e){console.error(e);}
  };
  const openCosto=()=>setForm({descrizione:'',importo:0,categoria:'PERSONALE',periodicita:'mensile',attivo:true,data_inizio:'',data_fine:'',note:''})||setModal('costo');
  const closeModal=()=>{setModal(null);setForm({});setServizi([]);};

  const saveFattAttiva=e=>{e.preventDefault();dispatch({type:'ADD',entity:'fatture_attive',item:{...form,id:uid(),importo:parseFloat(form.importo)||0}});closeModal();};
  const saveFattPassiva=e=>{e.preventDefault();dispatch({type:'ADD',entity:'fatture_passive',item:{...form,id:uid(),importo:parseFloat(form.importo)||0}});closeModal();};
  const saveCosto=async e=>{
    e.preventDefault();
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    const payload={
      descrizione:form.descrizione,
      importo:parseFloat(form.importo)||0,
      categoria:form.categoria||'ALTRO',
      periodicita:form.periodicita||'mensile',
      attivo:true,
      data_inizio:form.data_inizio||null,
      data_fine:form.data_fine||null,
      note:form.note||null,
    };
    try{
      const res=await fetch('/api/v1/costi-fissi',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(payload)});
      if(res.ok){const data=await res.json();dispatch({type:'ADD',entity:'costi_fissi',item:{...data,importo:parseFloat(data.importo)||0}});closeModal();}
      else{const err=await res.json().catch(()=>({}));alert('Errore: '+JSON.stringify(err));}
    }catch(e){console.error(e);}
  };
  const saveEditCosto=async e=>{
    e.preventDefault();
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    const payload={
      descrizione:form.descrizione,
      importo:parseFloat(form.importo)||0,
      categoria:form.categoria||'ALTRO',
      periodicita:form.periodicita||'mensile',
      attivo:form.attivo!==false,
      data_inizio:form.data_inizio||null,
      data_fine:form.data_fine||null,
      note:form.note||null,
    };
    try{
      const res=await fetch('/api/v1/costi-fissi/'+form._editId,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(payload)});
      if(res.ok){const data=await res.json();dispatch({type:'UPDATE',entity:'costi_fissi',item:{...data,importo:parseFloat(data.importo)||0,id:form._editId}});closeModal();}
      else{const err=await res.json().catch(()=>({}));alert('Errore: '+JSON.stringify(err));}
    }catch(e){console.error(e);}
  };

  const cambiaStatoFattAttiva=async(id,stato)=>{
    if(stato==='INCASSATA'){
      const raw=window.prompt('Data di incasso (DD/MM/YYYY):',new Date().toLocaleDateString('it-IT'));
      if(!raw)return;
      let data=raw.trim();
      if(/^\d{2}\/\d{2}\/\d{4}$/.test(data)){const p=data.split('/');data=p[2]+'-'+p[1]+'-'+p[0];}
      if(!/^\d{4}-\d{2}-\d{2}$/.test(data)){alert('Formato data non valido');return;}
      try{
        const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
        const res=await fetch('/api/v1/fatture-attive/'+id+'/incassa',{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({data_incasso:data})});
        console.log('INCASSO status:',res.status);
        if(res.ok){const f=state.fatture_attive.find(x=>x.id===id);if(f)dispatch({type:'UPDATE',entity:'fatture_attive',item:{...f,stato:'INCASSATA',data_ultimo_incasso:data}});}
        else{const err=await res.json().catch(()=>({}));alert('Errore: '+JSON.stringify(err));}
      }catch(e){console.error(e);}
      return;
    }
    const f=state.fatture_attive.find(x=>x.id===id);if(f)dispatch({type:'UPDATE',entity:'fatture_attive',item:{...f,stato}});
  };
  const cambiaStatoFattPassiva=async(id,stato)=>{
    if(stato==='PAGATA'){
      const raw=window.prompt('Data di pagamento (DD/MM/YYYY):',new Date().toLocaleDateString('it-IT'));
      if(!raw)return;
      let data=raw.trim();
      if(/^\d{2}\/\d{2}\/\d{4}$/.test(data)){const p=data.split('/');data=p[2]+'-'+p[1]+'-'+p[0];}
      if(!/^\d{4}-\d{2}-\d{2}$/.test(data)){alert('Formato data non valido');return;}
      try{
        const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
        const res=await fetch('/api/v1/fatture-passive/'+id,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({stato_pagamento:'paid',data_ultimo_pagamento:data})});
        if(res.ok){const f=state.fatture_passive.find(x=>x.id===id);if(f)dispatch({type:'UPDATE',entity:'fatture_passive',item:{...f,stato:'PAGATA',data_ultimo_pagamento:data}});}
        else{const err=await res.json().catch(()=>({}));alert('Errore: '+JSON.stringify(err));}
      }catch(e){console.error(e);}
      return;
    }
    const f=state.fatture_passive.find(x=>x.id===id);if(f)dispatch({type:'UPDATE',entity:'fatture_passive',item:{...f,stato}});
  };
  const TABS=[{id:'fatture_attive',label:'Fatture attive'},{id:'fatture_passive',label:'Fatture passive'},{id:'costi_fissi',label:'Costi fissi'},{id:'cashflow',label:'Cash flow'},{id:'insight',label:'Insight'}];

  return <div className='fu'>
    {modal==='fatt_attiva'&&<Modal title='Nuova fattura attiva' onClose={closeModal}>
      <form onSubmit={saveFattAttiva}>
        <FRow label='Cliente'><select value={form.cliente_id||''} onChange={e=>setForm({...form,cliente_id:e.target.value})} required>{state.clienti.map(c=><option key={c.id} value={c.id}>{c.codice} — {c.ragione_sociale}</option>)}</select></FRow>
        <FRow label='Numero fattura'><input value={form.numero||''} onChange={e=>setForm({...form,numero:e.target.value})} required/></FRow>
        <FGrid>
          <FRow label='Data emissione'><input type='date' value={form.data_emissione||nowDate()} onChange={e=>setForm({...form,data_emissione:e.target.value})} required/></FRow>
          <FRow label='Data scadenza'><input type='date' value={form.data_scadenza||''} onChange={e=>setForm({...form,data_scadenza:e.target.value})} required/></FRow>
        </FGrid>
        <FRow label='Importo (€)'><input type='number' min='0' step='0.01' value={form.importo||0} onChange={e=>setForm({...form,importo:e.target.value})} required/></FRow>
        <FRow label='Stato'><select value={form.stato||'ATTESA'} onChange={e=>setForm({...form,stato:e.target.value})}><option value='ATTESA'>In attesa</option><option value='INCASSATA'>Incassata</option><option value='SCADUTA'>Scaduta</option></select></FRow>
        <FActions onCancel={closeModal} submitLabel='Salva fattura'/>
      </form>
    </Modal>}

    {modal==='edit_fatt_passiva'&&<Modal title='Modifica fattura passiva' onClose={closeModal}>
      <form onSubmit={saveEditFattPassiva}>
        <FRow label='Fornitore'><input disabled value={form.fornitore||'—'} style={{opacity:.6}}/></FRow>
        <FRow label='Importo'><input disabled value={fmtEuro(form.importo||0)} style={{opacity:.6}}/></FRow>
        <FRow label='N° Fattura'>
          <input value={form.numero||''} onChange={e=>setForm({...form,numero:e.target.value})} placeholder='es. 2026/0047'/>
          {form.numero&&state.fatture_passive.some(f=>f.numero===form.numero&&f.id!==form._editId)&&
            <span style={{color:'var(--red)',fontSize:11,marginTop:4,display:'block'}}>⚠ Numero già utilizzato da {state.fatture_passive.find(f=>f.numero===form.numero&&f.id!==form._editId)?.fornitore}</span>
          }
        </FRow>
        <FRow label='Categoria'>
          <select value={form.categoria||'ALTRO'} onChange={e=>setForm({...form,categoria:e.target.value})}>
            {['SOFTWARE','STRUTTURA','PERSONALE','CONSULENZE','MARKETING','UTILITIES','BANCHE','ALTRO'].map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </FRow>
        <FRow label='Ricorrente'>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
            <input type='checkbox' checked={!!form.ricorrente} onChange={e=>setForm({...form,ricorrente:e.target.checked})}/>
            <span>Sì, è ricorrente</span>
          </label>
        </FRow>
        {form.ricorrente&&<FRow label='Periodicità'>
          <select value={form.periodicita||'mensile'} onChange={e=>setForm({...form,periodicita:e.target.value})}>
            {['mensile','bimestrale','trimestrale','semestrale','annuale'].map(p=><option key={p} value={p}>{p.charAt(0).toUpperCase()+p.slice(1)}</option>)}
          </select>
        </FRow>}
        {/* IMPUTAZIONI */}
        <div style={{background:'var(--g2)',borderRadius:8,padding:'12px 14px',marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <span style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',letterSpacing:'0.06em'}}>IMPUTAZIONE COSTI</span>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              {(()=>{const tot=imputazioni.reduce((s,i)=>s+(parseFloat(i.percentuale)||0),0);
                return <span style={{fontSize:11,fontWeight:700,color:Math.abs(tot-100)<0.1?'var(--green)':tot>100?'var(--red)':'var(--amber)'}}>{tot.toFixed(0)}% imputato</span>;
              })()}
              <button type='button' onClick={()=>setImputazioni([...imputazioni,{id:'new_'+Date.now(),tipo:'PROGETTO',cliente_id:'',progetto_id:'',percentuale:'',note:''}])}
                style={{padding:'3px 8px',borderRadius:5,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g5)',fontSize:11,cursor:'pointer'}}>+ Aggiungi</button>
            </div>
          </div>
          {imputazioniLoading?<div style={{fontSize:12,color:'var(--g4)',textAlign:'center',padding:8}}>Caricamento...</div>:
          imputazioni.length===0?<div style={{fontSize:11,color:'var(--g4)',textAlign:'center',padding:'8px 0'}}>Nessuna imputazione — tutta la spesa va in Struttura</div>:
          imputazioni.map((imp,idx)=><div key={imp.id||idx} style={{borderTop:'1px solid var(--g3)',paddingTop:10,marginTop:10}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 80px 28px',gap:8,alignItems:'end'}}>
              <div>
                <label style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',display:'block',marginBottom:4}}>TIPO</label>
                <select value={imp.tipo||'PROGETTO'} onChange={e=>{const n=[...imputazioni];n[idx]={...n[idx],tipo:e.target.value,progetto_id:'',cliente_id:''};setImputazioni(n);}}
                  style={{width:'100%',padding:'6px 8px',borderRadius:6,border:'1px solid var(--g3)',background:'var(--g1)',color:'var(--g6)',fontSize:12}}>
                  <option value='PROGETTO'>Progetto</option>
                  <option value='CLIENTE'>Cliente (generico)</option>
                  <option value='STRUTTURA'>Struttura</option>
                </select>
              </div>
              <div>
                {imp.tipo==='STRUTTURA'?
                  <div style={{paddingTop:20,fontSize:11,color:'var(--g4)'}}>Costo generale agenzia</div>:
                imp.tipo==='CLIENTE'?
                  <div>
                    <label style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',display:'block',marginBottom:4}}>CLIENTE</label>
                    <select value={imp.cliente_id||''} onChange={e=>{const n=[...imputazioni];n[idx]={...n[idx],cliente_id:e.target.value};setImputazioni(n);}}
                      style={{width:'100%',padding:'6px 8px',borderRadius:6,border:'1px solid var(--g3)',background:'var(--g1)',color:'var(--g6)',fontSize:12}}>
                      <option value=''>— Seleziona cliente —</option>
                      {(state.clienti||[]).sort((a,b)=>a.ragione_sociale?.localeCompare(b.ragione_sociale)).map(c=><option key={c.id} value={c.id}>{c.codice?c.codice+' — ':''}{c.ragione_sociale}</option>)}
                    </select>
                  </div>:
                  <div>
                    <label style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',display:'block',marginBottom:4}}>PROGETTO</label>
                    <select value={imp.progetto_id||''} onChange={e=>{const n=[...imputazioni];n[idx]={...n[idx],progetto_id:e.target.value,cliente_id:(state.progetti||[]).find(p=>p.id===e.target.value)?.cliente_id||''};setImputazioni(n);}}
                      style={{width:'100%',padding:'6px 8px',borderRadius:6,border:'1px solid var(--g3)',background:'var(--g1)',color:'var(--g6)',fontSize:12}}>
                      <option value=''>— Seleziona progetto —</option>
                      {(state.progetti||[]).sort((a,b)=>a.nome?.localeCompare(b.nome)).map(p=>{
                        const cl=(state.clienti||[]).find(c=>c.id===p.cliente_id);
                        return <option key={p.id} value={p.id}>{cl?.codice?cl.codice+' · ':''}{p.nome}</option>;
                      })}
                    </select>
                  </div>
                }
              </div>
              <div>
                <label style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',display:'block',marginBottom:4}}>% QUOTA</label>
                <input type='number' min='1' max='100' value={imp.percentuale||''} onChange={e=>{const n=[...imputazioni];n[idx]={...n[idx],percentuale:e.target.value};setImputazioni(n);}}
                  placeholder='es. 50' style={{width:'100%',padding:'6px 8px',borderRadius:6,border:'1px solid var(--g3)',background:'var(--g1)',color:'var(--g6)',fontSize:12}}/>
              </div>
              <button type='button' onClick={()=>setImputazioni(imputazioni.filter((_,i)=>i!==idx))}
                style={{padding:'6px 8px',borderRadius:6,border:'1px solid rgba(239,68,68,.3)',background:'rgba(239,68,68,.1)',color:'var(--red)',fontSize:12,cursor:'pointer',marginBottom:1}}>✕</button>
            </div>
            {imp.tipo!=='STRUTTURA'&&<div style={{marginTop:6}}>
              <input placeholder='Note (opzionale)' value={imp.note||''} onChange={e=>{const n=[...imputazioni];n[idx]={...n[idx],note:e.target.value};setImputazioni(n);}}
                style={{width:'100%',padding:'5px 8px',borderRadius:6,border:'1px solid var(--g3)',background:'var(--g1)',color:'var(--g6)',fontSize:11,boxSizing:'border-box'}}/>
            </div>}
          </div>)}
          {/* Barra progresso imputazione */}
          {imputazioni.length>0&&(()=>{
            const tot=imputazioni.reduce((s,i)=>s+(parseFloat(i.percentuale)||0),0);
            return <div style={{marginTop:10}}>
              <div style={{width:'100%',height:6,background:'var(--g3)',borderRadius:3,overflow:'hidden'}}>
                <div style={{width:Math.min(tot,100)+'%',height:'100%',background:Math.abs(tot-100)<0.1?'var(--green)':tot>100?'var(--red)':'var(--amber)',borderRadius:3,transition:'width .3s'}}/>
              </div>
              {Math.abs(tot-100)>0.1&&<div style={{fontSize:10,color:tot>100?'var(--red)':'var(--amber)',marginTop:3}}>
                {tot>100?`⚠ Supera del ${(tot-100).toFixed(0)}%`:`⚠ Mancano ${(100-tot).toFixed(0)}% — il restante va in Struttura`}
              </div>}
            </div>;
          })()}
        </div>
        <FRow label='Note'><textarea value={form.note||''} onChange={e=>setForm({...form,note:e.target.value})} rows={3}/></FRow>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
          <Btn v='ghost' onClick={closeModal} type='button'>Annulla</Btn>
          <Btn v='primary' type='submit'>Salva modifiche</Btn>
        </div>
      </form>
    </Modal>}
    {modal==='fatt_passiva'&&<Modal title='Nuova fattura passiva' onClose={closeModal}>
      <form onSubmit={saveFattPassiva}>
        <FRow label='Fornitore'><input required value={form.fornitore||''} onChange={e=>setForm({...form,fornitore:e.target.value})}/></FRow>
        <FGrid>
          <FRow label='Categoria'><select value={form.categoria||'SOFTWARE'} onChange={e=>setForm({...form,categoria:e.target.value})}>{['SOFTWARE','STRUTTURA','PERSONALE','CONSULENZE','ALTRO'].map(c=><option key={c} value={c}>{c}</option>)}</select></FRow>
          <FRow label='Importo (€)'><input type='number' min='0' step='0.01' value={form.importo||0} onChange={e=>setForm({...form,importo:e.target.value})} required/></FRow>
        </FGrid>
        <FGrid>
          <FRow label='Data emissione'><input type='date' value={form.data_emissione||nowDate()} onChange={e=>setForm({...form,data_emissione:e.target.value})}/></FRow>
          <FRow label='Data scadenza'><input type='date' value={form.data_scadenza||''} onChange={e=>setForm({...form,data_scadenza:e.target.value})}/></FRow>
        </FGrid>
        <FRow label='Stato'><select value={form.stato||'ATTESA'} onChange={e=>setForm({...form,stato:e.target.value})}><option value='ATTESA'>Da pagare</option><option value='PAGATA'>Pagata</option></select></FRow>
        <FRow label='Ricorrente?'><select value={form.ricorrente?'true':'false'} onChange={e=>setForm({...form,ricorrente:e.target.value==='true'})}><option value='true'>Sì — si ripete ogni mese</option><option value='false'>No — una tantum</option></select></FRow>
        <FActions onCancel={closeModal} submitLabel='Salva fattura'/>
      </form>
    </Modal>}

    {(modal==='costo'||modal==='edit_costo')&&<Modal title={modal==='costo'?'Nuovo costo fisso':'Modifica costo fisso'} onClose={closeModal}>
      <form onSubmit={modal==='costo'?saveCosto:saveEditCosto}>
        <FRow label='Descrizione'><input required value={form.descrizione||''} onChange={e=>setForm({...form,descrizione:e.target.value})}/></FRow>
        <FGrid>
          <FRow label='Importo (€)'><input type='number' min='0' step='0.01' value={form.importo||0} onChange={e=>setForm({...form,importo:e.target.value})} required/></FRow>
          <FRow label='Categoria'>
            <select value={form.categoria||'ALTRO'} onChange={e=>setForm({...form,categoria:e.target.value})}>
              {['PERSONALE','STRUTTURA','SOFTWARE','CONSULENZE','MARKETING','UTILITIES','ALTRO'].map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </FRow>
        </FGrid>
        <FRow label='Periodicità'>
          <select value={form.periodicita||'mensile'} onChange={e=>setForm({...form,periodicita:e.target.value})}>
            {['mensile','bimestrale','trimestrale','semestrale','annuale'].map(p=><option key={p} value={p}>{p.charAt(0).toUpperCase()+p.slice(1)}</option>)}
          </select>
        </FRow>
        <FGrid>
          <FRow label='Data inizio'><input type='date' value={form.data_inizio||''} onChange={e=>setForm({...form,data_inizio:e.target.value})}/></FRow>
          <FRow label='Data fine (opzionale)'><input type='date' value={form.data_fine||''} onChange={e=>setForm({...form,data_fine:e.target.value||null})} placeholder='— Rapporto in corso —'/></FRow>
        </FGrid>
        <FRow label='Note'><textarea value={form.note||''} onChange={e=>setForm({...form,note:e.target.value})} rows={2}/></FRow>
        <FActions onCancel={closeModal} submitLabel='Salva costo'/>
      </form>
    </Modal>}

    <Topbar title='Sezione Finanziaria'>
      {tab==='fatture_attive'&&<Btn v='primary' onClick={openFattAttiva}>+ Nuova fattura</Btn>}
      {tab==='fatture_passive'&&<Btn v='primary' onClick={openFattPassiva}>+ Nuova fattura passiva</Btn>}
      {tab==='costi_fissi'&&<Btn v='primary' onClick={openCosto}>+ Nuovo costo</Btn>}
    </Topbar>

    <div style={{padding:'22px 26px'}}>
      {/* KPI FINANZIARIO */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Da incassare' value={fmtEuro(totAttese)} delay={.05}/>
        <KPI label='Crediti scaduti' value={fmtEuro(totScadute)} delay={.08} warn={totScadute>0} color={totScadute>0?'var(--red)':undefined}/>
        <KPI label='Da pagare (passive)' value={fmtEuro(totPassiveAttese)} delay={.11}/>
        <KPI label='Costi fissi mese' value={fmtEuro(totCostiFissi)} delay={.14}/>
      </div>

      {/* TABS */}
      <div style={{display:'flex',gap:6,marginBottom:16}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'7px 16px',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',border:tab===t.id?'none':'1px solid var(--g3)',background:tab===t.id?'linear-gradient(135deg,var(--purple),var(--violet))':'var(--g2)',color:tab===t.id?'white':'var(--g5)',transition:'all .15s'}}>{t.label}</button>)}
      </div>

      {/* FATTURE ATTIVE */}
      {tab==='fatture_attive'&&<Card>
        <CH title='Fatture emesse ai clienti' meta={`${state.fatture_attive.length} fatture`}/>
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
          <select value={filtroStato} onChange={e=>setFiltroStato(e.target.value)} style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g6)',fontSize:12}}>
            <option value='TUTTI'>Tutti gli stati</option>
            <option value='ATTESA'>In attesa</option>
            <option value='INCASSATA'>Incassate</option>
            <option value='SCADUTA'>Scadute</option>
            <option value='PARZIALE'>Parziali</option>
          </select>
          <span style={{fontSize:11,color:'var(--g4)'}}>Dal</span>
          <input type='date' value={filtroDal} onChange={e=>setFiltroDal(e.target.value)} style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g6)',fontSize:12}}/>
          <span style={{fontSize:11,color:'var(--g4)'}}>Al</span>
          <input type='date' value={filtroAl} onChange={e=>setFiltroAl(e.target.value)} style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g6)',fontSize:12}}/>
          <div style={{display:'flex',gap:4}}>
            {[{l:'2025',d:'2025-01-01',a:'2025-12-31'},{l:'2026',d:'2026-01-01',a:'2026-12-31'},{l:'Q1',d:new Date().getFullYear()+'-01-01',a:new Date().getFullYear()+'-03-31'},{l:'Q2',d:new Date().getFullYear()+'-04-01',a:new Date().getFullYear()+'-06-30'},{l:'Q3',d:new Date().getFullYear()+'-07-01',a:new Date().getFullYear()+'-09-30'},{l:'Q4',d:new Date().getFullYear()+'-10-01',a:new Date().getFullYear()+'-12-31'}].map(q=><button key={q.l} onClick={()=>{setFiltroDal(q.d);setFiltroAl(q.a);}} style={{padding:'4px 8px',borderRadius:6,border:'1px solid var(--g3)',background:filtroDal===q.d&&filtroAl===q.a?'var(--purple)':'var(--g2)',color:filtroDal===q.d&&filtroAl===q.a?'white':'var(--g5)',fontSize:11,cursor:'pointer'}}>{q.l}</button>)}
          </div>
          {(filtroStato!=='TUTTI'||filtroDal||filtroAl)&&<button onClick={()=>{setFiltroStato('TUTTI');setFiltroDal('');setFiltroAl('');}} style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--red)',fontSize:12,cursor:'pointer'}}>✕ Reset</button>}
        </div>
        {state.fatture_attive.length===0?<Empty msg='Nessuna fattura'/>:
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='N°'/><Th c='Cliente'/><Th c='Importo Netto'/><Th c='Importo Totale'/><Th c='Emissione'/><Th c='Scadenza'/><Th c='Incasso'/><Th c='Stato'/><Th c='Azioni'/></tr></thead>
          <tbody>
            {[...fattureAttiveEffettive]
              .filter(fa=>{
                if(filtroStato!=='TUTTI'&&fa.stato!==filtroStato)return false;
                if(filtroDal&&fa.data_emissione&&fa.data_emissione<filtroDal)return false;
                if(filtroAl&&fa.data_emissione&&fa.data_emissione>filtroAl)return false;
                return true;
              })
              .sort((a,b)=>b.data_emissione?.localeCompare(a.data_emissione||'')).map(fa=>{
              const cl=clienteMap[fa.cliente_id];
              const gg=fa.stato==='SCADUTA'?diffDays(fa.data_scadenza,nowDate()):null;
              return <TR key={fa.id}>
                <Td mono muted>{fa.numero}</Td>
                <Td><div style={{fontWeight:700}}>{cl?.ragione_sociale||'—'}</div></Td>
                <Td mono style={{color:'var(--g5)',fontWeight:600}}>{fmtEuro(fa.importo/1.22)}</Td>
                <Td mono style={{color:'var(--green)',fontWeight:700}}>{fmtEuro(fa.importo)}</Td>
                <Td mono muted>{fmtDate(fa.data_emissione)}</Td>
                <Td mono>{fmtDate(fa.data_scadenza)}{gg!==null&&<span style={{color:'var(--red)',marginLeft:6,fontFamily:'var(--fm)',fontSize:10}}>+{gg}gg</span>}</Td>
                <Td mono style={{color:'var(--green)'}}>{fa.data_ultimo_incasso?fmtDate(fa.data_ultimo_incasso):<span style={{color:'var(--g4)'}}>—</span>}</Td>
                <Td><Badge s={fa.stato}/></Td>
                <Td><div style={{display:'flex',gap:5}}>
                  {fa.stato==='ATTESA'&&<><Btn v='success' onClick={()=>cambiaStatoFattAttiva(fa.id,'INCASSATA')} s={{padding:'4px 8px',fontSize:11}}>✓ Incassata</Btn><Btn v='danger' onClick={()=>cambiaStatoFattAttiva(fa.id,'SCADUTA')} s={{padding:'4px 8px',fontSize:11}}>Scaduta</Btn></>}
                  {fa.stato==='SCADUTA'&&<Btn v='success' onClick={()=>cambiaStatoFattAttiva(fa.id,'INCASSATA')} s={{padding:'4px 8px',fontSize:11}}>✓ Incassata</Btn>}
                  {fa.stato==='INCASSATA'&&<span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--green)'}}>✓ Incassata</span>}
                </div></Td>
              </TR>;
            })}
          </tbody>
        </table>}
        <div style={{padding:'12px 18px',borderTop:'1px solid var(--g2)',display:'flex',gap:24}}>
          <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>In attesa: <b style={{color:'var(--amber)'}}>{fmtEuro(totAttese)}</b></span>
          <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)',marginLeft:20}}>Scadute: <b style={{color:'var(--red)'}}>{fmtEuro(totScadute)}</b></span>
          <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)',marginLeft:20}}>Incassate: <b style={{color:'var(--green)'}}>{fmtEuro(totIncassate)}</b></span>
        </div>
      </Card>}

      {/* FATTURE PASSIVE */}
      {tab==='fatture_passive'&&<Card>
        <CH title='Fatture da fornitori' meta={`${state.fatture_passive.length} fatture`}/>
        {/* FILTRI */}
        <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
          <input placeholder='Cerca fornitore...' value={fpSearch} onChange={e=>setFpSearch(e.target.value)}
            style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g6)',fontSize:12,minWidth:180}}/>
          <input type='date' value={fpDal} onChange={e=>setFpDal(e.target.value)}
            style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g6)',fontSize:12}}/>
          <input type='date' value={fpAl} onChange={e=>setFpAl(e.target.value)}
            style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g6)',fontSize:12}}/>
          <select value={fpStato} onChange={e=>setFpStato(e.target.value)}
            style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g6)',fontSize:12}}>
            <option value='TUTTI'>Tutti gli stati</option>
            <option value='ATTESA'>In attesa</option>
            <option value='paid'>Pagate</option>
          </select>
          {(fpSearch||fpDal||fpAl||fpStato!=='TUTTI')&&<button onClick={()=>{setFpSearch('');setFpDal('');setFpAl('');setFpStato('TUTTI');}}
            style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g4)',fontSize:12,cursor:'pointer'}}>✕ Reset</button>}
        </div>
        {state.fatture_passive.length===0?<Empty msg='Nessuna fattura passiva'/>:
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='N°'/><Th c='Fornitore'/><Th c='Categoria'/><Th c='Imp.'/><Th c='Netto'/><Th c='IVA'/><Th c='Lordo'/><Th c='Emissione'/><Th c='Scadenza'/><Th c='Stato'/><Th c='Pagamento'/><Th c='Azioni'/></tr></thead>
          <tbody>
            {state.fatture_passive.filter(fp=>{
              if(fpSearch&&!fp.fornitore?.toLowerCase().includes(fpSearch.toLowerCase()))return false;
              if(fpStato!=='TUTTI'&&fp.stato!==fpStato)return false;
              if(fpDal&&fp.data_emissione&&fp.data_emissione<fpDal)return false;
              if(fpAl&&fp.data_emissione&&fp.data_emissione>fpAl)return false;
              return true;
            }).map(fp=><TR key={fp.id}>
              <Td mono muted>{fp.numero||'—'}</Td>
              <Td><div style={{fontWeight:700}}>{fp.fornitore}</div></Td>
              <Td muted>{fp.categoria}</Td>
              <Td>
                {fp.stato_imputazione==='COMPLETA'?<span style={{fontSize:10,color:'var(--green)',fontFamily:'var(--fm)'}}>● 100%</span>:
                 fp.stato_imputazione==='PARZIALE'?<span style={{fontSize:10,color:'var(--amber)',fontFamily:'var(--fm)'}}>◑ parz.</span>:
                 <span style={{fontSize:10,color:'var(--g4)',fontFamily:'var(--fm)'}}>○ —</span>}
              </Td>
              <Td mono style={{color:'var(--g5)'}}>{fp.importo_netto>0?fmtEuro(fp.importo_netto):'—'}</Td>
              <Td mono style={{color:'var(--amber)'}}>{fp.importo_iva>0?fmtEuro(fp.importo_iva):'—'}</Td>
              <Td mono style={{color:'var(--red)',fontWeight:700}}>−{fmtEuro(fp.importo)}</Td>
              <Td mono muted>{fmtDate(fp.data_emissione)}</Td>
              <Td mono muted>{fmtDate(fp.data_scadenza)}</Td>
              <Td><Badge s={fp.stato}/></Td>
              <Td>
                {fp.data_ultimo_pagamento&&<div style={{fontSize:11,color:'var(--green)'}}>{fmtDate(fp.data_ultimo_pagamento)}</div>}
                {fp.metodo_pagamento&&<div style={{fontSize:10,color:'var(--g4)'}}>{fp.metodo_pagamento}</div>}
                {!fp.data_ultimo_pagamento&&<span style={{color:'var(--g4)',fontSize:11}}>—</span>}
              </Td>
              <Td style={{display:'flex',gap:4}}>
                {fp.stato==='ATTESA'&&<Btn v='success' onClick={()=>cambiaStatoFattPassiva(fp.id,'PAGATA')} s={{padding:'4px 8px',fontSize:11}}>✓ Pagata</Btn>}
                {fp.stato==='PAGATA'&&<Btn v='danger' onClick={async()=>{
                  if(!window.confirm('Annullare il pagamento di questa fattura?'))return;
                  const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
                  const res=await fetch('/api/v1/fatture-passive/'+fp.id,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({stato_pagamento:'ATTESA',data_ultimo_pagamento:null,metodo_pagamento:null})});
                  if(res.ok){dispatch({type:'UPDATE',entity:'fatture_passive',item:{...fp,stato:'ATTESA',data_ultimo_pagamento:null,metodo_pagamento:null}});}
                  else{alert('Errore durante annullamento');}
                }} s={{padding:'4px 8px',fontSize:11}}>✕ Annulla</Btn>}
                <Btn v='ghost' onClick={()=>openEditFattPassiva(fp)} s={{padding:'4px 8px',fontSize:11}}>✎ Modifica</Btn>
              </Td>
            </TR>)}
          </tbody>
        </table>}
      </Card>}

      {/* COSTI FISSI */}
      {tab==='costi_fissi'&&(()=>{
        const PERIODI={'mensile':1,'bimestrale':2,'trimestrale':3,'semestrale':6,'annuale':12};
        const costiAttivi=(state.costi_fissi||[]).filter(c=>c.attivo!==false);
        const normalizzaMese=c=>parseFloat(c.importo||0)/(PERIODI[c.periodicita]||1);
        const totMensile=costiAttivi.reduce((s,c)=>s+normalizzaMese(c),0);
        const catTotali=['PERSONALE','STRUTTURA','SOFTWARE','CONSULENZE','MARKETING','UTILITIES','ALTRO'].map(cat=>({
          cat,tot:costiAttivi.filter(c=>c.categoria===cat).reduce((s,c)=>s+normalizzaMese(c),0)
        })).filter(x=>x.tot>0);
        return <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:16}}>
            <KPI label='Costo fisso mensile' value={fmtEuro(totMensile)} color='var(--red)'/>
            <KPI label='Costo fisso annuale' value={fmtEuro(totMensile*12)} color='var(--red)'/>
            <KPI label='Break-even mensile' value={fmtEuro(totMensile*1.3)} color='var(--amber)'/>
            <KPI label='Voci attive' value={costiAttivi.length}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:16}}>
            {catTotali.map(({cat,tot})=><KPI key={cat} label={cat} value={fmtEuro(tot)} color='var(--g5)'/>)}
          </div>
          <Card>
            <CH title='Costi fissi' meta={`${costiAttivi.length} voci attive · ${fmtEuro(totMensile)}/mese`}/>
            {(state.costi_fissi||[]).length===0?<Empty msg='Nessun costo fisso inserito'/>:
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
              <thead><tr><Th c='Descrizione'/><Th c='Categoria'/><Th c='Importo'/><Th c='Periodicità'/><Th c='Mensile'/><Th c='Stato'/><Th c='Azioni'/></tr></thead>
              <tbody>
                {(state.costi_fissi||[]).map(c=>{
                  const mensile=normalizzaMese(c);
                  return <TR key={c.id} style={{opacity:c.attivo===false?.5:1}}>
                    <Td><div style={{fontWeight:700}}>{c.descrizione}</div>{c.note&&<div style={{fontSize:11,color:'var(--g4)'}}>{c.note}</div>}</Td>
                    <Td><Badge s={c.categoria}/></Td>
                    <Td mono style={{color:'var(--red)',fontWeight:700}}>−{fmtEuro(c.importo)}</Td>
                    <Td><span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--amber)'}}>{c.periodicita||'mensile'}</span></Td>
                    <Td mono style={{color:'var(--red)',fontSize:11}}>−{fmtEuro(mensile)}/m</Td>
                    <Td><span style={{fontSize:11,color:c.attivo!==false?'var(--green)':'var(--g4)'}}>{c.attivo!==false?'● Attivo':'○ Inattivo'}</span></Td>
                    <Td style={{display:'flex',gap:4}}>
                      <Btn v='ghost' onClick={()=>{setForm({...c,_editId:c.id});setModal('edit_costo');}} s={{padding:'4px 8px',fontSize:11}}>✎</Btn>
                      <Btn v={c.attivo!==false?'danger':'success'} onClick={async()=>{
                        const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
                        const res=await fetch('/api/v1/costi-fissi/'+c.id,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({attivo:c.attivo===false})});
                        if(res.ok)dispatch({type:'UPDATE',entity:'costi_fissi',item:{...c,attivo:c.attivo===false}});
                      }} s={{padding:'4px 8px',fontSize:11}}>{c.attivo!==false?'Disattiva':'Attiva'}</Btn>
                      <Btn v='danger' onClick={async()=>{
                        if(!window.confirm('Eliminare questo costo fisso?'))return;
                        const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
                        const res=await fetch('/api/v1/costi-fissi/'+c.id,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});
                        if(res.ok)dispatch({type:'DELETE',entity:'costi_fissi',id:c.id});
                      }} s={{padding:'4px 8px',fontSize:11}}>✕</Btn>
                    </Td>
                  </TR>;
                })}
              </tbody>
            </table>}
          </Card>
        </div>;
      })()}

      {/* CASH FLOW */}
      {tab==='cashflow'&&<div>
        {/* KPI TOTALI */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:16}}>
          <KPI label='Entrate reali' value={fmtEuro(cashflow.reduce((s,m)=>s+m.entrateReali,0))} color='var(--green)' delay={.03}/>
          <KPI label='Da incassare (prev.)' value={fmtEuro(cashflow.reduce((s,m)=>s+m.entratePrev,0))} color='var(--violet)' delay={.05}/>
          <KPI label='Uscite (periodo)' value={fmtEuro(cashflow.reduce((s,m)=>s+m.uscite,0))} color='var(--red)' delay={.08}/>
          <KPI label='Saldo netto' value={fmtEuro(cashflow.reduce((s,m)=>s+m.netto,0))} color={cashflow.reduce((s,m)=>s+m.netto,0)>=0?'var(--green)':'var(--red)'} delay={.11}/>
        </div>

              <div style={{fontSize:28,fontWeight:800,color:'var(--violet)'}}>{fmtEuro(ivaCredito)}</div>
              <div style={{fontSize:11,color:'var(--g4)',marginTop:4}}>Da fatture passive · {fpFiltrate.length} doc</div>

            <div style={{background:'var(--g2)',borderRadius:14,padding:'20px 24px',border:'1px solid var(--g3)'}}>
              <div style={{fontSize:11,color:'var(--g4)',fontFamily:'var(--fm)',marginBottom:6}}>% INCASSATO</div>
              <div style={{fontSize:28,fontWeight:800,color:percIncassato>=80?'var(--green)':percIncassato>=50?'var(--amber)':'var(--red)'}}>{percIncassato}%</div>

            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
              <thead><tr>
                <Th c='Mese'/><Th c='N° Fatture'/><Th c='Lordo'/><Th c='Netto'/><Th c='IVA'/><Th c='Incassato'/><Th c='Da incassare'/>
              </tr></thead>
              <tbody>
                {Array.from({length:12},(_,i)=>{
                  const m=`${insightAnno}-${String(i+1).padStart(2,'0')}`;
                  const ff=fattureFiltrate.filter(f=>f.data_emissione?.startsWith(m));
                  if(ff.length===0)return null;
                  const ml=ff.reduce((s,f)=>s+(f.importo||0),0);
                  const mn=ml/1.22;
                  const mi=ml-mn;
                  const minc=ff.filter(f=>f.stato==='INCASSATA').reduce((s,f)=>s+(f.importo||0),0);
                  const mdinc=ff.filter(f=>f.stato!=='INCASSATA').reduce((s,f)=>s+(f.importo||0),0);
                  const isCurr=m===currMese();
                  return <TR key={m} style={isCurr?{background:'rgba(124,58,237,.07)'}:{}}>
                    <Td><span style={{fontWeight:isCurr?700:500,color:isCurr?'var(--violet)':'var(--white)'}}>{meseFmt(m)}{isCurr?' ◀':''}</span></Td>
                    <Td mono muted style={{textAlign:'center'}}>{ff.length}</Td>
                    <Td mono style={{color:'var(--green)',fontWeight:600}}>{fmtEuro(ml)}</Td>
                    <Td mono style={{color:'var(--violet)'}}>{fmtEuro(mn)}</Td>
                    <Td mono style={{color:'var(--amber)'}}>{fmtEuro(mi)}</Td>
                    <Td mono style={{color:'var(--green)'}}>{minc>0?fmtEuro(minc):'—'}</Td>
                    <Td mono style={{color:mdinc>0?'var(--amber)':'var(--g4)'}}>{mdinc>0?fmtEuro(mdinc):'—'}</Td>
                  </TR>;
                }).filter(Boolean)}
                <TR style={{background:'rgba(124,58,237,.1)'}}>
                  <Td><span style={{fontWeight:700,color:'var(--violet)'}}>TOTALE</span></Td>
                  <Td mono style={{textAlign:'center',fontWeight:700}}>{fattureFiltrate.length}</Td>
                  <Td mono style={{color:'var(--green)',fontWeight:700}}>{fmtEuro(lordo)}</Td>
                  <Td mono style={{color:'var(--violet)',fontWeight:700}}>{fmtEuro(netto)}</Td>
                  <Td mono style={{color:'var(--amber)',fontWeight:700}}>{fmtEuro(iva)}</Td>
                  <Td mono style={{color:'var(--green)',fontWeight:700}}>{fmtEuro(incassato)}</Td>
                  <Td mono style={{color:'var(--amber)',fontWeight:700}}>{fmtEuro(daIncassare)}</Td>
                </TR>
              </tbody>
            </table>
          </Card>
        </div>;
      })()}
    </div>
  </div>;
}

// SCREEN: PROFILO
// ─────────────────────────────────────────────────────────
function ProfiloScreen({authUser,api,onAuthUserUpdate}) {
  const [password,setPassword]=useState('');
  const [confirmPassword,setConfirmPassword]=useState('');
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');

  const changePassword=async e=>{
    e.preventDefault();
    setMsg('');
    setErr('');
    if(!password || password.length<8){
      setErr('La nuova password deve avere almeno 8 caratteri');
      return;
    }
    if(password!==confirmPassword){
      setErr('Le password non coincidono');
      return;
    }
    if(!api?.enabled){
      setErr('Connetti prima il backend API');
      return;
    }
    try{
      setSaving(true);
      const updated=await api.updateUser(authUser.id,{password});
      onAuthUserUpdate&&onAuthUserUpdate(updated||authUser);
      setPassword('');
      setConfirmPassword('');
      setMsg('Password aggiornata con successo');
    }catch(error){
      setErr(`Errore aggiornamento password: ${error.message||'operazione non riuscita'}`);
    }finally{
      setSaving(false);
    }
  };

  return <div className='fu'>
    <Topbar title='Profilo utente' sub='Dati account e sicurezza'/>
    <div style={{padding:'22px 26px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <Card>
        <CH title='Dati personali'/>
        <div style={{padding:'16px 18px'}}>
          <FRow label='Nome'><input value={authUser?.nome||''} readOnly/></FRow>
          <FRow label='Cognome'><input value={authUser?.cognome||''} readOnly/></FRow>
          <FRow label='Email'><input value={authUser?.email||''} readOnly/></FRow>
          <FRow label='Ruolo'><input value={authUser?.ruolo||''} readOnly/></FRow>
        </div>
      </Card>
      <Card>
        <CH title='Sicurezza'/>
        <form onSubmit={changePassword} style={{padding:'16px 18px'}}>
          <FRow label='Nuova password' hint='Minimo 8 caratteri'>
            <input type='password' value={password} onChange={e=>setPassword(e.target.value)} required minLength={8}/>
          </FRow>
          <FRow label='Conferma password'>
            <input type='password' value={confirmPassword} onChange={e=>setConfirmPassword(e.target.value)} required minLength={8}/>
          </FRow>
          {msg&&<div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--green)',marginBottom:10}}>{msg}</div>}
          {err&&<div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--red)',marginBottom:10}}>{err}</div>}
          <FActions onCancel={()=>{setPassword('');setConfirmPassword('');setMsg('');setErr('');}} submitLabel={saving?'Aggiornamento...':'Aggiorna password'}/>
        </form>
      </Card>
    </div>
  </div>;
}

function TeamScreen({state,dispatch,api,isAdmin}) {
  const [modal,setModal]=useState(null);
