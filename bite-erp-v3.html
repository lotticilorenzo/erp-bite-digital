// SCREEN: COMMESSA DETAIL
// ─────────────────────────────────────────────────────────
function CommessaDetailScreen({state,commessaId,setPage,onChiudi}) {
  const cm=state.commesse.find(c=>c.id===commessaId);
  const progettoMap=useMemo(()=>Object.fromEntries(state.progetti.map(p=>[p.id,p])),[state.progetti]);
  const clienteMap =useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);
  const userMap    =useMemo(()=>Object.fromEntries(state.users.map(u=>[u.id,u])),[state.users]);
  if(!cm) return <div style={{padding:32,color:'var(--g4)'}}>Commessa non trovata</div>;

  const cl=clienteMap[cm.cliente_id];
  const rigaData = pid => {
    const p=progettoMap[pid]||{};
    const snap=(cm.snapshot_per_progetto||{})[pid]||{};
    const dc=(cm.delivery_per_progetto||{})[pid] ?? snap.delivery_consuntiva ?? 0;
    return {
      p,
      dc,
      importo_fisso:snap.importo_fisso ?? p.importo_fisso ?? 0,
      importo_variabile:snap.importo_variabile ?? p.importo_variabile ?? 0,
      delivery_attesa:snap.delivery_attesa ?? p.delivery_attesa ?? 0,
    };
  };
  const totFatt=cm.progetti_ids.reduce((s,pid)=>{const r=rigaData(pid);return s+fatt(r.importo_fisso,r.importo_variabile,r.delivery_attesa,r.dc);},0);
  const mo=cm.costo_manodopera||0;
  const mp=totFatt>0?Math.round((totFatt-mo)/totFatt*100):0;

  // timesheet della commessa
  const tsComm=state.timesheet.filter(t=>cm.progetti_ids.includes(t.progetto_id)&&t.mese_competenza===cm.mese_competenza);
  const oreAppr=tsComm.filter(t=>t.stato==='APPROVATO').reduce((s,t)=>s+t.durata_minuti,0);

  // task ClickUp associati ai progetti della commessa
  const tasks=CLICKUP_TASKS.filter(t=>cm.progetti_ids.includes(t.project_id));
  const taskDone=tasks.filter(t=>t.status==='complete').length;

  return <div className='fu'>
    <Topbar title={cl?.ragione_sociale||'Commessa'} sub={`Commessa ${meseFmt(cm.mese_competenza)} · ${cm.progetti_ids.length} progetti`}>
      <Btn v='ghost' onClick={()=>setPage('commesse')}>← Commesse</Btn>
      {(cm.stato==='APERTA'||cm.stato==='PRONTA_CHIUSURA')&&onChiudi&&<Btn v='primary' onClick={()=>onChiudi(cm.id)}>✓ Chiudi commessa</Btn>}
      <Badge s={cm.stato}/>
    </Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Fatturabile totale' value={fmtEuro(totFatt)} delay={.05}/>
        <KPI label='Costo manodopera' value={fmtEuro(mo)} delay={.08}/>
        <KPI label='Margine' value={`${mp}%`} color={mp>=50?'var(--violet)':mp>=30?'var(--amber)':'var(--red)'} delay={.11}/>
        <KPI label='Ore approvate' value={fmtMin(oreAppr)} delay={.14}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        {/* DETTAGLIO PER PROGETTO */}
        <Card>
          <CH title='Dettaglio per progetto'/>
          {cm.progetti_ids.map(pid=>{
            const {p,dc,importo_fisso,importo_variabile,delivery_attesa}=rigaData(pid); if(!p.id) return null;
            const pFatt=fatt(importo_fisso,importo_variabile,delivery_attesa,dc);
            const cl2=clienteMap[p.cliente_id];
            return <div key={pid} style={{padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div style={{display:'flex',gap:8,alignItems:'center'}}><Badge s={p.categoria}/><span style={{fontWeight:700}}>{p.nome}</span></div>
                <span style={{fontFamily:'var(--fm)',fontWeight:700,color:'var(--violet)'}}>{fmtEuro(pFatt)}</span>
              </div>
              {delivery_attesa>0&&<div style={{marginBottom:6}}><Pips total={delivery_attesa} done={dc}/>{dc>delivery_attesa&&<span style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--amber)',marginLeft:8}}>⬆ over delivery</span>}</div>}
              {p.categoria==='WEB'&&p.milestone?.length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                {p.milestone.map(m=><span key={m.id} style={{display:'inline-flex',alignItems:'center',gap:4,fontFamily:'var(--fm)',fontSize:10,padding:'2px 7px',borderRadius:20,...(BADGE_MAP[m.stato]||['var(--g2)','var(--g5)']).reduce((o,v,i)=>({...o,[i===0?'background':'color']:v}),{})}}>
                  {m.stato==='DONE'?'✓':m.stato==='IN_PROGRESS'?'⋯':'○'} {m.nome}
                </span>)}
              </div>}
              {p.categoria==='MARKETING'&&<div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--amber)'}}>Budget campagna: {fmtEuro(p.budget_campagna)}/mese</div>}
            </div>;
          })}
        </Card>

        {/* TASK CLICKUP */}
        <Card>
          <CH title='Task ClickUp' meta={`${taskDone}/${tasks.length} completate`}/>
          {tasks.length===0?<Empty msg='Nessun task associato'/>:
          tasks.map(t=>{
            const p=progettoMap[t.project_id];
            return <div key={t.id} style={{display:'flex',gap:10,padding:'11px 18px',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
              <div style={{width:6,borderRadius:3,flexShrink:0,background:t.status==='complete'?'var(--green)':t.status==='in progress'?'var(--amber)':'var(--g3)'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>{p?.nome||'—'}</div>
              </div>
              <Badge s={t.status}/>
            </div>;
          })}
        </Card>
      </div>

      {/* TIMESHEET COMMESSA */}
      {tsComm.length>0&&<Card>
        <CH title='Timesheet' meta={`${tsComm.length} registrazioni · ${fmtMin(oreAppr)} approvate`}/>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='Risorsa'/><Th c='Progetto'/><Th c='Task'/><Th c='Data'/><Th c='Durata'/><Th c='Stato'/></tr></thead>
          <tbody>
            {tsComm.map(t=>{
              const u=userMap[t.user_id]; const p=progettoMap[t.progetto_id];
              const task=CLICKUP_TASKS.find(x=>x.id===t.clickup_task_id);
              return <TR key={t.id}>
                <Td>{u?<div style={{display:'flex',alignItems:'center',gap:6}}><Av u={u} size={20}/><span style={{fontWeight:600}}>{u.nome}</span></div>:'—'}</Td>
                <Td muted>{p?.nome||'—'}</Td>
                <Td>{task?.name||'—'}</Td>
                <Td mono muted>{t.data_attivita}</Td>
                <Td mono>{fmtMin(t.durata_minuti)}</Td>
                <Td><Badge s={t.stato}/></Td>
              </TR>;
            })}
          </tbody>
        </table>
      </Card>}
    </div>
  </div>;
}

// ─────────────────────────────────────────────────────────
// SCREEN: TIMESHEET (con task ClickUp simulati)
// ─────────────────────────────────────────────────────────
function TimesheetScreen({state,dispatch,api,authUser}) {
  const [filterStato,setFilterStato]=useState('TUTTI');
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [taskFil,setTaskFil]=useState('');
  const [saving,setSaving]=useState(false);
  const [processing,setProcessing]=useState(null);

  const userMap    =useMemo(()=>Object.fromEntries(state.users.map(u=>[u.id,u])),[state.users]);
  const progettoMap=useMemo(()=>Object.fromEntries(state.progetti.map(p=>[p.id,p])),[state.progetti]);
  const clienteMap =useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);

  const progettiDisp=useMemo(()=>state.progetti.filter(p=>p.stato==='ATTIVO'),[state.progetti]);
  const tasksDisp=useMemo(()=>{
    if(!form.progetto_id) return CLICKUP_TASKS;
    return CLICKUP_TASKS.filter(t=>t.project_id===form.progetto_id);
  },[form.progetto_id]);
  const tasksFil=useMemo(()=>tasksDisp.filter(t=>!taskFil||t.name.toLowerCase().includes(taskFil.toLowerCase())),[tasksDisp,taskFil]);

  const openNew=()=>{setForm({user_id:authUser?.id||state.users[0]?.id||'',progetto_id:'',clickup_task_id:'',data_attivita:nowDate(),mese_competenza:currMese(),durata_ore:1,durata_min:0,note:''});setTaskFil('');setModal(true);};
  const closeModal=()=>{setModal(false);setForm({});setTaskFil('');};

  const save=async e=>{
    e.preventDefault();
    const durata_minuti=(parseInt(form.durata_ore)||0)*60+(parseInt(form.durata_min)||0);
    if(durata_minuti<=0) return;
    if(api?.enabled){
      try{
        setSaving(true);
        const commessa=state.commesse.find(cm=>cm.mese_competenza===form.mese_competenza && (cm.progetti_ids||[]).includes(form.progetto_id));
        if(!commessa){
          throw new Error('Nessuna commessa trovata per progetto/mese selezionati');
        }
        const task=CLICKUP_TASKS.find(t=>t.id===form.clickup_task_id);
        const saved=await api.createTimesheet({
          commessa_id:commessa.id,
          data_attivita:form.data_attivita,
          mese_competenza:monthToApi(form.mese_competenza),
          durata_minuti,
          servizio:task?.name||'',
          note:form.note||'',
        },{
          progetto_id:form.progetto_id,
          clickup_task_id:form.clickup_task_id,
          servizio:task?.name||'',
        });
        dispatch({type:'UPSERT',entity:'timesheet',item:saved});
        closeModal();
      }catch(errApi){
        alert(`Errore registrazione ore: ${errApi.message||'operazione non riuscita'}`);
      }finally{
        setSaving(false);
      }
      return;
    }
    dispatch({type:'ADD',entity:'timesheet',item:{id:uid(),user_id:form.user_id,progetto_id:form.progetto_id,clickup_task_id:form.clickup_task_id,data_attivita:form.data_attivita,mese_competenza:form.mese_competenza,durata_minuti,stato:'PENDING',note:form.note||''}});
    closeModal();
  };

  const approva=async(id,stato)=>{
    if(api?.enabled){
      try{
        setProcessing(id);
        const savedList=await api.approveTimesheet(id,stato);
        (savedList||[]).forEach(item=>dispatch({type:'UPSERT',entity:'timesheet',item}));
      }catch(errApi){
        alert(`Errore approvazione timesheet: ${errApi.message||'operazione non riuscita'}`);
      }finally{
        setProcessing(null);
      }
      return;
    }
    const t=state.timesheet.find(x=>x.id===id);
    if(t) dispatch({type:'UPDATE',entity:'timesheet',item:{...t,stato}});
  };

  const fil=state.timesheet.filter(t=>filterStato==='TUTTI'||t.stato===filterStato);
  const pending=state.timesheet.filter(t=>t.stato==='PENDING').length;
  const oreAppr=state.timesheet.filter(t=>t.stato==='APPROVATO').reduce((s,t)=>s+t.durata_minuti,0);
  const canApprove=(authUser?.ruolo==='ADMIN'||authUser?.ruolo==='PM');

  const selectedTask=CLICKUP_TASKS.find(t=>t.id===form.clickup_task_id);

  return <div className='fu'>
    {modal&&<Modal title='Registra ore' onClose={closeModal} width={520}>
      <form onSubmit={save}>
        <FRow label='Risorsa'>
          {api?.enabled
            ? <input value={`${authUser?.nome||''} ${authUser?.cognome||''} (${authUser?.ruolo||'USER'})`.trim()} readOnly/>
            : <select value={form.user_id||''} onChange={e=>setForm({...form,user_id:e.target.value})} required>
                {state.users.filter(u=>u.attivo).map(u=><option key={u.id} value={u.id}>{u.nome} {u.cognome} ({u.ruolo})</option>)}
              </select>
          }
        </FRow>

        <FRow label='Progetto ClickUp'>
          <select value={form.progetto_id||''} onChange={e=>setForm({...form,progetto_id:e.target.value,clickup_task_id:''})} required>
            <option value=''>Seleziona lista ClickUp…</option>
            {progettiDisp.map(p=>{const cl=clienteMap[p.cliente_id];return <option key={p.id} value={p.id}>{cl?.codice} / {p.nome}</option>;})}
          </select>
        </FRow>

        {form.progetto_id&&<FRow label='Task ClickUp' hint='Cerca per nome del task'>
          <input value={taskFil} onChange={e=>setTaskFil(e.target.value)} placeholder='Cerca task…' style={{marginBottom:6}}/>
          {form.clickup_task_id&&selectedTask&&<div style={{background:'var(--vdim)',border:'1px solid rgba(176,96,224,.2)',borderRadius:8,padding:'8px 12px',marginBottom:8,display:'flex',gap:8,alignItems:'center'}}>
            <Badge s={selectedTask.status}/>
            <span style={{fontSize:12,fontWeight:600}}>{selectedTask.name}</span>
            <button type='button' onClick={()=>setForm({...form,clickup_task_id:''})} style={{background:'none',border:'none',color:'var(--g4)',marginLeft:'auto',fontSize:14}}>×</button>
          </div>}
          <div style={{maxHeight:160,overflowY:'auto',border:'1px solid var(--g3)',borderRadius:8}}>
            {tasksFil.length===0?<div style={{padding:'12px 14px',fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Nessun task trovato</div>:
            tasksFil.map(t=><div key={t.id} onClick={()=>{setForm(f=>({...f,clickup_task_id:t.id}));setTaskFil('');}}
              style={{display:'flex',gap:10,padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid rgba(255,255,255,.04)',background:form.clickup_task_id===t.id?'var(--vdim)':'transparent',transition:'background .1s'}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.04)'}
              onMouseLeave={e=>e.currentTarget.style.background=form.clickup_task_id===t.id?'var(--vdim)':'transparent'}>
              <Badge s={t.status}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>{t.list}</div>
              </div>
            </div>)}
          </div>
        </FRow>}

        <FGrid>
          <FRow label='Data attività'><input type='date' value={form.data_attivita||nowDate()} onChange={e=>setForm({...form,data_attivita:e.target.value})} required/></FRow>
          <FRow label='Mese competenza'><input type='month' value={form.mese_competenza||currMese()} onChange={e=>setForm({...form,mese_competenza:e.target.value})} required/></FRow>
        </FGrid>
        <FRow label='Durata'>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input type='number' min='0' max='23' value={form.durata_ore||0} onChange={e=>setForm({...form,durata_ore:e.target.value})} style={{width:80}}/><span style={{color:'var(--g5)',flexShrink:0}}>ore</span>
            <input type='number' min='0' max='59' step='15' value={form.durata_min||0} onChange={e=>setForm({...form,durata_min:e.target.value})} style={{width:80}}/><span style={{color:'var(--g5)',flexShrink:0}}>min</span>
          </div>
        </FRow>
        <FRow label='Note'><textarea value={form.note||''} onChange={e=>setForm({...form,note:e.target.value})}/></FRow>
        <FActions onCancel={closeModal} submitLabel={saving?'Salvataggio...':'Registra'}/>
      </form>
    </Modal>}

    <Topbar title='Timesheet'>
      <div style={{display:'flex',gap:4}}>
        {['TUTTI','PENDING','APPROVATO','RIFIUTATO'].map(s=>(
          <button key={s} onClick={()=>setFilterStato(s)} style={{padding:'5px 9px',borderRadius:20,fontSize:10,fontFamily:'var(--fm)',fontWeight:500,cursor:'pointer',border:filterStato===s?'none':'1px solid var(--g3)',background:filterStato===s?'linear-gradient(135deg,var(--purple),var(--violet))':'var(--g2)',color:filterStato===s?'white':'var(--g5)'}}>{s}</button>
        ))}
      </div>
      <Btn v='primary' onClick={openNew}>+ Registra ore</Btn>
    </Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Ore approvate' value={fmtMin(oreAppr)} delay={.05}/>
        <KPI label='Da approvare' value={pending} delay={.08} warn={pending>0} color={pending>0?'var(--amber)':undefined}/>
        <KPI label='Registrazioni totali' value={state.timesheet.length} delay={.11}/>
        <KPI label='Rifiutate' value={state.timesheet.filter(t=>t.stato==='RIFIUTATO').length} delay={.14}/>
      </div>
      <Card>
        <CH title='Registrazioni ore' meta={`${fil.length} voci`} action={<Btn v='primary' onClick={openNew} s={{fontSize:11,padding:'5px 10px'}}>+ Registra</Btn>}/>
        {fil.length===0?<Empty msg='Nessuna registrazione'/>:
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='Risorsa'/><Th c='Task ClickUp'/><Th c='Progetto'/><Th c='Data'/><Th c='Durata'/><Th c='Stato'/><Th c='Azioni'/></tr></thead>
          <tbody>
            {fil.map(t=>{
              const u=userMap[t.user_id]; const p=progettoMap[t.progetto_id];
              const cl=clienteMap[p?.cliente_id];
              const task=CLICKUP_TASKS.find(x=>x.id===t.clickup_task_id);
              return <TR key={t.id}>
                <Td>{u?<div style={{display:'flex',alignItems:'center',gap:8}}><Av u={u} size={24}/><span style={{fontWeight:600}}>{u.nome} {u.cognome}</span></div>:'—'}</Td>
                <Td><div style={{maxWidth:220}}>
                  {task?<><div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{task.name}</div><Badge s={task.status}/></>:<span style={{color:'var(--g5)',fontFamily:'var(--fm)',fontSize:11}}>—</span>}
                </div></Td>
                <Td muted>{cl?`${cl.codice} / ${p?.nome}`:'—'}</Td>
                <Td mono muted>{t.data_attivita}</Td>
                <Td mono>{fmtMin(t.durata_minuti)}</Td>
                <Td><Badge s={t.stato}/></Td>
                <Td>{t.stato==='PENDING'&&canApprove&&<div style={{display:'flex',gap:6}}>
                  <Btn v='success' onClick={()=>approva(t.id,'APPROVATO')} disabled={processing===t.id} s={{padding:'4px 8px',fontSize:11}}>✓</Btn>
                  <Btn v='danger' onClick={()=>approva(t.id,'RIFIUTATO')} disabled={processing===t.id} s={{padding:'4px 8px',fontSize:11}}>✕</Btn>
                </div>}</Td>
              </TR>;
            })}
          </tbody>
        </table>}
      </Card>
    </div>
  </div>;
}

// ─────────────────────────────────────────────────────────
// SCREEN: SEZIONE FINANZIARIA
// ─────────────────────────────────────────────────────────
function FinanziariaScreen({state,dispatch}) {
  const [tab,setTab]=useState('fatture_attive');
  const [filtroStato,setFiltroStato]=useState('TUTTI');
  const [filtroDal,setFiltroDal]=useState('');
  const [filtroAl,setFiltroAl]=useState('');
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [form,setForm]=useState({});
  const clienteMap=useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);

  // FATTURE ATTIVE
  const totAttese=state.fatture_attive.filter(f=>f.stato==='ATTESA').reduce((s,f)=>s+f.importo,0);
  const totScadute=state.fatture_attive.filter(f=>f.stato==='SCADUTA').reduce((s,f)=>s+f.importo,0);
  const totIncassate=state.fatture_attive.filter(f=>f.stato==='INCASSATA').reduce((s,f)=>s+f.importo,0);
  // FATTURE PASSIVE
  const totPassiveAttese=state.fatture_passive.filter(f=>f.stato==='ATTESA').reduce((s,f)=>s+f.importo,0);
  const totPagate=state.fatture_passive.filter(f=>f.stato==='PAGATA').reduce((s,f)=>s+f.importo,0);
  // COSTI FISSI
  const mese=currMese();
  const costiMese=state.costi_fissi.filter(c=>c.mese===mese);
  const totCostiFissi=costiMese.reduce((s,c)=>s+c.importo,0);

  // CASH FLOW (6 mesi)
  // Stato filtri cash flow
  const oggi=new Date();
  const [cfDal,setCfDal]=useState(`${oggi.getFullYear()-1}-01`);
  const [cfAl,setCfAl]=useState(`${oggi.getFullYear()}-${String(oggi.getMonth()+4).padStart(2,'0').replace(/^(1[3-9])/,m=>String(parseInt(m)-12).padStart(2,'0'))}`);

  const cashflow=useMemo(()=>{
    // Genera lista mesi nel range
    const mesi=[];
    const [sy,sm]=cfDal.split('-').map(Number);
    const [ey,em]=cfAl.split('-').map(Number);
    let cy=sy,cm=sm;
    while(cy<ey||(cy===ey&&cm<=em)){
      const mKey=`${cy}-${String(cm).padStart(2,'0')}`;
      const now=new Date();
      const meseDate=new Date(cy,cm-1,1);
      const isFuture=meseDate>new Date(now.getFullYear(),now.getMonth(),1);
      const isCurrent=cy===now.getFullYear()&&cm===now.getMonth()+1;

      // ENTRATE CONSUNTIVE: fatture incassate (data_ultimo_incasso)
      const entrateReali=state.fatture_attive
        .filter(f=>f.stato==='INCASSATA'&&f.data_ultimo_incasso?.substring(0,7)===mKey)
        .reduce((s,f)=>s+(f.importo||0),0);

      // ENTRATE PREVISIONALI: fatture non incassate (per mesi futuri, usa data_scadenza)
      const entratePrev=isFuture||isCurrent?state.fatture_attive
        .filter(f=>f.stato!=='INCASSATA'&&f.data_scadenza?.substring(0,7)===mKey)
        .reduce((s,f)=>s+(f.importo_residuo||f.importo||0),0):0;

      // USCITE: fatture passive per data_scadenza + costi fissi
      const uscitePass=state.fatture_passive
        .filter(f=>f.data_scadenza?.substring(0,7)===mKey)
        .reduce((s,f)=>s+(f.importo||0),0);
      const usciteCosti=state.costi_fissi
        .filter(c=>c.mese===mKey)
        .reduce((s,c)=>s+(c.importo||0),0);

      const entrate=entrateReali+(isFuture||isCurrent?entratePrev:0);
      const uscite=uscitePass+usciteCosti;
      mesi.push({mese:mKey,entrate,entrateReali,entratePrev,uscite,netto:entrate-uscite,isFuture,isCurrent});
      cm++;if(cm>12){cm=1;cy++;}
    }
    return mesi;
  },[state.fatture_attive,state.fatture_passive,state.costi_fissi,cfDal,cfAl]);

  const maxCF=Math.max(...cashflow.map(m=>Math.max(m.entrate,m.uscite)),1);

  const openFattAttiva=()=>setForm({cliente_id:state.clienti[0]?.id||'',numero:'FT-2025-00'+uid().slice(0,3),data_emissione:nowDate(),data_scadenza:addDays(nowDate(),30),importo:0,stato:'ATTESA',note:''})||setModal('fatt_attiva');
  const openFattPassiva=()=>setForm({fornitore:'',categoria:'SOFTWARE',data_emissione:nowDate(),data_scadenza:addDays(nowDate(),30),importo:0,stato:'ATTESA',ricorrente:false,note:''})||setModal('fatt_passiva');
  const openEditFattPassiva=(fp)=>setForm({...fp,_editId:fp.id})||setModal('edit_fatt_passiva');
  const saveEditFattPassiva=async e=>{
    e.preventDefault();
    const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
    const payload={
      ricorrente:form.ricorrente||false,
      periodicita:form.ricorrente?(form.periodicita||'mensile'):null,
      categoria:form.categoria||null,
      commessa_id:form.commessa_id||null,
      note:form.note||null,
    };
    try{
      const res=await fetch('/api/v1/fatture-passive/'+form._editId,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(payload)});
      if(res.ok){
        dispatch({type:'UPDATE',entity:'fatture_passive',item:{...form,...payload,id:form._editId}});
        closeModal();
      }else{const err=await res.json().catch(()=>({}));alert('Errore: '+JSON.stringify(err));}
    }catch(e){console.error(e);}
  };
  const openCosto=()=>setForm({descrizione:'',importo:0,categoria:'PERSONALE',mese:currMese(),ricorrente:true})||setModal('costo');
  const closeModal=()=>{setModal(null);setForm({});};

  const saveFattAttiva=e=>{e.preventDefault();dispatch({type:'ADD',entity:'fatture_attive',item:{...form,id:uid(),importo:parseFloat(form.importo)||0}});closeModal();};
  const saveFattPassiva=e=>{e.preventDefault();dispatch({type:'ADD',entity:'fatture_passive',item:{...form,id:uid(),importo:parseFloat(form.importo)||0}});closeModal();};
  const saveCosto=e=>{e.preventDefault();dispatch({type:'ADD',entity:'costi_fissi',item:{...form,id:uid(),importo:parseFloat(form.importo)||0}});closeModal();};

  const cambiaStatoFattAttiva=async(id,stato)=>{
    if(stato==='INCASSATA'){
      const raw=window.prompt('Data di incasso (DD/MM/YYYY):',new Date().toLocaleDateString('it-IT'));
      if(!raw)return;
      let data=raw.trim();
      if(/^\d{2}\/\d{2}\/\d{4}$/.test(data)){const p=data.split('/');data=p[2]+'-'+p[1]+'-'+p[0];}
      if(!/^\d{4}-\d{2}-\d{2}$/.test(data)){alert('Formato data non valido');return;}
      try{
        const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
        const res=await fetch('/api/v1/fatture-attive/'+id+'/incassa',{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({data_incasso:data})});
        console.log('INCASSO status:',res.status);
        if(res.ok){const f=state.fatture_attive.find(x=>x.id===id);if(f)dispatch({type:'UPDATE',entity:'fatture_attive',item:{...f,stato:'INCASSATA',data_ultimo_incasso:data}});}
        else{const err=await res.json().catch(()=>({}));alert('Errore: '+JSON.stringify(err));}
      }catch(e){console.error(e);}
      return;
    }
    const f=state.fatture_attive.find(x=>x.id===id);if(f)dispatch({type:'UPDATE',entity:'fatture_attive',item:{...f,stato}});
  };
  const cambiaStatoFattPassiva=(id,stato)=>{const f=state.fatture_passive.find(x=>x.id===id);if(f)dispatch({type:'UPDATE',entity:'fatture_passive',item:{...f,stato}});};
  const TABS=[{id:'fatture_attive',label:'Fatture attive'},{id:'fatture_passive',label:'Fatture passive'},{id:'costi_fissi',label:'Costi fissi'},{id:'cashflow',label:'Cash flow'}];

  return <div className='fu'>
    {modal==='fatt_attiva'&&<Modal title='Nuova fattura attiva' onClose={closeModal}>
      <form onSubmit={saveFattAttiva}>
        <FRow label='Cliente'><select value={form.cliente_id||''} onChange={e=>setForm({...form,cliente_id:e.target.value})} required>{state.clienti.map(c=><option key={c.id} value={c.id}>{c.codice} — {c.ragione_sociale}</option>)}</select></FRow>
        <FRow label='Numero fattura'><input value={form.numero||''} onChange={e=>setForm({...form,numero:e.target.value})} required/></FRow>
        <FGrid>
          <FRow label='Data emissione'><input type='date' value={form.data_emissione||nowDate()} onChange={e=>setForm({...form,data_emissione:e.target.value})} required/></FRow>
          <FRow label='Data scadenza'><input type='date' value={form.data_scadenza||''} onChange={e=>setForm({...form,data_scadenza:e.target.value})} required/></FRow>
        </FGrid>
        <FRow label='Importo (€)'><input type='number' min='0' step='0.01' value={form.importo||0} onChange={e=>setForm({...form,importo:e.target.value})} required/></FRow>
        <FRow label='Stato'><select value={form.stato||'ATTESA'} onChange={e=>setForm({...form,stato:e.target.value})}><option value='ATTESA'>In attesa</option><option value='INCASSATA'>Incassata</option><option value='SCADUTA'>Scaduta</option></select></FRow>
        <FActions onCancel={closeModal} submitLabel='Salva fattura'/>
      </form>
    </Modal>}

    {modal==='edit_fatt_passiva'&&<Modal title='Modifica fattura passiva' onClose={closeModal}>
      <form onSubmit={saveEditFattPassiva}>
        <FRow label='Fornitore'><input disabled value={form.fornitore||'—'} style={{opacity:.6}}/></FRow>
        <FRow label='Importo'><input disabled value={fmtEuro(form.importo||0)} style={{opacity:.6}}/></FRow>
        <FRow label='Categoria'>
          <select value={form.categoria||'ALTRO'} onChange={e=>setForm({...form,categoria:e.target.value})}>
            {['SOFTWARE','STRUTTURA','PERSONALE','CONSULENZE','MARKETING','UTILITIES','BANCHE','ALTRO'].map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </FRow>
        <FRow label='Ricorrente'>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
            <input type='checkbox' checked={!!form.ricorrente} onChange={e=>setForm({...form,ricorrente:e.target.checked})}/>
            <span>Sì, è ricorrente</span>
          </label>
        </FRow>
        {form.ricorrente&&<FRow label='Periodicità'>
          <select value={form.periodicita||'mensile'} onChange={e=>setForm({...form,periodicita:e.target.value})}>
            {['mensile','bimestrale','trimestrale','semestrale','annuale'].map(p=><option key={p} value={p}>{p.charAt(0).toUpperCase()+p.slice(1)}</option>)}
          </select>
        </FRow>}
        <FRow label='Costo di progetto'>
          <select value={form.commessa_id||''} onChange={e=>setForm({...form,commessa_id:e.target.value||null})}>
            <option value=''>— Nessuna commessa —</option>
            {state.commesse.map(c=><option key={c.id} value={c.id}>{c.nome||c.codice||c.id}</option>)}
          </select>
        </FRow>
        <FRow label='Note'><textarea value={form.note||''} onChange={e=>setForm({...form,note:e.target.value})} rows={3}/></FRow>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
          <Btn v='ghost' onClick={closeModal} type='button'>Annulla</Btn>
          <Btn v='primary' type='submit'>Salva modifiche</Btn>
        </div>
      </form>
    </Modal>}
    {modal==='fatt_passiva'&&<Modal title='Nuova fattura passiva' onClose={closeModal}>
      <form onSubmit={saveFattPassiva}>
        <FRow label='Fornitore'><input required value={form.fornitore||''} onChange={e=>setForm({...form,fornitore:e.target.value})}/></FRow>
        <FGrid>
          <FRow label='Categoria'><select value={form.categoria||'SOFTWARE'} onChange={e=>setForm({...form,categoria:e.target.value})}>{['SOFTWARE','STRUTTURA','PERSONALE','CONSULENZE','ALTRO'].map(c=><option key={c} value={c}>{c}</option>)}</select></FRow>
          <FRow label='Importo (€)'><input type='number' min='0' step='0.01' value={form.importo||0} onChange={e=>setForm({...form,importo:e.target.value})} required/></FRow>
        </FGrid>
        <FGrid>
          <FRow label='Data emissione'><input type='date' value={form.data_emissione||nowDate()} onChange={e=>setForm({...form,data_emissione:e.target.value})}/></FRow>
          <FRow label='Data scadenza'><input type='date' value={form.data_scadenza||''} onChange={e=>setForm({...form,data_scadenza:e.target.value})}/></FRow>
        </FGrid>
        <FRow label='Stato'><select value={form.stato||'ATTESA'} onChange={e=>setForm({...form,stato:e.target.value})}><option value='ATTESA'>Da pagare</option><option value='PAGATA'>Pagata</option></select></FRow>
        <FRow label='Ricorrente?'><select value={form.ricorrente?'true':'false'} onChange={e=>setForm({...form,ricorrente:e.target.value==='true'})}><option value='true'>Sì — si ripete ogni mese</option><option value='false'>No — una tantum</option></select></FRow>
        <FActions onCancel={closeModal} submitLabel='Salva fattura'/>
      </form>
    </Modal>}

    {modal==='costo'&&<Modal title='Aggiungi costo fisso' onClose={closeModal}>
      <form onSubmit={saveCosto}>
        <FRow label='Descrizione'><input required value={form.descrizione||''} onChange={e=>setForm({...form,descrizione:e.target.value})}/></FRow>
        <FGrid>
          <FRow label='Importo (€)'><input type='number' min='0' step='0.01' value={form.importo||0} onChange={e=>setForm({...form,importo:e.target.value})} required/></FRow>
          <FRow label='Categoria'><select value={form.categoria||'PERSONALE'} onChange={e=>setForm({...form,categoria:e.target.value})}>{['PERSONALE','STRUTTURA','SOFTWARE','CONSULENZE','ALTRO'].map(c=><option key={c} value={c}>{c}</option>)}</select></FRow>
        </FGrid>
        <FRow label='Mese'><input type='month' value={form.mese||currMese()} onChange={e=>setForm({...form,mese:e.target.value})} required/></FRow>
        <FRow label='Ricorrente?'><select value={form.ricorrente?'true':'false'} onChange={e=>setForm({...form,ricorrente:e.target.value==='true'})}><option value='true'>Sì</option><option value='false'>No</option></select></FRow>
        <FActions onCancel={closeModal} submitLabel='Salva costo'/>
      </form>
    </Modal>}

    <Topbar title='Sezione Finanziaria'>
      {tab==='fatture_attive'&&<Btn v='primary' onClick={openFattAttiva}>+ Nuova fattura</Btn>}
      {tab==='fatture_passive'&&<Btn v='primary' onClick={openFattPassiva}>+ Nuova fattura passiva</Btn>}
      {tab==='costi_fissi'&&<Btn v='primary' onClick={openCosto}>+ Nuovo costo</Btn>}
    </Topbar>

    <div style={{padding:'22px 26px'}}>
      {/* KPI FINANZIARIO */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Da incassare' value={fmtEuro(totAttese)} delay={.05}/>
        <KPI label='Crediti scaduti' value={fmtEuro(totScadute)} delay={.08} warn={totScadute>0} color={totScadute>0?'var(--red)':undefined}/>
        <KPI label='Da pagare (passive)' value={fmtEuro(totPassiveAttese)} delay={.11}/>
        <KPI label='Costi fissi mese' value={fmtEuro(totCostiFissi)} delay={.14}/>
      </div>

      {/* TABS */}
      <div style={{display:'flex',gap:6,marginBottom:16}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'7px 16px',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',border:tab===t.id?'none':'1px solid var(--g3)',background:tab===t.id?'linear-gradient(135deg,var(--purple),var(--violet))':'var(--g2)',color:tab===t.id?'white':'var(--g5)',transition:'all .15s'}}>{t.label}</button>)}
      </div>

      {/* FATTURE ATTIVE */}
      {tab==='fatture_attive'&&<Card>
        <CH title='Fatture emesse ai clienti' meta={`${state.fatture_attive.length} fatture`}/>
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
          <select value={filtroStato} onChange={e=>setFiltroStato(e.target.value)} style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g6)',fontSize:12}}>
            <option value='TUTTI'>Tutti gli stati</option>
            <option value='ATTESA'>In attesa</option>
            <option value='INCASSATA'>Incassate</option>

          <span style={{fontSize:11,color:'var(--g4)'}}>Dal</span>

          <div style={{display:'flex',gap:4}}>
            {[{l:'2025',d:'2025-01-01',a:'2025-12-31'},{l:'2026',d:'2026-01-01',a:'2026-12-31'},{l:'Q1',d:new Date().getFullYear()+'-01-01',a:new Date().getFullYear()+'-03-31'},{l:'Q2',d:new Date().getFullYear()+'-04-01',a:new Date().getFullYear()+'-06-30'},{l:'Q3',d:new Date().getFullYear()+'-07-01',a:new Date().getFullYear()+'-09-30'},{l:'Q4',d:new Date().getFullYear()+'-10-01',a:new Date().getFullYear()+'-12-31'}].map(q=><button key={q.l} onClick={()=>{setFiltroDal(q.d);setFiltroAl(q.a);}} style={{padding:'4px 8px',borderRadius:6,border:'1px solid var(--g3)',background:filtroDal===q.d&&filtroAl===q.a?'var(--purple)':'var(--g2)',color:filtroDal===q.d&&filtroAl===q.a?'white':'var(--g5)',fontSize:11,cursor:'pointer'}}>{q.l}</button>)}

        </div>
        {state.fatture_attive.length===0?<Empty msg='Nessuna fattura'/>:
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='N°'/><Th c='Cliente'/><Th c='Importo'/><Th c='Emissione'/><Th c='Scadenza'/><Th c='Stato'/><Th c='Azioni'/></tr></thead>
          <tbody>
            {[...state.fatture_attive]
              .filter(fa=>{
                if(filtroStato!=='TUTTI'&&fa.stato!==filtroStato)return false;
                if(filtroDal&&fa.data_emissione&&fa.data_emissione<filtroDal)return false;
                if(filtroAl&&fa.data_emissione&&fa.data_emissione>filtroAl)return false;
                return true;
              })
              .sort((a,b)=>b.data_emissione?.localeCompare(a.data_emissione||'')).map(fa=>{
              const cl=clienteMap[fa.cliente_id];
              const gg=fa.stato==='SCADUTA'?diffDays(fa.data_scadenza,nowDate()):null;
              return <TR key={fa.id}>
                <Td mono muted>{fa.numero}</Td>

        </div>
        {/* FILTRO PERIODO */}
        <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:'var(--g4)'}}>Periodo:</span>
          <input type='month' value={cfDal} onChange={e=>setCfDal(e.target.value)} style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g6)',fontSize:12}}/>

          <div style={{display:'flex',gap:4,marginLeft:4}}>

              {l:'2025',d:'2025-01',a:'2025-12'},

            ].map(q=><button key={q.l} onClick={()=>{setCfDal(q.d);setCfAl(q.a);}} style={{padding:'4px 8px',borderRadius:6,border:'1px solid var(--g3)',background:cfDal===q.d&&cfAl===q.a?'var(--purple)':'var(--g2)',color:cfDal===q.d&&cfAl===q.a?'white':'var(--g5)',fontSize:11,cursor:'pointer'}}>{q.l}</button>)}
          </div>
        </div>
        <Card>
          <CH title='Cash flow mensile' meta={`${cashflow.length} mesi · consuntivo + previsionale`}/>

          <div style={{padding:'20px 20px 8px'}}>

                const he=Math.round((m.entrate/maxCF)*130);
                const hu=Math.round((m.uscite/maxCF)*130);
                return <div key={i} style={{minWidth:36,flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>

                    <div title={`Uscite: ${fmtEuro(m.uscite)}`} style={{flex:1,height:hu||2,background:m.uscite>m.entrate?'var(--red)':'var(--g3)',borderRadius:'3px 3px 0 0',opacity:m.isFuture?.5:1,transition:'height .3s'}}/>

            <tbody>
              {cashflow.map((m,i)=>{
                const cumul=cashflow.slice(0,i+1).reduce((s,x)=>s+x.netto,0);
                return <TR key={i} style={m.isCurrent?{background:'rgba(124,58,237,.07)'}:{}}>
                  <Td>
                    <span style={{fontWeight:m.isCurrent?700:500,color:m.isCurrent?'var(--violet)':m.isFuture?'var(--g4)':'var(--white)'}}>
                      {meseFmt(m.mese)}{m.isCurrent?' ◀':''}
                    </span>
                    {m.isFuture&&<span style={{marginLeft:6,fontSize:10,color:'var(--g4)',fontStyle:'italic'}}>prev.</span>}
                  </Td>
                  <Td mono style={{color:'var(--green)'}}>{m.entrateReali>0?fmtEuro(m.entrateReali):'—'}</Td>
                  <Td mono style={{color:'var(--violet)',opacity:.8}}>{m.entratePrev>0?fmtEuro(m.entratePrev):'—'}</Td>
                  <Td mono style={{color:'var(--green)',fontWeight:600}}>{fmtEuro(m.entrate)}</Td>
                  <Td mono style={{color:'var(--red)'}}>−{fmtEuro(m.uscite)}</Td>
                  <Td mono style={{fontWeight:700,color:m.netto>=0?'var(--green)':'var(--red)'}}>{m.netto>=0?'+':''}{fmtEuro(m.netto)}</Td>
                </TR>;
              })}
              <TR style={{background:'rgba(124,58,237,.1)'}}>
                <Td><span style={{fontWeight:700,color:'var(--violet)'}}>TOTALE</span></Td>
                <Td mono style={{color:'var(--green)',fontWeight:700}}>{fmtEuro(cashflow.reduce((s,m)=>s+m.entrateReali,0))}</Td>
                <Td mono style={{color:'var(--violet)',fontWeight:700}}>{fmtEuro(cashflow.reduce((s,m)=>s+m.entratePrev,0))}</Td>
                <Td mono style={{color:'var(--green)',fontWeight:700}}>{fmtEuro(cashflow.reduce((s,m)=>s+m.entrate,0))}</Td>
                <Td mono style={{color:'var(--red)',fontWeight:700}}>−{fmtEuro(cashflow.reduce((s,m)=>s+m.uscite,0))}</Td>
                <Td mono style={{fontWeight:700,color:cashflow.reduce((s,m)=>s+m.netto,0)>=0?'var(--green)':'var(--red)'}}>{cashflow.reduce((s,m)=>s+m.netto,0)>=0?'+':''}{fmtEuro(cashflow.reduce((s,m)=>s+m.netto,0))}</Td>
              </TR>
            </tbody>
          </table>
        </Card>
      </div>}
    </div>
  </div>;
}

// SCREEN: PROFILO
// ─────────────────────────────────────────────────────────
function ProfiloScreen({authUser,api,onAuthUserUpdate}) {
  const [password,setPassword]=useState('');
  const [confirmPassword,setConfirmPassword]=useState('');
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');

  const changePassword=async e=>{
    e.preventDefault();
    setMsg('');
    setErr('');
    if(!password || password.length<8){
      setErr('La nuova password deve avere almeno 8 caratteri');
      return;
    }
    if(password!==confirmPassword){
      setErr('Le password non coincidono');
      return;
    }
    if(!api?.enabled){
      setErr('Connetti prima il backend API');
      return;
    }
    try{
      setSaving(true);
      const updated=await api.updateUser(authUser.id,{password});
      onAuthUserUpdate&&onAuthUserUpdate(updated||authUser);
      setPassword('');
      setConfirmPassword('');
      setMsg('Password aggiornata con successo');
    }catch(error){
      setErr(`Errore aggiornamento password: ${error.message||'operazione non riuscita'}`);
    }finally{
      setSaving(false);
    }
  };

  return <div className='fu'>
    <Topbar title='Profilo utente' sub='Dati account e sicurezza'/>
    <div style={{padding:'22px 26px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <Card>
        <CH title='Dati personali'/>
        <div style={{padding:'16px 18px'}}>
          <FRow label='Nome'><input value={authUser?.nome||''} readOnly/></FRow>
          <FRow label='Cognome'><input value={authUser?.cognome||''} readOnly/></FRow>
          <FRow label='Email'><input value={authUser?.email||''} readOnly/></FRow>
          <FRow label='Ruolo'><input value={authUser?.ruolo||''} readOnly/></FRow>
        </div>
      </Card>
      <Card>
        <CH title='Sicurezza'/>
        <form onSubmit={changePassword} style={{padding:'16px 18px'}}>
          <FRow label='Nuova password' hint='Minimo 8 caratteri'>
            <input type='password' value={password} onChange={e=>setPassword(e.target.value)} required minLength={8}/>
          </FRow>
          <FRow label='Conferma password'>
            <input type='password' value={confirmPassword} onChange={e=>setConfirmPassword(e.target.value)} required minLength={8}/>
          </FRow>
          {msg&&<div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--green)',marginBottom:10}}>{msg}</div>}
          {err&&<div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--red)',marginBottom:10}}>{err}</div>}
          <FActions onCancel={()=>{setPassword('');setConfirmPassword('');setMsg('');setErr('');}} submitLabel={saving?'Aggiornamento...':'Aggiorna password'}/>
        </form>
      </Card>
    </div>
  </div>;
}

// SCREEN: TEAM (semplificato)
// ─────────────────────────────────────────────────────────
function TeamScreen({state,dispatch,api,isAdmin}) {
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);

  if(!isAdmin){
    return <div className='fu'>
      <Topbar title='Utenti' sub='Accesso riservato ADMIN'/>
      <div style={{padding:'32px 26px'}}>
        <Card>
          <div style={{padding:'24px 20px',fontFamily:'var(--fm)',fontSize:12,color:'var(--g4)'}}>
            Accesso non autorizzato a questa sezione.
          </div>
        </Card>
      </div>
    </div>;
  }

  const openNew=()=>{setForm({nome:'',cognome:'',email:'',password:'',ruolo:'DIPENDENTE',costo_orario:30,attivo:true});setModal('new');};
  const openEdit=u=>{setForm({...u});setModal(u);};
  const closeModal=()=>{setModal(null);setForm({});};

  const save=async e=>{
    e.preventDefault();
    const item={...form,costo_orario:parseFloat(form.costo_orario)||0};
    if(api?.enabled){
      try{
        setSaving(true);
        let saved;
        if(modal==='new'){
          if(!item.password||item.password.length<8){
            throw new Error('Password minima 8 caratteri');
          }
          saved=await api.createUser({
            nome:item.nome,
            cognome:item.cognome,
            email:item.email,
            password:item.password,
            ruolo:item.ruolo,
            costo_orario:item.costo_orario||0,
          });
        }else{
          const payload={
            nome:item.nome,
            cognome:item.cognome,
            ruolo:item.ruolo,
            costo_orario:item.costo_orario||0,
            attivo:item.attivo!==false,
          };
          if(item.password) payload.password=item.password;
          saved=await api.updateUser(modal.id,payload);
        }
        dispatch({type:'UPSERT',entity:'users',item:saved});
        closeModal();
      }catch(errApi){
        alert(`Errore salvataggio utente: ${errApi.message||'operazione non riuscita'}`);
      }finally{
        setSaving(false);
      }
      return;
    }
    if(modal==='new') dispatch({type:'ADD',entity:'users',item:{...item,id:uid()}});
    else dispatch({type:'UPDATE',entity:'users',item:{...modal,...item}});
    closeModal();
  };
  const del=async id=>{
    if(api?.enabled){
      try{
        const saved=await api.updateUser(id,{attivo:false});
        dispatch({type:'UPSERT',entity:'users',item:saved});
      }catch(errApi){
        alert(`Errore disattivazione utente: ${errApi.message||'operazione non riuscita'}`);
      }finally{
        setConfirm(null);
      }
      return;
    }
    dispatch({type:'DELETE',entity:'users',id});setConfirm(null);
  };

  const orePerUser=useMemo(()=>{
    const map={};
    state.timesheet.filter(t=>t.stato==='APPROVATO').forEach(t=>{map[t.user_id]=(map[t.user_id]||0)+t.durata_minuti;});
    return map;
  },[state.timesheet]);

  return <div className='fu'>
    {confirm&&<Confirm msg={`Disattivare "${confirm.nome} ${confirm.cognome}"?`} onConfirm={()=>del(confirm.id)} onClose={()=>setConfirm(null)}/>}
    {modal&&<Modal title={modal==='new'?'Nuovo utente':'Modifica utente'} onClose={closeModal}>
      <form onSubmit={save}>
        <FGrid><FRow label='Nome'><input required value={form.nome||''} onChange={e=>setForm({...form,nome:e.target.value})}/></FRow><FRow label='Cognome'><input required value={form.cognome||''} onChange={e=>setForm({...form,cognome:e.target.value})}/></FRow></FGrid>
        <FRow label='Email'><input type='email' required value={form.email||''} onChange={e=>setForm({...form,email:e.target.value})}/></FRow>
        <FRow label={modal==='new'?'Password':'Nuova password (opzionale)'}>
          <input type='password' value={form.password||''} onChange={e=>setForm({...form,password:e.target.value})} required={modal==='new'} minLength={8}/>
        </FRow>
        <FGrid>
          <FRow label='Ruolo'><select value={form.ruolo||'DIPENDENTE'} onChange={e=>setForm({...form,ruolo:e.target.value})}>{['ADMIN','PM','DIPENDENTE','FREELANCER'].map(r=><option key={r} value={r}>{r}</option>)}</select></FRow>
          <FRow label='€/ora'><input type='number' min='0' step='0.5' value={form.costo_orario||0} onChange={e=>setForm({...form,costo_orario:e.target.value})}/></FRow>
        </FGrid>
        <FRow label='Stato'><select value={form.attivo?'true':'false'} onChange={e=>setForm({...form,attivo:e.target.value==='true'})}><option value='true'>Attivo</option><option value='false'>Inattivo</option></select></FRow>
        <FActions onCancel={closeModal} submitLabel={saving?'Salvataggio...':'Salva'}/>
      </form>
    </Modal>}
    <Topbar title='Utenti'><Btn v='primary' onClick={openNew}>+ Nuovo utente</Btn></Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Risorse attive' value={state.users.filter(u=>u.attivo).length} delay={.05}/>
        <KPI label='Dipendenti' value={state.users.filter(u=>u.ruolo==='DIPENDENTE').length} delay={.08}/>
        <KPI label='Freelancer' value={state.users.filter(u=>u.ruolo==='FREELANCER').length} delay={.11}/>
        <KPI label='Costo orario medio' value={`€ ${state.users.length>0?(state.users.reduce((s,u)=>s+(u.costo_orario||0),0)/state.users.length).toFixed(0):0}`} delay={.14}/>
      </div>
      <Card>
        <CH title='Anagrafica utenti' action={<Btn v='primary' onClick={openNew} s={{fontSize:11,padding:'5px 10px'}}>+ Nuovo</Btn>}/>
        {state.users.length===0?<Empty msg='Nessuna risorsa'/>:
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='Risorsa'/><Th c='Email'/><Th c='Ruolo'/><Th c='€/ora'/><Th c='Ore (approv.)'/><Th c='Stato'/><Th c=''/></tr></thead>
          <tbody>
            {state.users.map(u=><TR key={u.id} onClick={()=>openEdit(u)}>
              <Td><div style={{display:'flex',alignItems:'center',gap:10}}><Av u={u} size={28}/><div style={{fontWeight:700}}>{u.nome} {u.cognome}</div></div></Td>
              <Td mono muted>{u.email}</Td>
              <Td><Badge s={u.ruolo}/></Td>
              <Td mono>€ {u.costo_orario}</Td>
              <Td mono>{fmtMin(orePerUser[u.id]||0)}</Td>
              <Td><Badge s={u.attivo?'ATTIVO':'INATTIVO'}/></Td>
              <Td><div onClick={e=>e.stopPropagation()} style={{display:'flex',gap:6}}>
                <Btn v='ghost' onClick={()=>openEdit(u)} s={{padding:'4px 8px',fontSize:11}}>Modifica</Btn>
                {u.attivo&&<Btn v='danger' onClick={()=>setConfirm(u)} s={{padding:'4px 8px',fontSize:11}}>Disattiva</Btn>}
              </div></Td>
            </TR>)}
          </tbody>
        </table>}
      </Card>
    </div>
  </div>;
}

// ─────────────────────────────────────────────────────────
// SCREEN: PROGETTO DETAIL (dashboard per categoria)
// ─────────────────────────────────────────────────────────
function ProgettoDetailScreen({state,progettoId,setPage}) {
  const p = state.progetti.find(x=>x.id===progettoId);
  const clienteMap=useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);
  const userMap=useMemo(()=>Object.fromEntries(state.users.map(u=>[u.id,u])),[state.users]);
  if(!p) return <div style={{padding:32,color:'var(--g4)'}}>Progetto non trovato</div>;

  const cl=clienteMap[p.cliente_id];
  // Commesse di questo progetto (storico)
  const commesse=state.commesse.filter(cm=>cm.progetti_ids.includes(p.id)).sort((a,b)=>b.mese_competenza.localeCompare(a.mese_competenza));
  // Timesheet del progetto
  const ts=state.timesheet.filter(t=>t.progetto_id===p.id);
  const oreAppr=ts.filter(t=>t.stato==='APPROVATO').reduce((s,t)=>s+t.durata_minuti,0);
  // KPI comuni
  const totFatt=commesse.reduce((s,cm)=>{const dc=(cm.delivery_per_progetto||{})[p.id]||0;return s+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0);
  const totMO=commesse.reduce((s,cm)=>s+(cm.costo_manodopera||0),0);
  const margTot=totFatt>0?Math.round((totFatt-totMO)/totFatt*100):0;
  const soglia=p.soglia_margine||30;

  // BarChart inline helper
  const BarChart=({data,keyA,keyB,labelA,labelB,colorA,colorB,height=100})=>{
    const max=Math.max(...data.map(d=>Math.max(d[keyA]||0,d[keyB]||0)),1);
    return <div style={{display:'flex',gap:6,alignItems:'flex-end',height:height+24}}>
      {data.map((d,i)=>{
        const ha=Math.round(((d[keyA]||0)/max)*height);
        const hb=Math.round(((d[keyB]||0)/max)*height);
        return <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          <div style={{width:'100%',display:'flex',gap:2,alignItems:'flex-end',height:height}}>
            {keyA&&<div style={{flex:1,height:ha,background:colorA||'var(--violet)',borderRadius:'3px 3px 0 0',minHeight:2,transition:'height .4s'}}/>}
            {keyB&&<div style={{flex:1,height:hb,background:colorB||'var(--g3)',borderRadius:'3px 3px 0 0',minHeight:2,transition:'height .4s'}}/>}
          </div>
          <span style={{fontFamily:'var(--fm)',fontSize:9,color:'var(--g4)',whiteSpace:'nowrap'}}>{meseFmt(d.mese).split(' ')[0]}</span>
        </div>;
      })}
    </div>;
  };

  // LineChart inline
  const LineChart=({data,valueKey,color,height=80})=>{
    const vals=data.map(d=>d[valueKey]||0);
    const max=Math.max(...vals,1), min=Math.min(...vals,0);
    const range=max-min||1;
    const pts=vals.map((v,i)=>{
      const x=(i/(vals.length-1||1))*100;
      const y=100-((v-min)/range)*100;
      return `${x},${y}`;
    }).join(' ');
    return <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{width:'100%',height,display:'block'}}>
      <polyline points={pts} fill="none" stroke={color||'var(--violet)'} strokeWidth="2.5" vectorEffect="non-scaling-stroke" strokeLinejoin="round" strokeLinecap="round"/>
      {vals.map((v,i)=>{
        const x=(i/(vals.length-1||1))*100;
        const y=100-((v-min)/range)*100;
        return <circle key={i} cx={x} cy={y} r="3" fill={color||'var(--violet)'} vectorEffect="non-scaling-stroke"/>;
      })}
    </svg>;
  };

  const catColor={'SOCIAL':'var(--violet)','WEB':'#60a5fa','MARKETING':'var(--amber)'};
  const cc=catColor[p.categoria]||'var(--violet)';

  return <div className='fu'>
    <Topbar title={p.nome} sub={`${cl?.codice} · ${cl?.ragione_sociale} · ${p.categoria}`}>
      <Btn v='ghost' onClick={()=>setPage('progetti')}>← Progetti</Btn>
      <Badge s={p.categoria}/>
      <Badge s={p.stato}/>
    </Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Fatturato totale' value={fmtEuro(totFatt)} delay={.04}/>
        <KPI label='Margine complessivo' value={`${margTot}%`} color={margTot>=soglia?'var(--green)':margTot>=(soglia-10)?'var(--amber)':'var(--red)'} delay={.07}/>
        <KPI label='Ore lavorate' value={fmtMin(oreAppr)} delay={.10}/>
        <KPI label='Commesse storico' value={commesse.length} delay={.13}/>
      </div>

      {/* ── SOCIAL ── */}
      {p.categoria==='SOCIAL'&&<>
        {/* Trend delivery + fatturabile */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          <Card>
            <CH title='Trend delivery' meta='Attesa vs consuntiva · 6 mesi'/>
            <div style={{padding:'16px 18px'}}>
              {commesse.length===0?<Empty msg='Nessun dato storico'/>:<>
                <BarChart
                  data={[...commesse].reverse().slice(0,6).map(cm=>({mese:cm.mese_competenza,attesa:p.delivery_attesa,cons:(cm.delivery_per_progetto||{})[p.id]||0}))}
                  keyA='attesa' keyB='cons' labelA='Attesa' labelB='Consuntiva'
                  colorA='var(--g3)' colorB='var(--violet)' height={90}
                />
                <div style={{display:'flex',gap:16,marginTop:10,fontFamily:'var(--fm)',fontSize:11}}>
                  <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:2,background:'var(--g3)',display:'inline-block'}}/>Attesa ({p.delivery_attesa})</span>
                  <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:2,background:'var(--violet)',display:'inline-block'}}/>Consuntiva</span>
                </div>
              </>}
            </div>
          </Card>
          <Card>
            <CH title='Trend fatturabile' meta='Andamento mensile'/>
            <div style={{padding:'16px 18px'}}>
              {commesse.length<2?<Empty msg='Almeno 2 mesi per il trend'/>:<>
                <LineChart
                  data={[...commesse].reverse().slice(0,6).map(cm=>{const dc=(cm.delivery_per_progetto||{})[p.id]||0;return {mese:cm.mese_competenza,valore:fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc)};})}
                  valueKey='valore' color='var(--violet)' height={90}
                />
                <div style={{display:'flex',justifyContent:'space-between',marginTop:10}}>
                  {[...commesse].reverse().slice(0,6).map((cm,i)=>{
                    const dc=(cm.delivery_per_progetto||{})[p.id]||0;
                    const v=fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);
                    return <span key={i} style={{fontFamily:'var(--fm)',fontSize:9,color:'var(--g4)',textAlign:'center'}}>
                      {meseFmt(cm.mese_competenza).split(' ')[0]}<br/><b style={{color:'var(--violet)',fontSize:10}}>{Math.round(v)}</b>
                    </span>;
                  })}
                </div>
              </>}
            </div>
          </Card>
        </div>
        {/* Margine e alert soglia */}
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:16}}>
          <Card>
            <CH title='Margine mensile' meta={`Soglia configurata: ${soglia}%`}/>
            <div style={{padding:'16px 18px'}}>
              {commesse.length===0?<Empty msg='Nessun dato'/>:
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
                <thead><tr><Th c='Mese'/><Th c='Delivery'/><Th c='Fatturabile'/><Th c='Costo M.O.'/><Th c='Margine'/><Th c='Stato'/></tr></thead>
                <tbody>
                  {commesse.slice(0,6).map(cm=>{
                    const dc=(cm.delivery_per_progetto||{})[p.id]||0;
                    const f=fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);
                    const mo=cm.costo_manodopera||0; const mp=f>0?Math.round((f-mo)/f*100):0;
                    const ok=mp>=soglia;
                    return <TR key={cm.id}>
                      <Td>{meseFmt(cm.mese_competenza)}</Td>
                      <Td><Pips total={p.delivery_attesa} done={dc}/></Td>
                      <Td mono>{fmtEuro(f)}</Td>
                      <Td mono>{fmtEuro(mo)}</Td>
                      <Td><div style={{display:'flex',alignItems:'center',gap:6}}><MBar pct={mp}/>{!ok&&<span style={{color:'var(--red)',fontSize:11}}>⚠</span>}</div></Td>
                      <Td><Badge s={cm.stato}/></Td>
                    </TR>;
                  })}
                </tbody>
              </table>}
            </div>
          </Card>
          <Card>
            <CH title='Performance contenuti' meta='Mese corrente'/>
            <div style={{padding:'16px 18px'}}>
              {commesse[0]&&<>
                <div style={{marginBottom:16}}>
                  <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',marginBottom:6}}>DELIVERY MESE CORRENTE</div>
                  <div style={{fontSize:28,fontWeight:800,letterSpacing:-1}}>
                    {(commesse[0].delivery_per_progetto||{})[p.id]||0}
                    <span style={{fontSize:14,fontWeight:500,color:'var(--g4)',marginLeft:4}}>/ {p.delivery_attesa}</span>
                  </div>
                  <MBar pct={Math.round(((commesse[0].delivery_per_progetto||{})[p.id]||0)/p.delivery_attesa*100)} size={6}/>
                </div>
                <div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Prezzo per contenuto</div>
                <div style={{fontSize:16,fontWeight:700,color:'var(--violet)'}}>{fmtEuro(p.delivery_attesa>0?p.importo_variabile/p.delivery_attesa:0)}</div>
                {(commesse[0].delivery_per_progetto||{})[p.id]>p.delivery_attesa&&
                  <div style={{marginTop:10,background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.2)',borderRadius:6,padding:'8px 10px',fontFamily:'var(--fm)',fontSize:11,color:'var(--amber)'}}>
                    ⬆ Over delivery +{((commesse[0].delivery_per_progetto||{})[p.id]||0)-p.delivery_attesa} contenuti — fatturato extra {fmtEuro((((commesse[0].delivery_per_progetto||{})[p.id]||0)-p.delivery_attesa)*(p.importo_variabile/p.delivery_attesa))}
                  </div>}
              </>}
            </div>
          </Card>
        </div>
      </>}

      {/* ── WEB ── */}
      {p.categoria==='WEB'&&<>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          <Card>
            <CH title='Avanzamento milestone' meta={`${(p.milestone||[]).filter(m=>m.stato==='DONE').length}/${(p.milestone||[]).length} completate`}/>
            <div style={{padding:'16px 18px'}}>
              {(p.milestone||[]).length===0?<Empty msg='Nessuna milestone definita'/>:<>
                {/* Progress bar globale */}
                <div style={{marginBottom:18}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Avanzamento progetto</span>
                    <span style={{fontFamily:'var(--fm)',fontSize:12,fontWeight:700,color:'#60a5fa'}}>{Math.round((p.milestone||[]).filter(m=>m.stato==='DONE').length/(p.milestone||[]).length*100)}%</span>
                  </div>
                  <MBar pct={Math.round((p.milestone||[]).filter(m=>m.stato==='DONE').length/(p.milestone||[]).length*100)} size={8}/>
                </div>
                {(p.milestone||[]).map((m,i)=>{
                  const icons={DONE:'✓',IN_PROGRESS:'⋯',TODO:'○'};
                  const cols={DONE:'var(--green)',IN_PROGRESS:'var(--amber)',TODO:'var(--g4)'};
                  return <div key={m.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                    <div style={{width:28,height:28,borderRadius:'50%',border:`2px solid ${cols[m.stato]}`,display:'flex',alignItems:'center',justifyContent:'center',color:cols[m.stato],fontSize:12,flexShrink:0}}>{icons[m.stato]}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{m.nome}</div>
                      <Badge s={m.stato}/>
                    </div>
                    <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>#{i+1}</span>
                  </div>;
                })}
              </>}
            </div>
          </Card>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <Card>
              <CH title='Budget e costi' meta='Progetto one-off'/>
              <div style={{padding:'16px 18px'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
                  <div><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>VALORE CONTRATTO</div><div style={{fontSize:22,fontWeight:800,color:'#60a5fa'}}>{fmtEuro(p.importo_fisso)}</div></div>
                  <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>COSTO M.O. TOT.</div><div style={{fontSize:22,fontWeight:800}}>{fmtEuro(totMO)}</div></div>
                </div>
                <Divider m={12}/>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Margine stimato</span>
                  <span style={{fontSize:18,fontWeight:800,color:margTot>=soglia?'var(--green)':'var(--red)'}}>{margTot}%</span>
                </div>
                <MBar pct={margTot} size={6}/>
              </div>
            </Card>
            <Card>
              <CH title='Task ClickUp' meta='Stato attuale'/>
              {CLICKUP_TASKS.filter(t=>t.project_id===p.id).map(t=><div key={t.id} style={{display:'flex',gap:10,padding:'10px 18px',borderBottom:'1px solid rgba(255,255,255,.04)',alignItems:'center'}}>
                <div style={{width:6,alignSelf:'stretch',borderRadius:3,background:t.status==='complete'?'var(--green)':t.status==='in progress'?'var(--amber)':'var(--g3)',flexShrink:0}}/>
                <div style={{flex:1,fontSize:12,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                <Badge s={t.status}/>
              </div>)}
            </Card>
          </div>
        </div>
      </>}

      {/* ── MARKETING ── */}
      {p.categoria==='MARKETING'&&<>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          <Card>
            <CH title='Budget campagne' meta='Gestione spesa media'/>
            <div style={{padding:'18px 18px'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:18}}>
                <div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.15)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--amber)',marginBottom:4}}>BUDGET MENSILE</div>
                  <div style={{fontSize:20,fontWeight:800,color:'var(--amber)'}}>{fmtEuro(p.budget_campagna)}</div>
                </div>
                <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.15)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--red)',marginBottom:4}}>SPESO (MESE)</div>
                  <div style={{fontSize:20,fontWeight:800,color:'var(--red)'}}>{fmtEuro(p.speso_campagna||0)}</div>
                </div>
              </div>
              <div style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Utilizzo budget</span>
                  <span style={{fontFamily:'var(--fm)',fontSize:12,fontWeight:700,color:'var(--amber)'}}>{p.budget_campagna>0?Math.round((p.speso_campagna||0)/p.budget_campagna*100):0}%</span>
                </div>
                <MBar pct={p.budget_campagna>0?Math.round((p.speso_campagna||0)/p.budget_campagna*100):0} size={8}/>
              </div>
              <div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)',marginTop:12}}>
                Residuo budget: <b style={{color:'var(--white)'}}>{fmtEuro((p.budget_campagna||0)-(p.speso_campagna||0))}</b>
              </div>
              <div style={{marginTop:8,fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>
                ⚠ Il budget campagna è passante — non è ricavo Bite
              </div>
            </div>
          </Card>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <Card>
              <CH title='Retainer e margine' meta='Quota Bite'/>
              <div style={{padding:'16px 18px'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
                  <div><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>RETAINER MENSILE</div><div style={{fontSize:20,fontWeight:800,color:'var(--amber)'}}>{fmtEuro(p.importo_fisso)}</div></div>
                  <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>COSTO M.O.</div><div style={{fontSize:20,fontWeight:800}}>{fmtEuro(commesse[0]?.costo_manodopera||0)}</div></div>
                </div>
                <Divider m={12}/>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Margine mese corrente</span>
                  <span style={{fontSize:18,fontWeight:800,color:margTot>=soglia?'var(--green)':'var(--red)'}}>{margTot}%</span>
                </div>
                <MBar pct={margTot} size={6}/>
                <div style={{marginTop:10,fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Soglia target: {soglia}%</div>
              </div>
            </Card>
            <Card>
              <CH title='Task ClickUp' meta='Attività in corso'/>
              {CLICKUP_TASKS.filter(t=>t.project_id===p.id).map(t=><div key={t.id} style={{display:'flex',gap:10,padding:'10px 18px',borderBottom:'1px solid rgba(255,255,255,.04)',alignItems:'center'}}>
                <div style={{width:6,alignSelf:'stretch',borderRadius:3,background:t.status==='complete'?'var(--green)':t.status==='in progress'?'var(--amber)':'var(--g3)',flexShrink:0}}/>
                <div style={{flex:1,fontSize:12,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                <Badge s={t.status}/>
              </div>)}
            </Card>
          </div>
        </div>
        {/* Trend storico retainer */}
        {commesse.length>=2&&<Card>
          <CH title='Storico retainer' meta={`${commesse.length} mesi`}/>
          <div style={{padding:'16px 18px'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
              <thead><tr><Th c='Mese'/><Th c='Retainer'/><Th c='Costo M.O.'/><Th c='Margine'/><Th c='Stato'/></tr></thead>
              <tbody>
                {commesse.slice(0,6).map(cm=>{
                  const f=p.importo_fisso; const mo=cm.costo_manodopera||0; const mp=f>0?Math.round((f-mo)/f*100):0;
                  return <TR key={cm.id}>
                    <Td>{meseFmt(cm.mese_competenza)}</Td>
                    <Td mono>{fmtEuro(f)}</Td>
                    <Td mono>{fmtEuro(mo)}</Td>
                    <Td><MBar pct={mp}/></Td>
                    <Td><Badge s={cm.stato}/></Td>
                  </TR>;
                })}
              </tbody>
            </table>
          </div>
        </Card>}
      </>}

      {/* Timesheet comune a tutte le categorie */}
      {ts.length>0&&<Card s={{marginTop:16}}>
        <CH title='Timesheet progetto' meta={`${ts.length} registrazioni`}/>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='Risorsa'/><Th c='Task'/><Th c='Data'/><Th c='Durata'/><Th c='Stato'/></tr></thead>
          <tbody>
            {ts.slice(0,8).map(t=>{
              const u=userMap[t.user_id];
              const task=CLICKUP_TASKS.find(x=>x.id===t.clickup_task_id);
              return <TR key={t.id}>
                <Td>{u?<div style={{display:'flex',alignItems:'center',gap:6}}><Av u={u} size={20}/><span style={{fontWeight:600}}>{u.nome}</span></div>:'—'}</Td>
                <Td>{task?.name||'—'}</Td>
                <Td mono muted>{t.data_attivita}</Td>
                <Td mono>{fmtMin(t.durata_minuti)}</Td>
                <Td><Badge s={t.stato}/></Td>
              </TR>;
            })}
          </tbody>
        </table>
      </Card>}
    </div>
  </div>;
}
