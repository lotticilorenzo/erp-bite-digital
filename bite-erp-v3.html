};

// REDUCER
// ─────────────────────────────────────────────────────────
function reducer(state, action) {
  switch(action.type) {
    case 'ADD':    return {...state,[action.entity]:[...state[action.entity],action.item]};
    case 'UPDATE': return {...state,[action.entity]:state[action.entity].map(x=>x.id===action.item.id?action.item:x)};
    case 'DELETE': return {...state,[action.entity]:state[action.entity].filter(x=>x.id!==action.id)};
    case 'SET_ENTITY': return {...state,[action.entity]:action.items};
    case 'UPSERT': {
      const arr=state[action.entity]||[];
      const exists=arr.some(x=>x.id===action.item.id);
      return {...state,[action.entity]:exists?arr.map(x=>x.id===action.item.id?action.item:x):[...arr,action.item]};
    }
    default: return state;
  }
}

    <div key={i} style={{width:8,height:8,borderRadius:2,background:i<done?'linear-gradient(135deg,var(--purple),var(--violet))':'var(--g3)'}}/>
  ))}
  <span style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g5)',marginLeft:4}}>{done}/{total}</span>
</div>;

const Av = ({u,size=28}) => {
  const col=uCol(u?.id||'x');
  return <div style={{width:size,height:size,borderRadius:'50%',background:`linear-gradient(135deg,${col},${col}88)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.37,fontWeight:700,color:'white',flexShrink:0}}>
    {u?initials(u):'?'}
  </div>;
};

const Btn = ({children,v='ghost',onClick,type='button',disabled,s={}}) => {
  const vs={
    primary:{background:'linear-gradient(135deg,var(--purple),var(--violet))',color:'white',border:'none',boxShadow:'0 4px 14px rgba(117,19,164,.3)'},
    ghost:{background:'var(--g2)',color:'var(--g5)',border:'1px solid var(--g3)'},
    danger:{background:'rgba(239,68,68,.15)',color:'#f87171',border:'1px solid rgba(239,68,68,.25)'},
    success:{background:'rgba(34,197,94,.15)',color:'#4ade80',border:'1px solid rgba(34,197,94,.25)'},
    outline:{background:'transparent',color:'var(--violet)',border:'1px solid rgba(176,96,224,.4)'},
  };
  return <button type={type} onClick={onClick} disabled={disabled}
    style={{display:'inline-flex',alignItems:'center',gap:6,padding:'7px 14px',borderRadius:8,fontSize:12,fontWeight:600,cursor:disabled?'not-allowed':'pointer',opacity:disabled?.5:1,transition:'all .15s',whiteSpace:'nowrap',...vs[v],...s}}>
    {children}
  </button>;
};

const KPI = ({label,value,sub,delay=0,warn,color}) => (
  <div style={{background:'var(--g1)',border:`1px solid ${warn?'rgba(239,68,68,.3)':'var(--g2)'}`,borderRadius:10,padding:'16px 18px',animation:`fadeUp .3s ease ${delay}s both`}}>
    <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:8}}>{label}</div>
    <div style={{fontSize:22,fontWeight:800,letterSpacing:-1,lineHeight:1,marginBottom:sub?5:0,color:color||'var(--white)'}}>{value}</div>
    {sub&&<div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>{sub}</div>}
  </div>
);

const Card=({children,s={}})=><div style={{background:'var(--g1)',border:'1px solid var(--g2)',borderRadius:10,overflow:'hidden',...s}}>{children}</div>;
const CH=({title,meta,action})=><div style={{padding:'14px 18px',borderBottom:'1px solid var(--g2)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
  <div><div style={{fontSize:13,fontWeight:700}}>{title}</div>{meta&&<div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',marginTop:2}}>{meta}</div>}</div>

</div>;
const Topbar=({title,sub,children})=><div style={{minHeight:58,borderBottom:'1px solid var(--g2)',display:'flex',alignItems:'center',padding:'0 28px',gap:12,background:'rgba(9,9,11,.95)',backdropFilter:'blur(10px)',position:'sticky',top:0,zIndex:50,flexWrap:'wrap'}}>

const Th=({c,w})=><th style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',letterSpacing:'.07em',textTransform:'uppercase',padding:'10px 14px',textAlign:'left',borderBottom:'1px solid var(--g2)',fontWeight:400,whiteSpace:'nowrap',width:w}}>{c}</th>;
const Td=({children,mono,muted,align})=><td style={{padding:'10px 14px',fontWeight:500,fontFamily:mono?'var(--fm)':'var(--fd)',fontSize:mono?12:13,color:muted?'var(--g5)':'var(--white)',textAlign:align||'left'}}>{children}</td>;

function DashboardScreen({state,setPage,setDrillCliente,setDrillCommessa}) {
  const progettoMap=useMemo(()=>Object.fromEntries(state.progetti.map(p=>[p.id,p])),[state.progetti]);
  const clienteMap =useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);
  const userMap    =useMemo(()=>Object.fromEntries(state.users.map(u=>[u.id,u])),[state.users]);

  const mese=currMese(), prev=prevMese();

  // Fatturabile mese corrente
  const commMese=state.commesse.filter(c=>c.mese_competenza===mese);
  const fattMese=commMese.reduce((s,cm)=>{
    return s+cm.progetti_ids.reduce((ps,pid)=>{
      const p=progettoMap[pid]; if(!p) return ps;
      // delivery consuntiva dalla commessa per progetto
      const dc=(cm.delivery_per_progetto||{})[pid]||0;
      return ps+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);
    },0);
  },0);

  // Fatturato mese precedente (commesse chiuse/fatturate/incassate)
  const commPrev=state.commesse.filter(c=>c.mese_competenza===prev&&['CHIUSA','FATTURATA','INCASSATA'].includes(c.stato));
  const fattPrev=commPrev.reduce((s,cm)=>{
    return s+cm.progetti_ids.reduce((ps,pid)=>{
      const p=progettoMap[pid]; if(!p) return ps;
      const dc=(cm.delivery_per_progetto||{})[pid]||0;
      return ps+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);
    },0);
  },0);

  // Margine medio (usando costo MO dalle commesse mese corrente)
  const margini=commMese.map(cm=>{
    const f=cm.progetti_ids.reduce((ps,pid)=>{const p=progettoMap[pid];if(!p)return ps;const dc=(cm.delivery_per_progetto||{})[pid]||0;return ps+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0);
    const c=cm.costo_manodopera||0;
    return f>0?Math.round((f-c)/f*100):0;
  }).filter(m=>m>0);
  const margMedio=margini.length>0?Math.round(margini.reduce((a,b)=>a+b,0)/margini.length):0;

  // Costo struttura (costi fissi mese corrente)
  const costoStruttura=state.costi_fissi.filter(c=>c.mese===mese).reduce((s,c)=>s+(c.importo||0),0);

  // Commesse aperte
  const commAperte=commMese.filter(c=>c.stato==='APERTA'||c.stato==='PRONTA_CHIUSURA').length;

  // Margine sotto soglia
  const sottoSoglia=commMese.filter(cm=>{
    const f=cm.progetti_ids.reduce((ps,pid)=>{const p=progettoMap[pid];if(!p)return ps;const dc=(cm.delivery_per_progetto||{})[pid]||0;return ps+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0);
    const c=cm.costo_manodopera||0;
    return f>0&&Math.round((f-c)/f*100)<30;
  });

  const pending=state.timesheet.filter(t=>t.stato==='PENDING').length;
  const fattScadute=state.fatture_attive.filter(f=>f.stato==='SCADUTA').reduce((s,f)=>s+f.importo,0);

  return <div className='fu'>
    <Topbar title={`Dashboard — ${meseFmt(mese)}`}/>
    <div style={{padding:'22px 26px'}}>

      {/* KPI PRINCIPALI */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:14}}>
        <KPI label='Fatturabile mese corrente' value={fmtEuro(fattMese)} sub={`${commMese.length} commesse aperte`} delay={.05}/>
        <KPI label='Fatturato mese precedente' value={fmtEuro(fattPrev)} sub={meseFmt(prev)} delay={.08} color='var(--g5)'/>
        <KPI label='Margine medio' value={`${margMedio}%`} sub='Commesse mese corrente' delay={.11} color={margMedio>=50?'var(--violet)':margMedio>=30?'var(--amber)':'var(--red)'}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Commesse aperte' value={commAperte} sub={`${commMese.filter(c=>c.stato==='PRONTA_CHIUSURA').length} pronte chiusura`} delay={.14}/>
        <KPI label='Costo struttura' value={fmtEuro(costoStruttura)} sub='Costi fissi mese' delay={.17}/>
        <KPI label='Margini sotto soglia' value={sottoSoglia.length} sub='< 30%' delay={.2} warn={sottoSoglia.length>0}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:16}}>
        {/* COMMESSE MESE */}
        <Card>
          <CH title={`Commesse ${meseFmt(mese)}`} meta={`${commMese.length} clienti`} action={<Btn v='ghost' onClick={()=>setPage('commesse')} s={{fontSize:11,padding:'5px 10px'}}>Vedi tutte →</Btn>}/>
          {commMese.length===0?<Empty msg='Nessuna commessa aperta'/>:
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
            <thead><tr><Th c='Cliente'/><Th c='Progetti'/><Th c='Fatturabile'/><Th c='Margine'/><Th c='Stato'/></tr></thead>
            <tbody>
              {commMese.map(cm=>{
                const cl=clienteMap[cm.cliente_id];
                const f=cm.progetti_ids.reduce((ps,pid)=>{const p=progettoMap[pid];if(!p)return ps;const dc=(cm.delivery_per_progetto||{})[pid]||0;return ps+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0);
                const mo=cm.costo_manodopera||0;
                const mp=f>0?Math.round((f-mo)/f*100):0;
                return <TR key={cm.id} onClick={()=>{setDrillCommessa(cm.id);setPage('commessa_detail');}}>
                  <Td><div style={{fontWeight:700}}>{cl?.ragione_sociale||'—'}</div><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>{cl?.codice}</div></Td>
                  <Td><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{cm.progetti_ids.map(pid=>{const p=progettoMap[pid];return p?<Badge key={pid} s={p.categoria}/>:null;})}</div></Td>
                  <Td mono>{fmtEuro(f)}</Td>
                  <Td><MBar pct={mp}/></Td>
                  <Td><Badge s={cm.stato}/></Td>
                </TR>;
              })}
            </tbody>
          </table>}
        </Card>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {/* ALERT */}
          <Card>
            <CH title='Attenzione' meta={`${(pending>0?1:0)+(fattScadute>0?1:0)+(sottoSoglia.length>0?1:0)} notifiche`}/>
            {pending===0&&fattScadute===0&&sottoSoglia.length===0&&<div style={{padding:'14px 18px',fontFamily:'var(--fm)',fontSize:11,color:'var(--green)'}}>✓ Tutto in ordine</div>}
            {pending>0&&<div style={{display:'flex',gap:10,padding:'11px 18px',borderBottom:'1px solid rgba(255,255,255,.04)',cursor:'pointer'}} onClick={()=>setPage('timesheet')}>
              <div style={{width:28,height:28,borderRadius:8,background:'rgba(245,158,11,.12)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fbbf24',fontSize:13,flexShrink:0}}>⏱</div>
              <div><div style={{fontSize:12,fontWeight:600}}>{pending} timesheet da approvare</div><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>Clicca per gestire</div></div>
            </div>}
            {fattScadute>0&&<div style={{display:'flex',gap:10,padding:'11px 18px',borderBottom:'1px solid rgba(255,255,255,.04)',cursor:'pointer'}} onClick={()=>setPage('finanziaria')}>
              <div style={{width:28,height:28,borderRadius:8,background:'rgba(239,68,68,.12)',display:'flex',alignItems:'center',justifyContent:'center',color:'#f87171',fontSize:13,flexShrink:0}}>⚠</div>
              <div><div style={{fontSize:12,fontWeight:600}}>Fatture scadute: {fmtEuro(fattScadute)}</div><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>Vai alla sezione finanziaria</div></div>
            </div>}
            {sottoSoglia.map(cm=>{
              const cl=clienteMap[cm.cliente_id];
              const f=cm.progetti_ids.reduce((ps,pid)=>{const p=progettoMap[pid];if(!p)return ps;const dc=(cm.delivery_per_progetto||{})[pid]||0;return ps+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0);
              const mo=cm.costo_manodopera||0; const mp=f>0?Math.round((f-mo)/f*100):0;
              return <div key={cm.id} style={{display:'flex',gap:10,padding:'11px 18px',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                <div style={{width:28,height:28,borderRadius:8,background:'rgba(239,68,68,.12)',display:'flex',alignItems:'center',justifyContent:'center',color:'#f87171',fontSize:13,flexShrink:0}}>↓</div>
                <div><div style={{fontSize:12,fontWeight:600}}>{cl?.ragione_sociale} — margine {mp}%</div><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)'}}>Sotto soglia 30%</div></div>
              </div>;
            })}
          </Card>

          {/* FATTURE SCADUTE */}
          {fattScadute>0&&<Card s={{border:'1px solid rgba(239,68,68,.2)'}}>
            <CH title='Crediti scaduti' meta={fmtEuro(fattScadute)}/>
            {state.fatture_attive.filter(f=>f.stato==='SCADUTA').map(fa=>{
              const cl=clienteMap[fa.cliente_id];
              const gg=diffDays(fa.data_scadenza,nowDate());
              return <div key={fa.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 18px',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                <div><div style={{fontSize:12,fontWeight:600}}>{cl?.ragione_sociale}</div><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--red)'}}>scad. {fmtDate(fa.data_scadenza)} (+{gg}gg)</div></div>
                <span style={{fontFamily:'var(--fm)',fontWeight:700,color:'var(--red)'}}>{fmtEuro(fa.importo)}</span>
              </div>;
            })}
          </Card>}
        </div>
      </div>
    </div>
  </div>;
}

function FornitoriScreen({state,dispatch}){
  const [fornitori,setFornitori]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [filtroCategoria,setFiltroCategoria]=React.useState('TUTTI');
  const [ricerca,setRicerca]=React.useState('');
  const [modal,setModal]=React.useState(null);
  const [form,setForm]=React.useState({});
  const [saving,setSaving]=React.useState(false);

  const CATEGORIE=['FREELANCER','SAAS','STRUTTURA','CONSULENTE','ALTRO'];
  const CAT_COLOR={FREELANCER:'var(--violet)',SAAS:'var(--amber)',STRUTTURA:'var(--green)',CONSULENTE:'var(--blue,#3B82F6)',ALTRO:'var(--g4)'};

  const load=React.useCallback(async()=>{
    setLoading(true);
    try{
      const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
      const res=await fetch('/api/v1/fornitori-full',{headers:{'Authorization':'Bearer '+token}});
      if(res.ok){const d=await res.json();setFornitori(d);}
    }catch(e){console.error(e);}
    setLoading(false);
  },[]);

  React.useEffect(()=>{load();},[load]);

  const openEdit=(f)=>{
    setForm({...f,competenze_str:(f.competenze||[]).join(', ')});
    setModal('edit');
  };

  const saveEdit=async e=>{
    e.preventDefault();
    setSaving(true);
    try{
      const token=localStorage.getItem('BITE_ERP_TOKEN')||'';
      const payload={
        categoria:form.categoria||null,
        competenze:form.competenze_str?form.competenze_str.split(',').map(s=>s.trim()).filter(Boolean):[],
        tariffa:form.tariffa?parseFloat(form.tariffa):null,
        tariffa_tipo:form.tariffa_tipo||null,
        note:form.note||null,
      };
      const res=await fetch('/api/v1/fornitori/'+form.id,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(payload)});
      if(res.ok){
        setFornitori(prev=>prev.map(f=>f.id===form.id?{...f,...payload}:f));
        setModal(null);
      }else{const err=await res.json().catch(()=>({}));alert('Errore: '+JSON.stringify(err));}
    }catch(e){console.error(e);}
    setSaving(false);
  };

  const filtered=fornitori
    .filter(f=>filtroCategoria==='TUTTI'||f.categoria===filtroCategoria)
    .filter(f=>!ricerca||f.ragione_sociale?.toLowerCase().includes(ricerca.toLowerCase()));

  const totSpesa=filtered.reduce((s,f)=>s+(f.spesa_totale||0),0);

  return <div style={{padding:'28px 32px',minHeight:'100vh',background:'var(--g1)'}}>
    <div style={{marginBottom:24}}>
      <h1 style={{fontSize:26,fontWeight:800,color:'var(--white)',margin:0}}>Fornitori</h1>
      <p style={{color:'var(--g4)',fontSize:13,margin:'4px 0 0'}}>{fornitori.length} fornitori · spesa periodo filtrato: {fmtEuro(totSpesa)}</p>
    </div>

    {/* KPI */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
      {CATEGORIE.slice(0,4).map(cat=>{
        const n=fornitori.filter(f=>f.categoria===cat).length;
        const s=fornitori.filter(f=>f.categoria===cat).reduce((a,f)=>a+(f.spesa_totale||0),0);
        return <div key={cat} style={{background:'var(--g2)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--g3)'}}>
          <div style={{fontSize:11,color:'var(--g4)',fontFamily:'var(--fm)',marginBottom:4}}>{cat}</div>
          <div style={{fontSize:20,fontWeight:700,color:CAT_COLOR[cat]||'var(--g5)'}}>{n}</div>
          <div style={{fontSize:11,color:'var(--g4)',marginTop:2}}>{fmtEuro(s)}</div>
        </div>;
      })}
    </div>

    {/* FILTRI */}
    <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
      <input value={ricerca} onChange={e=>setRicerca(e.target.value)} placeholder='Cerca fornitore...' style={{padding:'7px 12px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g6)',fontSize:12,width:220}}/>
      <select value={filtroCategoria} onChange={e=>setFiltroCategoria(e.target.value)} style={{padding:'7px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g6)',fontSize:12}}>
        <option value='TUTTI'>Tutte le categorie</option>
        {CATEGORIE.map(c=><option key={c} value={c}>{c}</option>)}
      </select>
      <span style={{fontSize:12,color:'var(--g4)',marginLeft:4}}>{filtered.length} risultati</span>
    </div>

    {/* TABELLA */}
    {loading?<div style={{color:'var(--g4)',padding:40,textAlign:'center'}}>Caricamento...</div>:
    <div style={{background:'var(--g2)',borderRadius:14,border:'1px solid var(--g3)',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
        <thead><tr style={{background:'var(--g1)'}}>
          {['Fornitore','Categoria','Competenze','Tariffa','Fatture','Spesa totale','Ultima fattura',''].map(h=>
            <th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:'var(--g4)',fontFamily:'var(--fm)',fontWeight:600,borderBottom:'1px solid var(--g3)'}}>{h}</th>
          )}
        </tr></thead>
        <tbody>
          {filtered.map(f=><tr key={f.id} style={{borderBottom:'1px solid var(--g3)'}}>
            <td style={{padding:'10px 14px'}}>
              <div style={{fontWeight:700,color:'var(--white)'}}>{f.ragione_sociale}</div>
              {f.email&&<div style={{fontSize:11,color:'var(--g4)',marginTop:2}}>{f.email}</div>}
            </td>
            <td style={{padding:'10px 14px'}}>
              {f.categoria?<span style={{padding:'3px 8px',borderRadius:6,fontSize:11,fontWeight:600,background:CAT_COLOR[f.categoria]+'22',color:CAT_COLOR[f.categoria]||'var(--g4)'}}>{f.categoria}</span>
              :<span style={{fontSize:11,color:'var(--g4)'}}>—</span>}
            </td>
            <td style={{padding:'10px 14px',maxWidth:200}}>
              {(f.competenze||[]).length>0
                ?<div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                    {(f.competenze||[]).map((c,i)=><span key={i} style={{padding:'2px 7px',borderRadius:5,fontSize:10,background:'var(--g3)',color:'var(--g5)'}}>{c}</span>)}
                  </div>
                :<span style={{fontSize:11,color:'var(--g4)'}}>—</span>}
            </td>
            <td style={{padding:'10px 14px',fontFamily:'var(--fm)',fontSize:12}}>
              {f.tariffa?<span>{fmtEuro(f.tariffa)}<span style={{fontSize:10,color:'var(--g4)',marginLeft:3}}>{f.tariffa_tipo||''}</span></span>:<span style={{color:'var(--g4)'}}>—</span>}
            </td>
            <td style={{padding:'10px 14px',fontFamily:'var(--fm)',fontSize:12,color:'var(--g5)',textAlign:'center'}}>{f.num_fatture||0}</td>
            <td style={{padding:'10px 14px',fontFamily:'var(--fm)',fontSize:12,color:'var(--red)',fontWeight:600}}>−{fmtEuro(f.spesa_totale||0)}</td>
            <td style={{padding:'10px 14px',fontSize:11,color:'var(--g4)'}}>{f.ultima_fattura?fmtDate(f.ultima_fattura):'—'}</td>
            <td style={{padding:'10px 14px'}}>
              <button onClick={()=>openEdit(f)} style={{padding:'4px 10px',borderRadius:7,border:'1px solid var(--g3)',background:'var(--g2)',color:'var(--g5)',fontSize:11,cursor:'pointer'}}>✎ Modifica</button>
            </td>
          </tr>)}
        </tbody>
      </table>
      {filtered.length===0&&<div style={{padding:40,textAlign:'center',color:'var(--g4)'}}>Nessun fornitore trovato</div>}
    </div>}

    {/* MODAL MODIFICA */}
    {modal==='edit'&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={()=>setModal(null)}>
      <div style={{background:'var(--g2)',borderRadius:16,padding:28,width:480,maxWidth:'90vw',border:'1px solid var(--g3)'}} onClick={e=>e.stopPropagation()}>
        <h3 style={{margin:'0 0 20px',color:'var(--white)',fontSize:16}}>{form.ragione_sociale}</h3>
        <form onSubmit={saveEdit}>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:'var(--g4)',display:'block',marginBottom:4}}>Categoria</label>
            <select value={form.categoria||''} onChange={e=>setForm({...form,categoria:e.target.value})} style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g1)',color:'var(--g6)',fontSize:13}}>
              <option value=''>— Seleziona —</option>
              {CATEGORIE.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:'var(--g4)',display:'block',marginBottom:4}}>Competenze <span style={{color:'var(--g4)',fontStyle:'italic'}}>(separate da virgola)</span></label>
            <input value={form.competenze_str||''} onChange={e=>setForm({...form,competenze_str:e.target.value})} placeholder='es. grafica, social media, copywriting' style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g1)',color:'var(--g6)',fontSize:13,boxSizing:'border-box'}}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
            <div>
              <label style={{fontSize:12,color:'var(--g4)',display:'block',marginBottom:4}}>Tariffa (€)</label>
              <input type='number' step='0.01' value={form.tariffa||''} onChange={e=>setForm({...form,tariffa:e.target.value})} placeholder='0.00' style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g1)',color:'var(--g6)',fontSize:13,boxSizing:'border-box'}}/>
            </div>
            <div>
              <label style={{fontSize:12,color:'var(--g4)',display:'block',marginBottom:4}}>Tipo tariffa</label>
              <select value={form.tariffa_tipo||''} onChange={e=>setForm({...form,tariffa_tipo:e.target.value})} style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g1)',color:'var(--g6)',fontSize:13}}>
                <option value=''>—</option>
                <option value='oraria'>/ora</option>
                <option value='giornaliera'>/giorno</option>
                <option value='mensile'>/mese</option>
                <option value='progetto'>a progetto</option>
              </select>
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:12,color:'var(--g4)',display:'block',marginBottom:4}}>Note</label>
            <textarea value={form.note||''} onChange={e=>setForm({...form,note:e.target.value})} rows={3} style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid var(--g3)',background:'var(--g1)',color:'var(--g6)',fontSize:13,boxSizing:'border-box',resize:'vertical'}}/>
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button type='button' onClick={()=>setModal(null)} style={{padding:'8px 16px',borderRadius:8,border:'1px solid var(--g3)',background:'transparent',color:'var(--g5)',cursor:'pointer'}}>Annulla</button>
            <button type='submit' disabled={saving} style={{padding:'8px 16px',borderRadius:8,border:'none',background:'var(--purple)',color:'white',fontWeight:600,cursor:'pointer'}}>{saving?'Salvataggio...':'Salva'}</button>
          </div>
        </form>
      </div>
    </div>}
  </div>;
}

function ClientiScreen({state,dispatch,setPage,setDrillCliente,api}) {
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [form,setForm]=useState({});
  const [codicErr,setCodicErr]=useState('');
  const [saving,setSaving]=useState(false);

  const nextNum=()=>state.clienti.length>0?Math.max(...state.clienti.map(c=>c.numero||0))+1:1;

  const openNew=()=>{
    setForm({codice:'',numero:nextNum(),ragione_sociale:'',piva:'',sdi:'',pec:'',condizioni:'',attivo:true});
    setCodicErr(''); setModal('new');
  };
  const openEdit=c=>{setForm({...c});setCodicErr('');setModal(c);};
  const closeModal=()=>{setModal(null);setForm({});setCodicErr('');};

  const validateCodice=(cod,excludeId)=>{
    if(!cod||cod.length!==3) return 'Il codice deve essere esattamente 3 lettere';
    if(!/^[A-Z]{3}$/.test(cod.toUpperCase())) return 'Solo lettere (A-Z)';
    const dup=state.clienti.find(c=>c.codice===cod.toUpperCase()&&c.id!==excludeId);
    if(dup) return `Codice già usato da "${dup.ragione_sociale}"`;
    return '';
  };

  const save=async e=>{
    e.preventDefault();
    const cod=(form.codice||'').toUpperCase();
    const err=validateCodice(cod,modal==='new'?null:modal.id);
    if(err){setCodicErr(err);return;}
    const item={...form,codice:cod,numero:parseInt(form.numero)||nextNum()};
    if(api?.enabled){
      try{
        setSaving(true);
        const payload={
          codice_cliente:cod,
          numero_progressivo:parseInt(item.numero)||null,
          ragione_sociale:item.ragione_sociale,
          piva:item.piva||null,
          codice_fiscale:item.codice_fiscale||null,
          sdi:item.sdi||null,
          pec:item.pec||null,
          telefono:item.telefono||null,
          referente:item.referente||null,
          indirizzo:item.indirizzo||null,
          comune:item.comune||null,
          cap:item.cap||null,
          provincia:item.provincia||null,
          paese:item.paese||null,
          tipologia:item.tipologia||null,
          note:item.note||null,
          note_indirizzo:item.note_indirizzo||null,
          email:item.email||null,
          condizioni_pagamento:item.condizioni||null,
        };
        let saved;
        if(modal==='new'){
          saved=await api.createCliente(payload);
        }else{
          saved=await api.updateCliente(modal.id,{...payload,attivo:item.attivo});
        }
        dispatch({type:'UPSERT',entity:'clienti',item:saved});
        closeModal();
      }catch(errApi){
        alert(`Errore salvataggio cliente: ${errApi.message||'operazione non riuscita'}`);
      }finally{
        setSaving(false);
      }
      return;
    }
    if(modal==='new') dispatch({type:'ADD',entity:'clienti',item:{...item,id:uid()}});
    else dispatch({type:'UPDATE',entity:'clienti',item:{...modal,...item}});
    closeModal();
  };

  const del=async id=>{
    if(api?.enabled){
      try{
        await api.deleteCliente(id);
        dispatch({type:'DELETE',entity:'clienti',id});
      }catch(errApi){
        alert(`Errore eliminazione cliente: ${errApi.message||'operazione non riuscita'}`);
      }finally{
        setConfirm(null);
      }
      return;
    }
    dispatch({type:'DELETE',entity:'clienti',id});setConfirm(null);
  };
  const fil=state.clienti.filter(c=>c.ragione_sociale.toLowerCase().includes(search.toLowerCase())||c.codice?.toLowerCase().includes(search.toLowerCase()));

  const progettiPerCliente=id=>state.progetti.filter(p=>p.cliente_id===id).length;

  return <div className='fu'>
    {confirm&&<Confirm msg={`Eliminare "${confirm.ragione_sociale}"?`} onConfirm={()=>del(confirm.id)} onClose={()=>setConfirm(null)}/>}
    {modal&&<Modal title={modal==='new'?'Nuovo cliente':'Modifica cliente'} onClose={closeModal} width={600}>
      <form onSubmit={save}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--acc)',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Identificativo</div>
        <FGrid>
          <FRow label='Sigla cliente' error={codicErr} hint='Es. BEC — unica'>
            <input required maxLength={10} value={(form.codice||'').toUpperCase()} onChange={e=>{setForm({...form,codice:e.target.value.toUpperCase()});setCodicErr('');}}
              style={{textTransform:'uppercase',letterSpacing:3,fontFamily:'var(--fm)',fontSize:16,fontWeight:700,borderColor:codicErr?'var(--red)':'var(--g3)'}}/>
          </FRow>
          <FRow label='Codice interno (N°)' hint='Da FIC o manuale'>
            <input type='number' min='1' value={form.numero||''} onChange={e=>setForm({...form,numero:e.target.value})} placeholder='Auto da FIC'/>
          </FRow>
        </FGrid>
        <div style={{fontSize:11,fontWeight:700,color:'var(--acc)',textTransform:'uppercase',letterSpacing:1,margin:'14px 0 8px'}}>Anagrafica</div>
        <FRow label='Ragione sociale'><input required value={form.ragione_sociale||''} onChange={e=>setForm({...form,ragione_sociale:e.target.value})}/></FRow>
        <FGrid>
          <FRow label='Tipologia'>
            <select value={form.tipologia||''} onChange={e=>setForm({...form,tipologia:e.target.value})}>
              <option value=''>—</option>
              <option value='azienda'>Azienda</option>
              <option value='persona'>Persona</option>
              <option value='pubblica_amministrazione'>Pubblica amministrazione</option>
              <option value='condominio'>Condominio</option>
            </select>
          </FRow>
          <FRow label='Referente'><input value={form.referente||''} onChange={e=>setForm({...form,referente:e.target.value})}/></FRow>
        </FGrid>
        <FGrid>
          <FRow label='P.IVA'><input value={form.piva||''} onChange={e=>setForm({...form,piva:e.target.value})}/></FRow>
          <FRow label='Codice fiscale'><input value={form.codice_fiscale||''} onChange={e=>setForm({...form,codice_fiscale:e.target.value})}/></FRow>
        </FGrid>
        <FGrid>
          <FRow label='Telefono'><input value={form.telefono||''} onChange={e=>setForm({...form,telefono:e.target.value})}/></FRow>
          <FRow label='Email'><input type='email' value={form.email||''} onChange={e=>setForm({...form,email:e.target.value})}/></FRow>
        </FGrid>
        <FGrid>
          <FRow label='PEC'><input value={form.pec||''} onChange={e=>setForm({...form,pec:e.target.value})}/></FRow>
          <FRow label='Codice SDI'><input value={form.sdi||''} onChange={e=>setForm({...form,sdi:e.target.value})}/></FRow>
        </FGrid>
        <div style={{fontSize:11,fontWeight:700,color:'var(--acc)',textTransform:'uppercase',letterSpacing:1,margin:'14px 0 8px'}}>Indirizzo</div>
        <FRow label='Indirizzo'><input value={form.indirizzo||''} onChange={e=>setForm({...form,indirizzo:e.target.value})}/></FRow>
        <FGrid>
          <FRow label='Comune'><input value={form.comune||''} onChange={e=>setForm({...form,comune:e.target.value})}/></FRow>
          <FRow label='CAP'><input value={form.cap||''} onChange={e=>setForm({...form,cap:e.target.value})}/></FRow>
        </FGrid>
        <FGrid>
          <FRow label='Provincia'><input maxLength={5} value={form.provincia||''} onChange={e=>setForm({...form,provincia:e.target.value.toUpperCase()})} style={{textTransform:'uppercase'}}/></FRow>
          <FRow label='Paese'><input value={form.paese||''} onChange={e=>setForm({...form,paese:e.target.value})}/></FRow>
        </FGrid>
        <FRow label='Note indirizzo'><input value={form.note_indirizzo||''} onChange={e=>setForm({...form,note_indirizzo:e.target.value})}/></FRow>
        <div style={{fontSize:11,fontWeight:700,color:'var(--acc)',textTransform:'uppercase',letterSpacing:1,margin:'14px 0 8px'}}>Commerciale</div>
        <FRow label='Accordo di pagamento'><input value={form.condizioni||''} onChange={e=>setForm({...form,condizioni:e.target.value})} placeholder='es. 30gg DFFM'/></FRow>
        <FRow label='Note'><textarea rows={3} value={form.note||''} onChange={e=>setForm({...form,note:e.target.value})} style={{width:'100%',background:'var(--g1)',border:'1px solid var(--g3)',borderRadius:8,padding:'8px 12px',color:'var(--tx)',resize:'vertical'}}/></FRow>
        <FRow label='Stato'><select value={form.attivo?'true':'false'} onChange={e=>setForm({...form,attivo:e.target.value==='true'})}><option value='true'>Attivo</option><option value='false'>Inattivo</option></select></FRow>
        <FActions onCancel={closeModal} submitLabel={saving?'Salvataggio...':'Salva'}/>
      </form>
    </Modal>}

    <Topbar title='Clienti'>
      <input placeholder='Cerca per nome o codice…' value={search} onChange={e=>setSearch(e.target.value)} style={{width:220,height:34,padding:'0 12px'}}/>
      <Btn v='primary' onClick={openNew}>+ Nuovo cliente</Btn>
    </Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Clienti attivi' value={state.clienti.filter(c=>c.attivo).length} delay={.05}/>
        <KPI label='Totale clienti' value={state.clienti.length} delay={.1}/>
        <KPI label='Prossimo N°' value={nextNum()} delay={.15} color='var(--g5)'/>
      </div>
      <Card>
        <CH title='Anagrafica clienti' meta={`${fil.length} risultati`} action={<Btn v='primary' onClick={openNew} s={{fontSize:11,padding:'5px 10px'}}>+ Nuovo</Btn>}/>
        {fil.length===0?<Empty msg='Nessun cliente'/>:
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='#' w={40}/><Th c='Cod'/><Th c='Ragione sociale'/><Th c='P.IVA'/><Th c='Condizioni'/><Th c='Progetti'/><Th c='Stato'/><Th c=''/></tr></thead>
          <tbody>
            {[...fil].sort((a,b)=>(a.numero||0)-(b.numero||0)).map(c=><TR key={c.id} onClick={()=>{setDrillCliente(c.id);setPage('cliente_detail');}}>
              <Td mono muted>{c.numero}</Td>
              <Td><span style={{fontFamily:'var(--fm)',fontWeight:700,color:'var(--violet)',letterSpacing:2}}>{c.codice}</span></Td>
              <Td><div style={{fontWeight:700}}>{c.ragione_sociale}</div></Td>
              <Td mono muted>{c.piva||'—'}</Td>
              <Td muted>{c.condizioni||'—'}</Td>
              <Td mono>{progettiPerCliente(c.id)}</Td>
              <Td><Badge s={c.attivo?'ATTIVO':'INATTIVO'}/></Td>
              <Td><div onClick={e=>e.stopPropagation()} style={{display:'flex',gap:6}}>
                <Btn v='ghost' onClick={()=>openEdit(c)} s={{padding:'4px 8px',fontSize:11}}>Modifica</Btn>
                <Btn v='danger' onClick={()=>setConfirm(c)} s={{padding:'4px 8px',fontSize:11}}>✕</Btn>
              </div></Td>
            </TR>)}
          </tbody>
        </table>}
      </Card>
    </div>
  </div>;
}

// ─────────────────────────────────────────────────────────
// SCREEN: CLIENTE DETAIL (dashboard progetto per cliente)
// ─────────────────────────────────────────────────────────
function ClienteDetailScreen({state,dispatch,clienteId,setPage,setDrillProgetto}) {
  const cliente=state.clienti.find(c=>c.id===clienteId);
  const progetti=state.progetti.filter(p=>p.cliente_id===clienteId);
  const progettoMap=useMemo(()=>Object.fromEntries(state.progetti.map(p=>[p.id,p])),[state.progetti]);

  if(!cliente) return <div style={{padding:32,color:'var(--g4)'}}>Cliente non trovato</div>;

  const commesse=state.commesse.filter(cm=>cm.cliente_id===clienteId);
  const totFatt=commesse.reduce((s,cm)=>s+cm.progetti_ids.reduce((ps,pid)=>{const p=progettoMap[pid];if(!p)return ps;const dc=(cm.delivery_per_progetto||{})[pid]||0;return ps+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0),0);
  const totMO=commesse.reduce((s,cm)=>s+(cm.costo_manodopera||0),0);
  const margPct=totFatt>0?Math.round((totFatt-totMO)/totFatt*100):0;

  const tsCliente=state.timesheet.filter(t=>progetti.some(p=>p.id===t.progetto_id));
  const oreClienti=tsCliente.filter(t=>t.stato==='APPROVATO').reduce((s,t)=>s+t.durata_minuti,0);

  return <div className='fu'>
    <Topbar title={cliente.ragione_sociale} sub={`Codice ${cliente.codice} · N° ${cliente.numero}`}>
      <Btn v='ghost' onClick={()=>setPage('clienti')}>← Clienti</Btn>
      <Badge s={cliente.attivo?'ATTIVO':'INATTIVO'}/>
    </Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Fatturato totale' value={fmtEuro(totFatt)} delay={.05}/>
        <KPI label='Costo M.O.' value={fmtEuro(totMO)} delay={.08}/>
        <KPI label='Margine' value={`${margPct}%`} color={margPct>=50?'var(--violet)':margPct>=30?'var(--amber)':'var(--red)'} delay={.11}/>
        <KPI label='Ore lavorate' value={fmtMin(oreClienti)} delay={.14}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        {/* PROGETTI */}
        <Card>
          <CH title='Progetti attivi' meta={`${progetti.length} progetti`}/>
          {progetti.length===0?<Empty msg='Nessun progetto'/>:
          progetti.map(p=>{
            const pComm=commesse.filter(cm=>cm.progetti_ids.includes(p.id));
            const pFatt=pComm.reduce((s,cm)=>{const dc=(cm.delivery_per_progetto||{})[p.id]||0;return s+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0);
            return <div key={p.id} onClick={()=>{setDrillProgetto(p.id);setPage('progetto_detail');}} style={{padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,.04)',cursor:'pointer',transition:'background .1s'}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(176,96,224,.05)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div style={{fontWeight:700}}>{p.nome}</div>
                <Badge s={p.categoria}/>
              </div>
              <div style={{display:'flex',gap:16}}>
                <div style={{fontFamily:'var(--fm)',fontSize:11}}>{fmtEuro(p.importo_fisso)}<span style={{color:'var(--g4)'}}> fisso</span></div>
                {p.importo_variabile>0&&<div style={{fontFamily:'var(--fm)',fontSize:11}}>{fmtEuro(p.importo_variabile)}<span style={{color:'var(--g4)'}}> var.</span></div>}
                {p.delivery_attesa>0&&<div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--violet)'}}>{p.delivery_attesa} cont./mese</div>}
              </div>
              {p.categoria==='WEB'&&p.milestone?.length>0&&<div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap'}}>
                {p.milestone.map(m=><span key={m.id} style={{display:'inline-flex',alignItems:'center',gap:4,fontFamily:'var(--fm)',fontSize:10,padding:'2px 7px',borderRadius:20,...(BADGE_MAP[m.stato]||['var(--g2)','var(--g5)']).reduce((o,v,i)=>({...o,[i===0?'background':'color']:v}),{})}}>
                  {m.stato==='DONE'?'✓':m.stato==='IN_PROGRESS'?'⋯':'○'} {m.nome}
                </span>)}
              </div>}
              {p.categoria==='MARKETING'&&p.budget_campagna>0&&<div style={{marginTop:6,fontFamily:'var(--fm)',fontSize:11,color:'var(--amber)'}}>Budget campagna: {fmtEuro(p.budget_campagna)}/mese</div>}
            </div>;
          })}
        </Card>

        {/* COMMESSE */}
        <Card>
          <CH title='Storico commesse' meta={`${commesse.length} commesse`}/>
          {commesse.length===0?<Empty msg='Nessuna commessa'/>:
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
            <thead><tr><Th c='Mese'/><Th c='Fatturabile'/><Th c='Margine'/><Th c='Stato'/></tr></thead>
            <tbody>
              {[...commesse].sort((a,b)=>b.mese_competenza.localeCompare(a.mese_competenza)).map(cm=>{
                const f=cm.progetti_ids.reduce((ps,pid)=>{const p=progettoMap[pid];if(!p)return ps;const dc=(cm.delivery_per_progetto||{})[pid]||0;return ps+fatt(p.importo_fisso,p.importo_variabile,p.delivery_attesa,dc);},0);
                const mo=cm.costo_manodopera||0; const mp=f>0?Math.round((f-mo)/f*100):0;
                return <TR key={cm.id}>
                  <Td>{meseFmt(cm.mese_competenza)}</Td>
                  <Td mono>{fmtEuro(f)}</Td>
                  <Td><MBar pct={mp}/></Td>
                  <Td><Badge s={cm.stato}/></Td>
                </TR>;
              })}
            </tbody>
          </table>}
        </Card>
      </div>

      {/* TIMESHEET CLIENTE */}
      {tsCliente.length>0&&<Card>
        <CH title='Ore registrate (tutti i progetti)' meta={`${tsCliente.length} registrazioni`}/>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='Progetto'/><Th c='Task'/><Th c='Risorsa'/><Th c='Data'/><Th c='Durata'/><Th c='Stato'/></tr></thead>
          <tbody>
            {tsCliente.slice(0,8).map(t=>{
              const u=state.users.find(x=>x.id===t.user_id);
              const p=state.progetti.find(x=>x.id===t.progetto_id);
              const task=CLICKUP_TASKS.find(x=>x.id===t.clickup_task_id);
              return <TR key={t.id}>
                <Td muted>{p?.nome||'—'}</Td>
                <Td>{task?.name||t.servizio||'—'}</Td>
                <Td>{u?<div style={{display:'flex',alignItems:'center',gap:6}}><Av u={u} size={20}/><span>{u.nome}</span></div>:'—'}</Td>
                <Td mono muted>{t.data_attivita}</Td>
                <Td mono>{fmtMin(t.durata_minuti)}</Td>
                <Td><Badge s={t.stato}/></Td>
              </TR>;
            })}
          </tbody>
        </table>
      </Card>}
    </div>
  </div>;
}

// ─────────────────────────────────────────────────────────
// SCREEN: PROGETTI
// ─────────────────────────────────────────────────────────
function ProgettiScreen({state,dispatch,setPage,setDrillProgetto,api}) {
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [form,setForm]=useState({});
  const [milestoneInput,setMilestoneInput]=useState('');
  const [saving,setSaving]=useState(false);
  const clienteMap=useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);

  const openNew=()=>{setForm({cliente_id:state.clienti[0]?.id||'',nome:'',categoria:'SOCIAL',stato:'ATTIVO',importo_fisso:0,importo_variabile:0,delivery_attesa:0,milestone:[],budget_campagna:0,note:''});setMilestoneInput('');setModal('new');};
  const openEdit=p=>{setForm({...p,milestone:[...(p.milestone||[])]});setMilestoneInput('');setModal(p);};
  const closeModal=()=>{setModal(null);setForm({});};

  const addMilestone=()=>{
    if(!milestoneInput.trim()) return;
    setForm(f=>({...f,milestone:[...(f.milestone||[]),{id:uid(),nome:milestoneInput.trim(),stato:'TODO'}]}));
    setMilestoneInput('');
  };
  const toggleMilestone=(mid)=>{
    setForm(f=>({...f,milestone:f.milestone.map(m=>{
      if(m.id!==mid) return m;
      const next={TODO:'IN_PROGRESS',IN_PROGRESS:'DONE',DONE:'TODO'};
      return {...m,stato:next[m.stato]};
    })}));
  };
  const removeMilestone=mid=>setForm(f=>({...f,milestone:f.milestone.filter(m=>m.id!==mid)}));

  const save=async e=>{
    e.preventDefault();
    const item={...form,importo_fisso:parseFloat(form.importo_fisso)||0,importo_variabile:parseFloat(form.importo_variabile)||0,delivery_attesa:parseInt(form.delivery_attesa)||0,budget_campagna:parseFloat(form.budget_campagna)||0};
    if(api?.enabled){
      try{
        setSaving(true);
        const payload={
          cliente_id:item.cliente_id,
          nome:item.nome,
          tipo:categoriaToTipo(item.categoria||'SOCIAL'),
          importo_fisso:item.importo_fisso,
          importo_variabile:item.importo_variabile,
          delivery_attesa:item.delivery_attesa,
          note:withCategoriaNote(item.note,item.categoria||'SOCIAL'),
        };
        let saved;
        if(modal==='new'){
          saved=await api.createProgetto(payload,{local:item});
          if(item.stato&&item.stato!=='ATTIVO'){
            saved=await api.updateProgetto(saved.id,{stato:item.stato},{local:item});
          }
        }else{
          saved=await api.updateProgetto(modal.id,{
            nome:payload.nome,
            tipo:payload.tipo,
            stato:item.stato,
            importo_fisso:payload.importo_fisso,
            importo_variabile:payload.importo_variabile,
            delivery_attesa:payload.delivery_attesa,
            note:payload.note,
          },{local:item});
        }
        dispatch({type:'UPSERT',entity:'progetti',item:saved});
        closeModal();
      }catch(errApi){
        alert(`Errore salvataggio progetto: ${errApi.message||'operazione non riuscita'}`);
      }finally{
        setSaving(false);
      }
      return;
    }
    if(modal==='new') dispatch({type:'ADD',entity:'progetti',item:{...item,id:uid()}});
    else dispatch({type:'UPDATE',entity:'progetti',item:{...modal,...item}});
    closeModal();
  };
  const del=async id=>{
    if(api?.enabled){
      try{
        const saved=await api.updateProgetto(id,{stato:'CHIUSO'});
        dispatch({type:'UPSERT',entity:'progetti',item:saved});
      }catch(errApi){
        alert(`Errore chiusura progetto: ${errApi.message||'operazione non riuscita'}`);
      }finally{
        setConfirm(null);
      }
      return;
    }
    dispatch({type:'DELETE',entity:'progetti',id});setConfirm(null);
  };

  return <div className='fu'>
    {confirm&&<Confirm msg={`Eliminare "${confirm.nome}"?`} onConfirm={()=>del(confirm.id)} onClose={()=>setConfirm(null)}/>}
    {modal&&<Modal title={modal==='new'?'Nuovo progetto':'Modifica progetto'} onClose={closeModal} width={540}>
      <form onSubmit={save}>
        <FRow label='Cliente'>
          <select value={form.cliente_id||''} onChange={e=>setForm({...form,cliente_id:e.target.value})} required>
            <option value=''>Seleziona cliente</option>
            {state.clienti.map(c=><option key={c.id} value={c.id}>{c.codice} — {c.ragione_sociale}</option>)}
          </select>
        </FRow>
        <FRow label='Nome progetto'><input required value={form.nome||''} onChange={e=>setForm({...form,nome:e.target.value})}/></FRow>
        <FGrid>
          <FRow label='Categoria'>
            <select value={form.categoria||'SOCIAL'} onChange={e=>setForm({...form,categoria:e.target.value,importo_variabile:0,delivery_attesa:0,milestone:[],budget_campagna:0})}>
              <option value='SOCIAL'>Social — delivery contenuti</option>
              <option value='WEB'>Web — milestone</option>
              <option value='MARKETING'>Marketing — retainer + budget campagna</option>
            </select>
          </FRow>
          <FRow label='Stato'>
            <select value={form.stato||'ATTIVO'} onChange={e=>setForm({...form,stato:e.target.value})}>
              <option value='ATTIVO'>Attivo</option><option value='CHIUSO'>Chiuso</option>
            </select>
          </FRow>
        </FGrid>

        {/* Campi per categoria SOCIAL */}
        {form.categoria==='SOCIAL'&&<>
          <div style={{background:'var(--vdim)',border:'1px solid rgba(176,96,224,.2)',borderRadius:8,padding:'12px 16px',marginBottom:14}}>
            <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--violet)',marginBottom:10}}>◆ SOCIAL — Fisso + Variabile su delivery</div>
            <FGrid>
              <FRow label='Importo fisso (€/mese)'><input type='number' min='0' step='0.01' value={form.importo_fisso||0} onChange={e=>setForm({...form,importo_fisso:e.target.value})}/></FRow>
              <FRow label='Importo variabile (€)'><input type='number' min='0' step='0.01' value={form.importo_variabile||0} onChange={e=>setForm({...form,importo_variabile:e.target.value})}/></FRow>
            </FGrid>
            <FRow label='Delivery attesa (contenuti/mese)' hint='La delivery consuntiva può superare questo valore'>
              <input type='number' min='0' value={form.delivery_attesa||0} onChange={e=>setForm({...form,delivery_attesa:e.target.value})}/>
            </FRow>
            {(parseFloat(form.importo_fisso)||0)>0&&<div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Prezzo unitario: {fmtEuro((parseFloat(form.importo_variabile)||0)/(parseInt(form.delivery_attesa)||1))}/contenuto</div>}
          </div>
        </>}

        {/* Campi per categoria WEB */}
        {form.categoria==='WEB'&&<>
          <div style={{background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.2)',borderRadius:8,padding:'12px 16px',marginBottom:14}}>
            <div style={{fontFamily:'var(--fm)',fontSize:10,color:'#60a5fa',marginBottom:10}}>◆ WEB — Importo fisso + Milestone</div>
            <FRow label='Importo progetto (€)'><input type='number' min='0' step='0.01' value={form.importo_fisso||0} onChange={e=>setForm({...form,importo_fisso:e.target.value})}/></FRow>
            <FRow label='Milestone'>
              <div style={{display:'flex',gap:8,marginBottom:8}}>
                <input value={milestoneInput} onChange={e=>setMilestoneInput(e.target.value)} placeholder='Nome milestone…' onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addMilestone();}}} style={{flex:1}}/>
                <Btn v='outline' onClick={addMilestone} type='button' s={{padding:'7px 12px',whiteSpace:'nowrap'}}>+ Aggiungi</Btn>
              </div>
              {(form.milestone||[]).map(m=><div key={m.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                <button type='button' onClick={()=>toggleMilestone(m.id)} style={{width:20,height:20,borderRadius:4,border:'none',background:BADGE_MAP[m.stato]?.[0]||'var(--g2)',color:BADGE_MAP[m.stato]?.[1]||'var(--g5)',fontSize:11,flexShrink:0}}>{m.stato==='DONE'?'✓':m.stato==='IN_PROGRESS'?'⋯':'○'}</button>
                <span style={{flex:1,fontSize:12}}>{m.nome}</span>
                <Badge s={m.stato}/>
                <button type='button' onClick={()=>removeMilestone(m.id)} style={{background:'none',border:'none',color:'var(--g4)',fontSize:14,padding:2}}>×</button>
              </div>)}
              {(form.milestone||[]).length===0&&<div style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)',padding:'8px 0'}}>Nessuna milestone — aggiungila sopra</div>}
            </FRow>
          </div>
        </>}

        {/* Campi per categoria MARKETING */}
        {form.categoria==='MARKETING'&&<>
          <div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.2)',borderRadius:8,padding:'12px 16px',marginBottom:14}}>
            <div style={{fontFamily:'var(--fm)',fontSize:10,color:'#fbbf24',marginBottom:10}}>◆ MARKETING — Retainer + Budget campagne</div>
            <FGrid>
              <FRow label='Retainer mensile (€)'><input type='number' min='0' step='0.01' value={form.importo_fisso||0} onChange={e=>setForm({...form,importo_fisso:e.target.value})}/></FRow>
              <FRow label='Budget campagne (€/mese)' hint='Passante — non è ricavo Bite'><input type='number' min='0' step='0.01' value={form.budget_campagna||0} onChange={e=>setForm({...form,budget_campagna:e.target.value})}/></FRow>
            </FGrid>
          </div>
        </>}

        <FRow label='Note'><textarea value={form.note||''} onChange={e=>setForm({...form,note:e.target.value})}/></FRow>
        <FActions onCancel={closeModal} submitLabel={saving?'Salvataggio...':'Salva'}/>
      </form>
    </Modal>}

    <Topbar title='Progetti'><Btn v='primary' onClick={openNew}>+ Nuovo progetto</Btn></Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Totale' value={state.progetti.length} delay={.05}/>
        <KPI label='Social' value={state.progetti.filter(p=>p.categoria==='SOCIAL').length} delay={.08} color='var(--violet)'/>
        <KPI label='Web' value={state.progetti.filter(p=>p.categoria==='WEB').length} delay={.11} color='#60a5fa'/>
        <KPI label='Marketing' value={state.progetti.filter(p=>p.categoria==='MARKETING').length} delay={.14} color='var(--amber)'/>
      </div>
      <Card>
        <CH title='Tutti i progetti' meta={`${state.progetti.length} progetti`} action={<Btn v='primary' onClick={openNew} s={{fontSize:11,padding:'5px 10px'}}>+ Nuovo</Btn>}/>
        {state.progetti.length===0?<Empty msg='Nessun progetto'/>:
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='Cliente'/><Th c='Progetto'/><Th c='Cat.'/><Th c='Struttura economica'/><Th c='Stato'/><Th c=''/></tr></thead>
          <tbody>
            {state.progetti.map(p=>{
              const cl=clienteMap[p.cliente_id];
              const econDesc=p.categoria==='SOCIAL'?`${fmtEuro(p.importo_fisso)} + ${fmtEuro(p.importo_variabile)} (${p.delivery_attesa} cont.)`:
                p.categoria==='WEB'?`${fmtEuro(p.importo_fisso)} — ${(p.milestone||[]).length} milestone`:
                `${fmtEuro(p.importo_fisso)}/mese + ${fmtEuro(p.budget_campagna)} camp.`;
              return <TR key={p.id} onClick={()=>{setDrillProgetto(p.id);setPage('progetto_detail');}}>
                <Td><span style={{fontFamily:'var(--fm)',fontWeight:700,color:'var(--violet)',letterSpacing:1,fontSize:11}}>{cl?.codice}</span><span style={{color:'var(--g5)',marginLeft:6}}>{cl?.ragione_sociale}</span></Td>
                <Td><div style={{fontWeight:700}}>{p.nome}</div></Td>
                <Td><Badge s={p.categoria}/></Td>
                <Td mono muted style={{fontSize:11}}>{econDesc}</Td>
                <Td><Badge s={p.stato}/></Td>
                <Td><div onClick={e=>e.stopPropagation()} style={{display:'flex',gap:6}}>
                  <Btn v='ghost' onClick={()=>openEdit(p)} s={{padding:'4px 8px',fontSize:11}}>Modifica</Btn>
                  <Btn v='danger' onClick={()=>setConfirm(p)} s={{padding:'4px 8px',fontSize:11}}>✕</Btn>
                </div></Td>
              </TR>;
            })}
          </tbody>
        </table>}
      </Card>
    </div>
  </div>;
}

// SCREEN: COMMESSE (aggregate per cliente)
// ─────────────────────────────────────────────────────────
const STATI_CM=['APERTA','PRONTA_CHIUSURA','CHIUSA','FATTURATA','INCASSATA'];

function CommesseScreen({state,dispatch,setPage,setDrillCommessa,onChiudi,api}) {
  const [filterStato,setFilterStato]=useState('TUTTI');
  const [filterMese,setFilterMese]=useState(currMese());
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);

  const progettoMap=useMemo(()=>Object.fromEntries(state.progetti.map(p=>[p.id,p])),[state.progetti]);
  const clienteMap =useMemo(()=>Object.fromEntries(state.clienti.map(c=>[c.id,c])),[state.clienti]);

  // Costruisce la commessa dal form: prende tutti i progetti attivi del cliente selezionato
  const openNew=()=>{
    const cl=state.clienti[0];
    const pIds=cl?state.progetti.filter(p=>p.cliente_id===cl.id&&p.stato==='ATTIVO').map(p=>p.id):[];
    const delPerP=Object.fromEntries(pIds.map(pid=>[pid,0]));
    setForm({cliente_id:cl?.id||'',mese_competenza:currMese(),stato:'APERTA',progetti_ids:pIds,delivery_per_progetto:delPerP,costo_manodopera:0,costi_diretti:0,note:''});
    setModal('new');
  };
  const openEdit=cm=>{setForm({...cm,delivery_per_progetto:{...(cm.delivery_per_progetto||{})},progetti_ids:[...cm.progetti_ids],costi_diretti:cm.costi_diretti||0});setModal(cm);};
  const closeModal=()=>{setModal(null);setForm({});};

  const onClienteChange=cid=>{
    const pIds=state.progetti.filter(p=>p.cliente_id===cid&&p.stato==='ATTIVO').map(p=>p.id);
    setForm(f=>({...f,cliente_id:cid,progetti_ids:pIds,delivery_per_progetto:Object.fromEntries(pIds.map(pid=>[pid,0]))}));
  };

  // calcola anteprima fatturabile
  const previewFatt=(f)=>f.progetti_ids.reduce((s,pid)=>{
    const p=progettoMap[pid]||{};
    const snap=(f.snapshot_per_progetto||{})[pid]||{};
    const dc=(f.delivery_per_progetto||{})[pid] ?? snap.delivery_consuntiva ?? 0;
    return s+fatt(
      snap.importo_fisso ?? p.importo_fisso ?? 0,
      snap.importo_variabile ?? p.importo_variabile ?? 0,
      snap.delivery_attesa ?? p.delivery_attesa ?? 0,
      dc
    );
  },0);

  const buildRighePayload = f => (f.progetti_ids||[]).map(pid=>{
    const p=progettoMap[pid]||{};
    const snap=(f.snapshot_per_progetto||{})[pid]||{};
    return {
      progetto_id: pid,
      importo_fisso: safeNum(snap.importo_fisso ?? p.importo_fisso),
      importo_variabile: safeNum(snap.importo_variabile ?? p.importo_variabile),
      delivery_attesa: parseInt(snap.delivery_attesa ?? p.delivery_attesa)||0,
      delivery_consuntiva: parseInt((f.delivery_per_progetto||{})[pid] ?? snap.delivery_consuntiva ?? 0)||0,
    };
  });

  const save=async e=>{
    e.preventDefault();
    const item={...form,costo_manodopera:parseFloat(form.costo_manodopera)||0,costi_diretti:parseFloat(form.costi_diretti)||0};
    if(api?.enabled){
      try{
        setSaving(true);
        let saved;
        if(modal==='new'){
          const createPayload={
            cliente_id:item.cliente_id,
            mese_competenza:monthToApi(item.mese_competenza),
            righe_progetto:buildRighePayload(item),
            costi_diretti:item.costi_diretti,
            note:item.note||'',
          };
          saved=await api.createCommessa(createPayload);
          if(item.stato&&item.stato!=='APERTA'){
            saved=await api.updateCommessa(saved.id,{stato:item.stato});
          }
          dispatch({type:'UPSERT',entity:'commesse',item:saved});
        }else{
          const updatePayload={
            stato:item.stato,
            costi_diretti:item.costi_diretti,
            note:item.note||'',
            righe_progetto:buildRighePayload(item).map(r=>({
              progetto_id:r.progetto_id,
              importo_fisso:r.importo_fisso,
              importo_variabile:r.importo_variabile,
              delivery_attesa:r.delivery_attesa,
              delivery_consuntiva:r.delivery_consuntiva,
            })),
          };
          saved=await api.updateCommessa(modal.id,updatePayload);
          dispatch({type:'UPSERT',entity:'commesse',item:saved});
        }
        closeModal();
      }catch(err){
        alert(`Errore salvataggio commessa: ${err.message||'operazione non riuscita'}`);
      }finally{
        setSaving(false);
      }
      return;
    }

    if(modal==='new') dispatch({type:'ADD',entity:'commesse',item:{...item,id:uid()}});
    else dispatch({type:'UPDATE',entity:'commesse',item:{...modal,...item}});
    closeModal();
  };
  const del=async id=>{
    if(api?.enabled){
      alert('Eliminazione commessa via API non disponibile in questa versione.');
      setConfirm(null);
      return;
    }
    dispatch({type:'DELETE',entity:'commesse',id});
    setConfirm(null);
  };

  const mesiDisponibili=useMemo(()=>{const s=new Set(state.commesse.map(c=>c.mese_competenza));s.add(currMese());return [...s].sort().reverse();},[state.commesse]);
  const fil=state.commesse.filter(c=>(filterStato==='TUTTI'||c.stato===filterStato)&&(!filterMese||c.mese_competenza===filterMese));
  const totFatt=fil.reduce((s,cm)=>s+previewFatt(cm),0);

  return <div className='fu'>
    {confirm&&<Confirm msg='Eliminare questa commessa?' onConfirm={()=>del(confirm.id)} onClose={()=>setConfirm(null)}/>}
    {modal&&<Modal title={modal==='new'?'Nuova commessa':'Modifica commessa'} onClose={closeModal} width={580}>
      <form onSubmit={save}>
        <FRow label='Cliente'>
          <select value={form.cliente_id||''} onChange={e=>onClienteChange(e.target.value)} required disabled={modal!=='new'&&!!api?.enabled}>
            <option value=''>Seleziona cliente</option>
            {state.clienti.map(c=><option key={c.id} value={c.id}>{c.codice} — {c.ragione_sociale}</option>)}
          </select>
        </FRow>
        {/* Mostra i progetti del cliente già aggregati */}
        {form.progetti_ids?.length>0&&<div style={{background:'var(--g2)',borderRadius:8,padding:'12px 14px',marginBottom:14}}>
          <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',marginBottom:10}}>PROGETTI AGGREGATI IN QUESTA COMMESSA</div>
          {form.progetti_ids.map(pid=>{
            const p=progettoMap[pid]; if(!p) return null;
            const snap=(form.snapshot_per_progetto||{})[pid]||{};
            const da=snap.delivery_attesa ?? p.delivery_attesa ?? 0;
            const dc=(form.delivery_per_progetto||{})[pid] ?? snap.delivery_consuntiva ?? 0;
            const pFatt=fatt(
              snap.importo_fisso ?? p.importo_fisso ?? 0,
              snap.importo_variabile ?? p.importo_variabile ?? 0,
              da,
              dc
            );
            return <div key={pid} style={{padding:'8px 0',borderBottom:'1px solid rgba(255,255,255,.06)'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:da>0?6:0}}>
                <div style={{display:'flex',gap:8,alignItems:'center'}}><Badge s={p.categoria}/><span style={{fontWeight:600,fontSize:12}}>{p.nome}</span></div>
                <span style={{fontFamily:'var(--fm)',fontSize:12,color:'var(--violet)'}}>{fmtEuro(pFatt)}</span>
              </div>
              {da>0&&<div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>Delivery consuntiva:</span>
                <input type='number' min='0' value={dc} onChange={e=>{setForm(f=>({...f,delivery_per_progetto:{...(f.delivery_per_progetto||{}),[pid]:parseInt(e.target.value)||0}}));}} style={{width:80,padding:'4px 8px',fontSize:12}}/>
                <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--g4)'}}>/ {da} attesi</span>
                {dc>da&&<span style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--amber)'}}>⬆ over delivery +{dc-da}</span>}
              </div>}
            </div>;
          })}
          <div style={{marginTop:10,display:'flex',justifyContent:'space-between',fontFamily:'var(--fm)',fontSize:12}}>
            <span style={{color:'var(--g4)'}}>Totale fatturabile</span>
            <span style={{fontWeight:700,color:'var(--violet)'}}>{fmtEuro(previewFatt(form))}</span>
          </div>
        </div>}
        <FGrid>
          <FRow label='Mese competenza'><input type='month' value={form.mese_competenza||currMese()} onChange={e=>setForm({...form,mese_competenza:e.target.value})} required/></FRow>
          <FRow label='Stato'><select value={form.stato||'APERTA'} onChange={e=>setForm({...form,stato:e.target.value})}>{STATI_CM.map(s=><option key={s} value={s}>{s.replace(/_/g,' ')}</option>)}</select></FRow>
        </FGrid>
        <FRow label='Costo manodopera (€)' hint='Aggiornato automaticamente dai timesheet approvati'>
          <input type='number' min='0' step='0.01' value={form.costo_manodopera||0} onChange={e=>setForm({...form,costo_manodopera:e.target.value})} disabled={!!api?.enabled}/>
        </FRow>
        <FRow label='Costi diretti (€)'>
          <input type='number' min='0' step='0.01' value={form.costi_diretti||0} onChange={e=>setForm({...form,costi_diretti:e.target.value})}/>
        </FRow>
        <FRow label='Note'><textarea value={form.note||''} onChange={e=>setForm({...form,note:e.target.value})}/></FRow>
        <FActions onCancel={closeModal} submitLabel={saving?'Salvataggio...':'Salva'}/>
      </form>
    </Modal>}

    <Topbar title='Commesse'>
      <select value={filterMese} onChange={e=>setFilterMese(e.target.value)} style={{width:140,height:34,padding:'0 10px'}}>
        <option value=''>Tutti i mesi</option>
        {mesiDisponibili.map(m=><option key={m} value={m}>{meseFmt(m)}</option>)}
      </select>
      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
        {['TUTTI',...STATI_CM].map(s=>(
          <button key={s} onClick={()=>setFilterStato(s)} style={{padding:'5px 9px',borderRadius:20,fontSize:10,fontFamily:'var(--fm)',fontWeight:500,cursor:'pointer',border:filterStato===s?'none':'1px solid var(--g3)',background:filterStato===s?'linear-gradient(135deg,var(--purple),var(--violet))':'var(--g2)',color:filterStato===s?'white':'var(--g5)',whiteSpace:'nowrap'}}>{s.replace(/_/g,' ')}</button>
        ))}
      </div>
      <Btn v='primary' onClick={openNew}>+ Nuova</Btn>
    </Topbar>
    <div style={{padding:'22px 26px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        <KPI label='Fatturabile (filtro)' value={fmtEuro(totFatt)} delay={.05}/>
        <KPI label='Pronte chiusura' value={fil.filter(c=>c.stato==='PRONTA_CHIUSURA').length} delay={.08} warn={fil.filter(c=>c.stato==='PRONTA_CHIUSURA').length>0}/>
        <KPI label='Commesse visualizzate' value={fil.length} delay={.11}/>
        <KPI label='Sotto soglia 30%' value={fil.filter(cm=>{const f=previewFatt(cm);const mo=cm.costo_manodopera||0;return f>0&&Math.round((f-mo)/f*100)<30;}).length} delay={.14} warn/>
      </div>
      <Card>
        <CH title='Commesse aggregate per cliente' meta={`${fil.length} commesse`} action={<Btn v='primary' onClick={openNew} s={{fontSize:11,padding:'5px 10px'}}>+ Nuova</Btn>}/>
        {fil.length===0?<Empty msg='Nessuna commessa'/>:
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr><Th c='Cliente'/><Th c='Progetti'/><Th c='Fatturabile'/><Th c='Costo M.O.'/><Th c='Margine'/><Th c='Stato'/><Th c=''/></tr></thead>
          <tbody>
            {fil.map(cm=>{
              const cl=clienteMap[cm.cliente_id];
              const f=previewFatt(cm); const mo=cm.costo_manodopera||0;
              const mp=f>0?Math.round((f-mo)/f*100):0;
              return <TR key={cm.id} onClick={()=>{setDrillCommessa(cm.id);setPage('commessa_detail');}}>
                <Td><div style={{fontWeight:700}}>{cl?.ragione_sociale||'—'}</div><div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--violet)'}}>{cl?.codice} · {meseFmt(cm.mese_competenza)}</div></Td>
                <Td><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{cm.progetti_ids.map(pid=>{const p=progettoMap[pid];return p?<Badge key={pid} s={p.categoria}/>:null;})}<span style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--g4)',alignSelf:'center'}}>{cm.progetti_ids.length} proj.</span></div></Td>
                <Td mono>{fmtEuro(f)}</Td>
                <Td mono>{fmtEuro(mo)}</Td>
                <Td><MBar pct={mp}/></Td>
                <Td><Badge s={cm.stato}/></Td>
                <Td><div onClick={e=>e.stopPropagation()} style={{display:'flex',gap:6}}>
                  {(cm.stato==='APERTA'||cm.stato==='PRONTA_CHIUSURA')&&<Btn v='success' onClick={e=>{e.stopPropagation();onChiudi&&onChiudi(cm.id);}} s={{padding:'4px 8px',fontSize:11}}>✓ Chiudi</Btn>}
                  <Btn v='ghost' onClick={()=>openEdit(cm)} s={{padding:'4px 8px',fontSize:11}}>Modifica</Btn>
                  <Btn v='danger' onClick={()=>setConfirm(cm)} s={{padding:'4px 8px',fontSize:11}}>✕</Btn>
                </div></Td>
              </TR>;
            })}
          </tbody>
        </table>}
      </Card>
    </div>
  </div>;
}
